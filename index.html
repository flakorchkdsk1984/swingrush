function resizeCanvas() {

  canvas.width = Math.round(W * DPR);

  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

let _swingLogTimer = 0;
function updateSwinging(dt) {
  const angAcc = (-GRAVITY / kael.ropeLen) * Math.sin(kael.angle);
  kael.angVel += angAcc * dt;

  // PUMP: mantener click/touch presionado acelera el swing Y acorta la cuerda
  // - Pump: impulso angular en dirección del movimiento
  // - Rope shorten: conservación de momento angular (L*ω = cte → ω sube al bajar L)
  kael._shortening = inputDown;
  if (inputDown) {
    const PUMP_FORCE  = 0.002;   // impulso angular por frame (reducido, el acorte ya da energía)
    const MAX_ANGVEL  = 0.28;    // límite de velocidad angular
    const SHORTEN_SPD = 1.2;     // px/frame que se acorta la cuerda
    const MIN_LEN     = 55;      // longitud mínima de cuerda

    // Pump angular
    if (Math.abs(kael.angVel) < MAX_ANGVEL) {
      kael.angVel += Math.sign(kael.angVel || 1) * PUMP_FORCE * dt;
    }

    // Acortar cuerda con conservación de momento angular
    if (kael.ropeLen > MIN_LEN) {
      const oldLen    = kael.ropeLen;
      const newLen    = Math.max(MIN_LEN, oldLen - SHORTEN_SPD * dt);
      // L*ω = constante → nueva_ω = vieja_ω * oldLen / newLen
      kael.angVel    *= oldLen / newLen;
      // Clamp para no explotar
      kael.angVel     = Math.max(-MAX_ANGVEL, Math.min(MAX_ANGVEL, kael.angVel));
      kael.ropeLen    = newLen;
    }
  }

  kael.angle  += kael.angVel  * dt;
  kael.x = kael.anchorX + kael.ropeLen * Math.sin(kael.angle);
  kael.y = kael.anchorY + kael.ropeLen * Math.cos(kael.angle);

  // === MECHANIC 1: ELASTIC BUNGEE ROPE ===
  // Spring pulls rope back to naturalLen; rope can stretch up to 140% of naturalLen.
  if (!kael._shortening) {
    const K_SPRING  = 0.06;
    const DAMPING   = 0.88;
    const naturalLen = kael._originalRopeLen;
    const maxStretch = naturalLen * 1.4;
    const displacement = kael.ropeLen - naturalLen;
    const springForce  = -K_SPRING * displacement;
    kael.ropeVelStretch = (kael.ropeVelStretch + springForce) * DAMPING;
    const oldLen = kael.ropeLen;
    kael.ropeLen += kael.ropeVelStretch;
    kael.ropeLen  = Math.max(40, Math.min(maxStretch, kael.ropeLen));
    // Angular momentum conservation when length changes
    if (Math.abs(kael.ropeVelStretch) > 0.1 && oldLen > 0) {
      kael.angVel *= oldLen / kael.ropeLen;
    }
    // Re-position after spring adjustment
    kael.x = kael.anchorX + kael.ropeLen * Math.sin(kael.angle);
    kael.y = kael.anchorY + kael.ropeLen * Math.cos(kael.angle);
  } else {
    // While shortening, damp stretch velocity so spring doesn't fight player
    kael.ropeVelStretch *= 0.7;
  }

  // Log cada ~60 frames
  _swingLogTimer += dt;
  if (_swingLogTimer > 60) {
    _swingLogTimer = 0;
    dbg('PHYSICS', `angle=${kael.angle.toFixed(3)} angVel=${kael.angVel.toFixed(3)} pos=(${kael.x.toFixed(0)},${kael.y.toFixed(0)})`);
  }
}

function releaseRope() {
  // Velocidad tangencial al soltar
  kael.vx =  kael.ropeLen * Math.cos(kael.angle) * kael.angVel;
  kael.vy = -kael.ropeLen * Math.sin(kael.angle) * kael.angVel;

  // Boost de lanzamiento: cuanto más rápido el swing, más punch
  const speed = Math.sqrt(kael.vx * kael.vx + kael.vy * kael.vy);
  const boostFactor = 1.15 + Math.min(speed * 0.003, 0.2); // 1.15x–1.35x según velocidad
  kael.vx *= boostFactor;
  kael.vy *= boostFactor;

  // Bono de elasticidad: si la cuerda estaba tensa al soltar, catapultar extra
  const stretch = kael.ropeLen / (kael._originalRopeLen || kael.ropeLen);
  if (stretch > 1.05) {
    const tensionBoost = 1 + (stretch - 1.0) * 0.8;
    kael.vx *= tensionBoost;
    kael.vy *= tensionBoost;
  }

  // Squash/stretch en dirección de vuelo
  const vLen = Math.sqrt(kael.vx * kael.vx + kael.vy * kael.vy);
  if (vLen > 8) {
    kael.squash    = 0.72;  // aplastado perpendicular → se estira en el eje del vuelo
    kael.squashVel = 0;
  }

  // Micro-shake proporcional a velocidad de salida
  if (vLen > 12) triggerShake(4, Math.min(vLen * 0.12, 3));

  // Reset spring
  kael.ropeVelStretch = 0;
  kael._shortening    = false;

  dbg('RELEASE', `vx=${kael.vx.toFixed(2)} vy=${kael.vy.toFixed(2)} boost=${boostFactor.toFixed(2)}`);
  playSound('release');
  gameState = 'FLYING';
}

function grabAnchor(ax, ay) {
  const dx   = kael.x - ax;
  const dy   = kael.y - ay;
  const dist = Math.sqrt(dx * dx + dy * dy);
  dbg('GRAB_TRY', `kael=(${kael.x.toFixed(0)},${kael.y.toFixed(0)}) anchor=(${ax},${ay}) dist=${dist.toFixed(0)} MIN=${MIN_ROPE}`);
  if (dist < MIN_ROPE) { dbg('GRAB_FAIL', 'demasiado cerca'); return false; }

  kael.anchorX = ax;
  kael.anchorY = ay;
  kael.ropeLen = dist;
  kael._originalRopeLen = dist; // longitud base para el mechanic de acorte
  // Ángulo desde vertical
  kael.angle  = Math.atan2(dx, dy);
  // Velocidad angular inicial desde velocidad volando
  if (gameState === 'FLYING') {
    const tanX =  Math.cos(kael.angle);
    const tanY = -Math.sin(kael.angle);
    const vtan = kael.vx * tanX + kael.vy * tanY;
    kael.angVel = vtan / kael.ropeLen;
  } else {
    kael.angVel = 0;
  }

  // Garantizar velocidad angular mínima para un swing satisfactorio
  // Si el ángulo es negativo (Kael a la izquierda del anchor) → swing hacia la derecha
  // Si es positivo → swing hacia la izquierda
  const MIN_ANG_VEL = 0.06;
  if (Math.abs(kael.angVel) < MIN_ANG_VEL) {
    // Kick en la dirección del swing natural (hacia la derecha cuando está a la izquierda)
    kael.angVel = kael.angle < 0 ? MIN_ANG_VEL : -MIN_ANG_VEL;
  }

  dbg('GRAB_OK', `anchor=(${ax},${ay}) ropeLen=${dist.toFixed(0)} angle=${kael.angle.toFixed(3)} angVel=${kael.angVel.toFixed(3)}`);

  // Reset elastic bungee state on new grab
  kael.ropeVelStretch = 0;

  // === MECHANIC 3: SWING COMBO / RUSH MODE ===
  if (window.comboTimer < 45) {
    window.swingCombo++;
  } else {
    window.swingCombo = 1;
  }
  window.comboTimer = 0;
  if (window.swingCombo >= 3) {
    window.rushMode  = true;
    window.rushTimer = 180;
  }

  // Zoom de agarre
  grabZoom = 0.93;
  grabZoomVel = 0;
  grabCooldown = 20; // ignorar colisión de plataforma por 20 frames

  playSound('swing');
  gameState = 'SWINGING';
  return true;
}

// === DETECCIÓN DE COLISIONES ===

function circleAABB(cx, cy, cr, rx, ry, rw, rh) {
  const clX = Math.max(rx, Math.min(cx, rx + rw));
  const clY = Math.max(ry, Math.min(cy, ry + rh));
  const dx  = cx - clX;
  const dy  = cy - clY;
  return dx * dx + dy * dy < cr * cr;
}

function checkPlatformCollision(lev, prevY) {
  const bottom     = kael.y + KAEL_R;
  const prevBottom = (prevY !== undefined ? prevY : kael.y - kael.vy) + KAEL_R;
  for (let i = 0; i < lev.platforms.length; i++) {
    const p = lev.platforms[i];
    if (prevBottom <= p.y + 3 &&
        bottom >= p.y &&
        kael.x > p.x - KAEL_R * 0.6 &&
        kael.x < p.x + p.w + KAEL_R * 0.6) {
      kael.y        = p.y - KAEL_R;
      kael.vy       = 0;
      kael.vx      *= 0.72;
      kael.onGround = true;
      kael.platIdx  = i;
      kael.squash    = 0.55;
      kael.squashVel = 0;
      spawnLandingParticles(kael.x, kael.y + KAEL_R);
      playSound('land');
      gameState = 'IDLE';
      return true;
    }
  }
  return false;
}

function checkSpikeCollision(lev) {
  for (const s of lev.spikes) {
    if (circleAABB(kael.x, kael.y, KAEL_R, s.x, s.y, s.w, s.h)) {
      return true;
    }
  }
  return false;
}

function checkBossProximity(lev) {
  if (!lev.boss || lev.boss.dead) return false;
  const dx = kael.x - lev.boss.x;
  const dy = kael.y - lev.boss.y;
  return Math.sqrt(dx * dx + dy * dy) < 200;
}

function findNearestAnchor(lev) {
  let best = null, bestDist = MAX_GRAB * MAX_GRAB;
  for (const a of lev.anchors) {
    // Permitir anclas hasta 80px por debajo de Kael (para agarrar mientras sube)
    if (a.y > kael.y + 80) continue;
    const dx = kael.x - a.x;
    const dy = kael.y - a.y;
    const d2 = dx * dx + dy * dy;
    if (d2 < bestDist) { bestDist = d2; best = a; }
  }
  return best;
}

// === CÁMARA ===

function updateCamera(lev) {
  // Look-ahead basado en velocidad
  let speed = 0;
  if (gameState === 'FLYING') {
    speed = Math.sqrt(kael.vx * kael.vx + kael.vy * kael.vy);
  }
  const lookX = (gameState === 'FLYING') ? kael.vx * 4.0 : 0;
  const lookY = (gameState === 'FLYING') ? kael.vy * 2.0 : 0;

  cam.tx = kael.x - W * 0.5 + lookX;
  cam.ty = kael.y - H * 0.5 + lookY;

  // Clamp a bounds del mundo
  cam.tx = Math.max(0, Math.min(cam.tx, lev.worldW - W));
  cam.ty = Math.max(0, Math.min(cam.ty, lev.worldH - H));

  cam.x += (cam.tx - cam.x) * LERP_CAM * 3;
  cam.y += (cam.ty - cam.y) * LERP_CAM * 3;
}

function triggerShake(dur, amp) {
  shakeDur = dur;
  shakeAmp = amp;
}

function updateShake(dt) {
  if (shakeDur > 0) {
    shakeDur -= dt;
    const s = shakeAmp * (shakeDur / (8 / FRAME_MS));
    shakeX = (Math.random() * 2 - 1) * s;
    shakeY = (Math.random() * 2 - 1) * s;
  } else {
    shakeX = 0; shakeY = 0;
  }
}

const POOL_SIZE = 300;
const particles = new Array(POOL_SIZE).fill(null).map(() => ({
  active: false,
  x: 0, y: 0, vx: 0, vy: 0,
  life: 0, maxLife: 0,
  r: 0, color: '#fff', type: 0,
}));

// Partículas de polvo ambientales (paralaje independiente)
const dustP = new Array(80).fill(null).map(() => ({
  wx: Math.random() * 3000,
  wy: Math.random() * 700,
  r:  0.5 + Math.random() * 2,
  a:  0.05 + Math.random() * 0.3,
  vx: (Math.random() - 0.5) * 0.2,
  vy: -0.05 - Math.random() * 0.25,
  layer: Math.floor(Math.random() * 3),
}));

function spawnParticle(x, y, vx, vy, life, r, color, type) {
  for (let i = 0; i < POOL_SIZE; i++) {
    if (!particles[i].active) {
      const p = particles[i];
      p.active = true;
      p.x = x; p.y = y;
      p.vx = vx; p.vy = vy;
      p.life = life; p.maxLife = life;
      p.r = r; p.color = color; p.type = type;
      return;
    }
  }
}

function spawnLandingParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    const angle = Math.PI + (Math.random() - 0.5) * Math.PI;
    const speed = 1.5 + Math.random() * 3;
    spawnParticle(x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed - 1,
      18 + Math.random() * 12,
      1 + Math.random() * 2,
      COL.rust, 0);
  }
}

function spawnDeathParticles(x, y) {
  for (let i = 0; i < 22; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    spawnParticle(x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      25 + Math.random() * 20,
      2 + Math.random() * 3,
      i % 3 === 0 ? COL.danger : COL.rust, 1);
  }
}

function spawnExtractionParticles(x, y) {
  const angle = Math.random() * Math.PI * 2;
  const dist  = 5 + Math.random() * 30;
  spawnParticle(
    x + Math.cos(angle) * dist,
    y + Math.sin(angle) * dist,
    Math.cos(angle + Math.PI / 2) * 0.8,
    -0.5 - Math.random() * 0.8,
    40 + Math.random() * 20,
    1 + Math.random(),
    COL.victory, 2);
}

function updateParticles(dt) {
  for (const p of particles) {
    if (!p.active) continue;
    p.life -= dt;
    if (p.life <= 0) { p.active = false; continue; }
    p.x  += p.vx * dt;
    p.y  += p.vy * dt;
    p.vy += GRAVITY * 0.3 * dt;
    if (p.type === 2) { p.vy = -0.5; p.vx *= 0.98; } // extracción flota
  }
  // Partículas de polvo
  const lev = LEVELS[currentLevel];
  for (const d of dustP) {
    d.wx += d.vx;
    d.wy += d.vy;
    if (d.wy < -10) {
      d.wy = lev.worldH + 10;
      d.wx = Math.random() * lev.worldW;
    }
  }
}

// === MECHANIC 2 & 4: PUMP / FLIP HELPERS ===

function spawnPumpParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 3;
    spawnParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, 15 + Math.random() * 10, 1.5 + Math.random() * 1.5, '#FF8800', 0);
  }
}

function triggerFlipEffect() {
  for (let i = 0; i < 12; i++) {
    const a = (Math.PI * 2 / 12) * i;
    const s = 3 + Math.random() * 3;
    spawnParticle(kael.anchorX, kael.anchorY, Math.cos(a) * s, Math.sin(a) * s, 20 + Math.random() * 10, 2 + Math.random() * 2, i % 2 === 0 ? '#FFFFFF' : '#00FFFF', 0);
  }
  triggerShake(3, 3);
}

function addFloatingText(text, x, y, color, frames) {

}

// === AUDIO PROCEDURAL ===

let audioCtx = null;
let ambGain  = null;

let pendingMusicLevel = -1; // nivel en espera si audio no está listo

function initAudio() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(() => {
        // Reanudar música pendiente tras desbloqueo
        if (pendingMusicLevel >= 0) {
          MusicEngine.crossfade(pendingMusicLevel);
          pendingMusicLevel = -1;
        }
      });
    }
    return;
  }
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioReady = true;
    audioCtx.resume().then(() => {
      startAmbient();
      // Arrancar música del nivel actual tras desbloqueo
      if (pendingMusicLevel >= 0) {
        MusicEngine.crossfade(pendingMusicLevel);
        pendingMusicLevel = -1;
      }
    });
  } catch(e) { console.warn('Audio no disponible:', e); }
}

function makeNoise(sec) {
  const sr     = audioCtx.sampleRate;
  const frames = Math.ceil(sr * sec);
  const buf    = audioCtx.createBuffer(1, frames, sr);
  const data   = buf.getChannelData(0);
  for (let i = 0; i < frames; i++) data[i] = Math.random() * 2 - 1;
  return buf;
}

function playSound(name) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  let osc, gain, filter, buf, src;

  if (name === 'swing') {
    // Silbido metálico – barrido de ruido filtrado
    buf    = makeNoise(0.35);
    src    = audioCtx.createBufferSource();
    src.buffer = buf;
    filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(800, now);
    filter.frequency.linearRampToValueAtTime(3200, now + 0.3);
    filter.Q.value = 4;
    gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.18, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.35);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    src.start(now);

  } else if (name === 'release') {
    // Clic de impacto corto
    osc  = audioCtx.createOscillator();
    gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(220, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.1);

  } else if (name === 'land') {
    // Golpe sordo + repique metálico
    osc  = audioCtx.createOscillator();
    gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(120, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
    gain.gain.setValueAtTime(0.4, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.22);
    // Repique
    const osc2  = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(900, now);
    osc2.frequency.exponentialRampToValueAtTime(400, now + 0.12);
    gain2.gain.setValueAtTime(0.1, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.start(now); osc2.stop(now + 0.15);

  } else if (name === 'death') {
    // Glitch distorsionado
    buf    = makeNoise(0.6);
    src    = audioCtx.createBufferSource();
    src.buffer = buf;
    filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(400, now);
    filter.frequency.linearRampToValueAtTime(80, now + 0.5);
    gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.6, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.6);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    src.start(now);

  } else if (name === 'ui') {
    osc  = audioCtx.createOscillator();
    gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(660, now);
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.12);

  } else if (name === 'win') {
    // Arpegio ascendente en menor
    const notes = [220, 261.6, 311.1, 369.9, 440, 523.2];
    notes.forEach((freq, i) => {
      const t   = now + i * 0.11;
      const oW  = audioCtx.createOscillator();
      const gW  = audioCtx.createGain();
      oW.type = 'triangle';
      oW.frequency.setValueAtTime(freq, t);
      gW.gain.setValueAtTime(0.0, t);
      gW.gain.linearRampToValueAtTime(0.18, t + 0.04);
      gW.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      oW.connect(gW); gW.connect(audioCtx.destination);
      oW.start(t); oW.stop(t + 0.28);
    });
  }
}

function startAmbient() {
  const osc = audioCtx.createOscillator();
  ambGain   = audioCtx.createGain();
  const flt = audioCtx.createBiquadFilter();
  osc.type = 'sawtooth';
  osc.frequency.value = 55;
  flt.type = 'lowpass';
  flt.frequency.value = 140;
  ambGain.gain.value = 0.035;
  osc.connect(flt);
  flt.connect(ambGain);
  ambGain.connect(audioCtx.destination);
  osc.start();
}

    mg.gain.value = gainVal;
    const flt = audioCtx.createBiquadFilter();
    flt.type = 'lowpass'; flt.frequency.value = freq * 5;
    mg.connect(flt); flt.connect(masterGain);
    const dets = [0, 3, -4, 7];
    [freq, freq * 2, freq * 3, freq * 0.5].forEach(function(f, i) {
      const o = audioCtx.createOscillator();
      o.type = 'sawtooth';
      o.frequency.value = f;
      o.detune.value = dets[i];
      const g = audioCtx.createGain();
      g.gain.value = i === 0 ? 1 : i === 3 ? 0.4 : 0.25;
      o.connect(g); g.connect(mg);
      o.start();
      nodes.push(o);
    });
    nodes.push(mg, flt);
    return nodes;
  }

  function tablaHit(time, type, vel) {
    if (!audioCtx || !masterGain) return;
    if (type === 'bayan') {
      const n = makeNoise(0.15);
      const s = audioCtx.createBufferSource(); s.buffer = n;
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.25 * vel, time);
      ng.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
      s.connect(ng); ng.connect(masterGain); s.start(time);
      const o = audioCtx.createOscillator(); o.type = 'sine';
      const og = audioCtx.createGain();
      o.frequency.setValueAtTime(180, time);
      o.frequency.exponentialRampToValueAtTime(55, time + 0.15);
      og.gain.setValueAtTime(0.45 * vel, time);
      og.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
      o.connect(og); og.connect(masterGain);
      o.start(time); o.stop(time + 0.16);
    } else {
      const n = makeNoise(0.08);
      const s = audioCtx.createBufferSource(); s.buffer = n;
      const flt = audioCtx.createBiquadFilter();
      flt.type = 'bandpass'; flt.frequency.value = 1400; flt.Q.value = 3;
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.18 * vel, time);
      ng.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
      s.connect(flt); flt.connect(ng); ng.connect(masterGain); s.start(time);
      const o = audioCtx.createOscillator(); o.type = 'sine';
      const og = audioCtx.createGain();
      o.frequency.setValueAtTime(420, time);
      o.frequency.exponentialRampToValueAtTime(200, time + 0.08);
      og.gain.setValueAtTime(0.3 * vel, time);
      og.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
      o.connect(og); og.connect(masterGain);
      o.start(time); o.stop(time + 0.09);
    }
  }

  function playSitar(freq, time, dur, bright) {
    if (!audioCtx || !masterGain) return;
    const o = audioCtx.createOscillator(); o.type = 'sawtooth';
    o.frequency.value = freq;
    const lfo = audioCtx.createOscillator();
    const lfog = audioCtx.createGain();
    lfo.frequency.value = 5.5; lfog.gain.value = freq * 0.003;
    lfo.connect(lfog); lfog.connect(o.frequency);
    const flt = audioCtx.createBiquadFilter();
    flt.type = 'peaking'; flt.frequency.value = freq * (bright ? 3 : 2);
    flt.gain.value = bright ? 9 : 5; flt.Q.value = 1.2;
    const dly = audioCtx.createDelay(0.5); dly.delayTime.value = 0.1;
    const dfb = audioCtx.createGain(); dfb.gain.value = 0.18;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.001, time);
    g.gain.linearRampToValueAtTime(0.38, time + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, time + dur);
    o.connect(flt); flt.connect(g); g.connect(masterGain);
    flt.connect(dly); dly.connect(dfb); dfb.connect(dly); dfb.connect(masterGain);
    lfo.start(time); o.start(time);
    o.stop(time + dur + 0.05); lfo.stop(time + dur + 0.05);
  }

  function playBansuri(freq, time, dur) {
    if (!audioCtx || !masterGain) return;
    const o = audioCtx.createOscillator(); o.type = 'sine';
    o.frequency.value = freq * 2; // flute register
    const lfo = audioCtx.createOscillator();
    const lfog = audioCtx.createGain();
    lfo.frequency.value = 4; lfog.gain.value = 0.012;
    lfo.connect(lfog); lfog.connect(o.frequency);
    const hpf = audioCtx.createBiquadFilter();
    hpf.type = 'highpass'; hpf.frequency.value = 250;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.001, time);
    g.gain.linearRampToValueAtTime(0.32, time + 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, time + dur);
    o.connect(hpf); hpf.connect(g); g.connect(masterGain);
    lfo.start(time); o.start(time);
    o.stop(time + dur + 0.05); lfo.stop(time + dur + 0.05);
  }

  function playOud(freq, time, dur) {
    if (!audioCtx || !masterGain) return;
    const o1 = audioCtx.createOscillator(); o1.type = 'sawtooth';
    o1.frequency.value = freq;
    const o2 = audioCtx.createOscillator(); o2.type = 'triangle';
    o2.frequency.value = freq;
    const flt = audioCtx.createBiquadFilter();
    flt.type = 'lowpass'; flt.frequency.value = freq * 3.5; flt.Q.value = 0.8;
    const g2 = audioCtx.createGain(); g2.gain.value = 0.45;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.001, time);
    g.gain.linearRampToValueAtTime(0.42, time + 0.007);
    g.gain.exponentialRampToValueAtTime(0.001, time + dur);
    o1.connect(flt); o2.connect(g2); g2.connect(flt);
    flt.connect(g); g.connect(masterGain);
    o1.start(time); o2.start(time);
    o1.stop(time + dur + 0.05); o2.stop(time + dur + 0.05);
  }

  function scheduleTabla(track, time, beat) {
    const s = track.tablaStyle;
    const bd = 60 / track.bpm;
    if (s === 'slow') {
      if (beat % 4 === 0) { tablaHit(time, 'bayan', 1.0); tablaHit(time + bd * 0.5, 'dayan', 0.6); }
      else if (beat % 4 === 2) { tablaHit(time, 'dayan', 0.75); }
    } else if (s === 'fast') {
      tablaHit(time, beat % 2 === 0 ? 'bayan' : 'dayan', beat % 4 === 0 ? 1.0 : 0.65);
      tablaHit(time + bd * 0.5, 'dayan', 0.45);
    } else if (s === 'soft') {
      if (beat % 4 === 0) tablaHit(time, 'bayan', 0.7);
      if (beat % 2 === 0) tablaHit(time + bd * 0.75, 'dayan', 0.4);
    } else if (s === 'hard') {
      tablaHit(time, beat % 4 === 0 ? 'bayan' : 'dayan', beat % 2 === 0 ? 1.0 : 0.5);
      if (beat % 3 !== 1) tablaHit(time + bd * 0.33, 'dayan', 0.55);
    } else { // full
      tablaHit(time, beat % 4 === 0 ? 'bayan' : 'dayan', 1.0);
      tablaHit(time + bd * 0.25, 'dayan', 0.5);
      tablaHit(time + bd * 0.5,  beat % 4 === 2 ? 'bayan' : 'dayan', 0.75);
      tablaHit(time + bd * 0.75, 'dayan', 0.45);
    }
  }

  function runScheduler() {
    if (!seqState || seqState.stopped || !audioCtx) return;
    const track = TRACKS[seqState.level];
    const beatDur = 60 / track.bpm;
    const until = audioCtx.currentTime + 0.15;
    while (seqState.nextNoteTime < until) {
      const t = seqState.nextNoteTime;
      const pat = seqState.noteIdx % track.melody.length;
      const deg = track.melody[pat];
      if (deg >= 0) {
        const freq = scaleFreq(track, deg);
        if (freq) {
          if (track.instr === 'bansuri') playBansuri(freq, t, beatDur * 0.85);
          else if (track.instr === 'oud')   playOud(freq, t, beatDur * 0.8);
          else if (track.instr === 'sitar2') { playSitar(freq, t, beatDur * 0.9, true); playSitar(freq * 1.5, t + beatDur * 0.12, beatDur * 0.6, false); }
          else playSitar(freq, t, beatDur * 0.85, false);
        }
      }
      scheduleTabla(track, t, seqState.noteIdx);
      seqState.noteIdx++;
      seqState.nextNoteTime += beatDur;
    }
    seqState.timerId = setTimeout(runScheduler, 25);
  }

  function stopAll() {
    if (seqState) {
      seqState.stopped = true;
      clearTimeout(seqState.timerId);
      seqState = null;
    }
    droneNodes.forEach(function(n) { try { if (n.stop) n.stop(); else n.disconnect(); } catch(e) {} });
    droneNodes = [];
  }

  api = {
    start: function(levelIndex) {
      if (!audioCtx) { pendingMusicLevel = levelIndex; return; }
      if (audioCtx.state === 'suspended') {
        pendingMusicLevel = levelIndex;
        audioCtx.resume(); // el .then() en initAudio lo arrancará
        return;
      }
      stopAll();
      if (!masterGain) {
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0;
        masterGain.connect(audioCtx.destination);
      }
      masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
      masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
      masterGain.gain.linearRampToValueAtTime(0.35, audioCtx.currentTime + 1.2);
      const track = TRACKS[levelIndex];
      if (!track) return;
      droneNodes = createDrone(track.droneFreq, track.droneGain);
      seqState = { level: levelIndex, noteIdx: 0, nextNoteTime: audioCtx.currentTime + 0.1, stopped: false, timerId: null };
      runScheduler();
      activeLevel = levelIndex;
    },
    stop: function() {
      if (!audioCtx) return;
      stopAll();
      if (masterGain) {
        masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
        masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
        masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      }
      activeLevel = -1;
    },
    crossfade: function(newLevel) {
      // Si audioCtx no existe o está suspendido, encolar y esperar
      if (!audioCtx || audioCtx.state === 'suspended') {
        pendingMusicLevel = newLevel;
        return;
      }
      if (newLevel === activeLevel) return; // mismo nivel, seguir tocando
      if (activeLevel === -1 || !masterGain) { api.start(newLevel); return; }
      const now = audioCtx.currentTime;
      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.linearRampToValueAtTime(0, now + 1.0);
      setTimeout(function() { stopAll(); masterGain = null; api.start(newLevel); }, 1100);
    },
    deathFilter: function() {
      // Brief gain duck on death
      if (!masterGain || !audioCtx) return;
      const now = audioCtx.currentTime;
      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.linearRampToValueAtTime(0.04, now + 0.4);
      masterGain.gain.linearRampToValueAtTime(0.35, now + 1.8);
    }
  };
  return api;
})();

function hexRgb(hex) {

function renderPsychedelicBg() {
  ctx.save();
  ctx.globalAlpha = 1;
  switch (currentLevel) {

    // ── L0 WOLF — INFIERNO SOLAR ─────────────────────────────────────────
    case 0: {
      // Magma rings
      ctx.save();
      for (let i = 0; i < 5; i++) {
        const prog = ((bgTime * (0.4 + i * 0.15) + i * 0.2) % 1);
        const r = prog * H * 0.8;
        const alpha = 0.04 * (1 - prog);
        ctx.strokeStyle = `rgba(216,90,48,${alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(W * 0.5, H * 0.5, r, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();

      // Hexagonal grid pulse
      ctx.save();
      const hexSize = 60;
      const hexW = hexSize * Math.sqrt(3);
      const hexH = hexSize * 2;
      const rows = Math.ceil(H / (hexH * 0.75)) + 1;
      const cols = Math.ceil(W / hexW) + 1;
      ctx.strokeStyle = 'rgba(216,90,48,0.03)';
      ctx.lineWidth = 1;
      for (let row = -1; row < rows; row++) {
        for (let col = -1; col < cols; col++) {
          const cx = col * hexW + (row % 2 === 0 ? 0 : hexW * 0.5);
          const cy = row * hexH * 0.75;
          const dist = Math.hypot(cx - W * 0.5, cy - H * 0.5);
          const glow = 0.5 + 0.5 * Math.sin(bgTime * 2 + dist * 0.01);
          ctx.globalAlpha = glow * 0.04;
          ctx.beginPath();
          for (let p = 0; p < 6; p++) {
            const a = Math.PI / 180 * (60 * p - 30);
            const px = cx + hexSize * Math.cos(a);
            const py = cy + hexSize * Math.sin(a);
            p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.stroke();
        }
      }
      ctx.restore();

      // Wolf eye glow
      ctx.save();
      const eyeAlpha = 0.05 + 0.04 * Math.sin(bgTime * 3);
      ctx.globalAlpha = eyeAlpha;
      for (const [ex, ey] of [[W * 0.2, H * 0.25],[W * 0.8, H * 0.25]]) {
        const eg = ctx.createRadialGradient(ex, ey, 0, ex, ey, 50);
        eg.addColorStop(0, 'rgba(255,80,20,1)');
        eg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = eg;
        ctx.beginPath();
        ctx.ellipse(ex, ey, 50, 30, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      // Ember rain
      ctx.save();
      for (let i = 0; i < 30; i++) {
        const x = (Math.sin(bgTime * 0.7 + i * 1.3) * 0.5 + 0.5) * W;
        const y = H - ((bgTime * 40 * (0.5 + i * 0.03) * 60) % H + ((i * H / 30))) % H;
        const rad = 1 + (i % 2);
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = 'rgba(255,120,20,1)';
        ctx.beginPath();
        ctx.arc(x, y, rad, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      break;
    }

    // ── L1 EAGLE — TORMENTA ELÉCTRICA ────────────────────────────────────
    case 1: {
      // Lightning web
      ctx.save();
      ctx.strokeStyle = 'rgba(68,136,204,0.08)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 8; i++) {
        const edge = Math.floor((Math.sin(i * 2.3) * 0.5 + 0.5) * 4);
        let sx, sy;
        if (edge === 0) { sx = Math.sin(bgTime * 7 + i) * W; sy = 0; }
        else if (edge === 1) { sx = W; sy = Math.sin(bgTime * 7 + i) * H; }
        else if (edge === 2) { sx = Math.sin(bgTime * 7 + i) * W; sy = H; }
        else { sx = 0; sy = Math.sin(bgTime * 7 + i) * H; }
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        let cx2 = sx, cy2 = sy;
        for (let s = 0; s < 6; s++) {
          const tx = W * 0.5 + Math.sin(bgTime * 7 + i + s * 0.8) * 15;
          const ty = H * 0.5 + Math.cos(bgTime * 7 + i + s * 0.8) * 15;
          const t = (s + 1) / 6;
          cx2 = sx + (tx - sx) * t + Math.sin(bgTime * 11 + i * 3 + s) * 15;
          cy2 = sy + (ty - sy) * t + Math.cos(bgTime * 11 + i * 3 + s) * 15;
          ctx.lineTo(cx2, cy2);
        }
        ctx.lineTo(W * 0.5, H * 0.5);
        ctx.stroke();
      }
      ctx.restore();

      // Radar sweep
      ctx.save();
      const sweepAngle = (bgTime * 0.8) % (Math.PI * 2);
      const rg = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, H * 0.7);
      rg.addColorStop(0, 'rgba(68,136,204,0.12)');
      rg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.moveTo(W * 0.5, H * 0.5);
      ctx.arc(W * 0.5, H * 0.5, H * 0.7, sweepAngle, sweepAngle + 0.6);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // Data streams
      ctx.save();
      ctx.fillStyle = 'rgba(68,136,204,0.15)';
      for (let col = 0; col < 12; col++) {
        const cx = W / 12 * col + W / 24;
        const speed = 0.6 + (col % 3) * 0.2;
        for (let row = 0; row < 30; row++) {
          const y = ((bgTime * 60 * speed + row * 20) % H);
          ctx.beginPath();
          ctx.arc(cx, y, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();

      // Eagle shadow (wing shape)
      ctx.save();
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = 'rgba(30,50,80,1)';
      const wx = -W * 0.3 + ((bgTime * 30) % (W * 1.6));
      const wy = H * 0.3;
      ctx.beginPath();
      ctx.moveTo(wx, wy);
      ctx.bezierCurveTo(wx - 60, wy - 50, wx - 120, wy - 20, wx - 150, wy + 30);
      ctx.lineTo(wx, wy + 10);
      ctx.bezierCurveTo(wx + 60, wy - 50, wx + 120, wy - 20, wx + 150, wy + 30);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      break;
    }

    // ── L2 CROC — CRISTALES CORRUPTOS ────────────────────────────────────
    case 2: {
      // Crystal spires
      ctx.save();
      ctx.globalAlpha = 0.06;
      ctx.fillStyle = 'rgba(153,68,238,1)';
      for (let i = 0; i < 8; i++) {
        const sx = W * (i / 8) + Math.sin(bgTime * 0.5 + i) * 20;
        const sh = 100 + Math.sin(bgTime * 1.5 + i) * 60;
        ctx.beginPath();
        ctx.moveTo(sx, H);
        ctx.lineTo(sx - 15, H - sh);
        ctx.lineTo(sx, H - sh - 40);
        ctx.lineTo(sx + 15, H - sh);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();

      // DNA helix columns
      ctx.save();
      for (let col = 0; col < 3; col++) {
        const colX = W * (0.2 + col * 0.3);
        for (let j = 0; j < 20; j++) {
          const y = j * H / 20;
          const lx = colX + Math.sin(bgTime * 2 + j * 0.6) * 30;
          const rx = colX - Math.sin(bgTime * 2 + j * 0.6) * 30;
          ctx.globalAlpha = 0.07;
          ctx.fillStyle = 'rgba(153,68,238,1)';
          ctx.beginPath(); ctx.arc(lx, y, 3, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(rx, y, 3, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = 'rgba(153,68,238,0.07)';
          ctx.lineWidth = 1;
          ctx.globalAlpha = 1;
          ctx.beginPath(); ctx.moveTo(lx, y); ctx.lineTo(rx, y); ctx.stroke();
        }
      }
      ctx.restore();

      // Chromatic rings
      ctx.save();
      const ringR = 100 + 30 * Math.sin(bgTime * 0.7);
      const ringColors = ['rgba(150,50,255,0.04)','rgba(50,150,255,0.03)','rgba(255,50,150,0.03)'];
      const ringOff = [0, 2, -2];
      for (let ri = 0; ri < 3; ri++) {
        ctx.strokeStyle = ringColors[ri];
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(W * 0.5 + ringOff[ri], H * 0.4 + ringOff[ri], ringR + ri * 25, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();

      // Fracture cracks
      ctx.save();
      ctx.strokeStyle = 'rgba(153,68,238,0.06)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 5; i++) {
        const ox = W * (0.1 + i * 0.2);
        const oy = H * (0.2 + (i % 3) * 0.2);
        const len = (bgTime * 20 + i * 50) % 200 + 50;
        const ang = Math.sin(i * 2.7) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        let cx3 = ox, cy3 = oy;
        for (let s = 0; s < 4; s++) {
          cx3 += Math.cos(ang + s * 0.4) * len * 0.25;
          cy3 += Math.sin(ang + s * 0.4) * len * 0.25;
          ctx.lineTo(cx3, cy3);
        }
        ctx.stroke();
      }
      ctx.restore();
      break;
    }

    // ── L3 TOAD — LLUVIA ÁCIDA ────────────────────────────────────────────
    case 3: {
      // Acid bubbles
      ctx.save();
      for (let i = 0; i < 25; i++) {
        const x = (Math.sin(bgTime * 0.3 + i * 2.1) * 0.3 + (i / 25)) * W;
        const y = H - (bgTime * 25 * (0.4 + i * 0.025) * 60 + i * 30) % (H * 1.2);
        const rad = 4 + Math.sin(bgTime + i) * 3;
        ctx.globalAlpha = 0.08;
        ctx.fillStyle = 'rgba(68,170,68,1)';
        ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 0.12;
        ctx.strokeStyle = 'rgba(68,170,68,1)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.restore();

      // Toxic fog tendrils
      ctx.save();
      ctx.lineWidth = 8;
      ctx.strokeStyle = 'rgba(50,150,30,0.06)';
      for (let i = 0; i < 6; i++) {
        const waveY = H * (0.2 + i * 0.12);
        ctx.beginPath();
        for (let j = 0; j < 20; j++) {
          const x = j * W / 20;
          const y = waveY + Math.sin(j * 0.5 + bgTime * 1.5 + i * 1.1) * 30;
          j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
      ctx.restore();

      // Radioactive pulse rings
      ctx.save();
      ctx.strokeStyle = 'rgba(68,170,68,0.05)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 4; i++) {
        const r = ((bgTime * 60 + i * 40) * 60) % (H * 0.8);
        ctx.beginPath();
        ctx.arc(W * 0.5, H, r, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();

      // Chemical bloom (rotating petals)
      ctx.save();
      ctx.globalAlpha = 0.04;
      ctx.fillStyle = 'rgba(68,200,50,1)';
      const blRot = bgTime * 0.4;
      for (let p = 0; p < 8; p++) {
        const angle = blRot + p * Math.PI / 4;
        const scale = 0.8 + 0.2 * Math.sin(bgTime * 1.5 + p);
        ctx.save();
        ctx.translate(W * 0.5, H * 0.45);
        ctx.rotate(angle);
        ctx.scale(scale, scale);
        ctx.beginPath();
        ctx.ellipse(40, 0, 35, 12, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
      break;
    }

    // ── L4 SHARK — MAREA ROJA ────────────────────────────────────────────
    case 4: {
      // Blood tide waves
      ctx.save();
      for (let i = 0; i < 3; i++) {
        const yBase = H * 0.65 + i * 20;
        ctx.beginPath();
        ctx.moveTo(0, H);
        for (let x = 0; x <= W; x += 4) {
          const y = yBase + Math.sin(x / 40 + bgTime * 1.2 + i * 1.1) * 15;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H);
        ctx.lineTo(0, H);
        ctx.closePath();
        ctx.fillStyle = `rgba(180,10,10,${0.06 - i * 0.01})`;
        ctx.fill();
      }
      ctx.restore();

      // Sonar pings
      ctx.save();
      const sonarX = [0.15, 0.35, 0.5, 0.65, 0.85];
      ctx.strokeStyle = 'rgba(221,34,34,0.05)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++) {
        const r = ((bgTime * 45 + i * 35) * 60) % (H * 0.7);
        ctx.beginPath();
        ctx.arc(W * sonarX[i], H * 0.5, r, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();

      // Shark fin shadows
      ctx.save();
      ctx.fillStyle = 'rgba(100,0,0,0.12)';
      for (let i = 0; i < 2; i++) {
        const fx = -100 + ((bgTime * 35 + i * 200) * 60) % (W + 200);
        const fy = H * 0.62;
        ctx.beginPath();
        ctx.moveTo(fx, fy + 40);
        ctx.lineTo(fx + 15, fy);
        ctx.lineTo(fx + 30, fy + 40);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();

      // Blood vein lattice
      ctx.save();
      ctx.strokeStyle = 'rgba(180,20,20,0.05)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 5; i++) {
        const vx = W * (0.1 + i * 0.2);
        ctx.beginPath();
        ctx.moveTo(vx, 0);
        let vcy = 0;
        for (let b = 0; b < 5; b++) {
          vcy += 30 + b * 10;
          ctx.lineTo(vx + Math.sin(b * 2.1 + i) * 20, vcy);
          if (b === 2) {
            ctx.moveTo(vx + Math.sin(b * 2.1 + i) * 20, vcy);
            ctx.lineTo(vx + Math.sin(b * 2.1 + i) * 20 + 30, vcy + 30);
            ctx.moveTo(vx + Math.sin(b * 2.1 + i) * 20, vcy);
            ctx.lineTo(vx + Math.sin(b * 2.1 + i) * 20 - 30, vcy + 30);
            ctx.moveTo(vx + Math.sin(b * 2.1 + i) * 20, vcy);
          }
        }
        ctx.stroke();
      }
      ctx.restore();
      break;
    }

    // ── L5 SPIDER — TELARAÑA CÓSMICA ─────────────────────────────────────
    case 5: {
      // Rotating web
      ctx.save();
      ctx.strokeStyle = 'rgba(204,136,0,0.06)';
      ctx.lineWidth = 1;
      const webRot = bgTime * 0.15;
      const spokes = 8;
      const rings = [50, 100, 150, 200];
      ctx.translate(W * 0.5, H * 0.4);
      ctx.rotate(webRot);
      for (let s = 0; s < spokes; s++) {
        const a = (s / spokes) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(a) * 220, Math.sin(a) * 220);
        ctx.stroke();
      }
      for (const r of rings) {
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();

      // Cave stalactites
      ctx.save();
      for (let i = 0; i < 10; i++) {
        const sx = W * i / 10 + W / 20;
        const sh = 60 + Math.sin(bgTime * 0.8 + i) * 30;
        ctx.globalAlpha = 0.07;
        ctx.fillStyle = 'rgba(180,100,0,1)';
        ctx.beginPath();
        ctx.moveTo(sx - 8, 0);
        ctx.lineTo(sx + 8, 0);
        ctx.lineTo(sx, sh);
        ctx.closePath();
        ctx.fill();
        // Tip glow
        const tg = ctx.createRadialGradient(sx, sh, 0, sx, sh, 15);
        tg.addColorStop(0, 'rgba(255,180,0,0.04)');
        tg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.globalAlpha = 1;
        ctx.fillStyle = tg;
        ctx.beginPath();
        ctx.arc(sx, sh, 15, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      // Spore clouds
      ctx.save();
      ctx.fillStyle = 'rgba(200,150,20,0.1)';
      for (let i = 0; i < 40; i++) {
        const sx = W * 0.5 + Math.cos(bgTime * 0.4 + i * 0.8) * (100 + i * 8);
        const sy = H * 0.4 + Math.sin(bgTime * 0.3 + i * 0.8) * (50 + i * 4);
        const sr = 1 + (i % 3);
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      // Fractal hexagon expansion
      ctx.save();
      const prog = (bgTime % 4) / 4;
      const fAlpha = 0.1 * (1 - prog);
      ctx.strokeStyle = `rgba(204,136,0,${fAlpha})`;
      ctx.lineWidth = 2;
      for (let lvl = 0; lvl < 3; lvl++) {
        const fR = prog * (80 + lvl * 60);
        ctx.beginPath();
        for (let p = 0; p < 6; p++) {
          const a = Math.PI / 3 * p;
          const px = W * 0.5 + fR * Math.cos(a);
          const py = H * 0.4 + fR * Math.sin(a);
          p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.stroke();
      }
      ctx.restore();
      break;
    }

    // ── L6 OCTOPUS — ABISMO BIOLUMINISCENTE ──────────────────────────────
    case 6: {
      // Bioluminescent pulses
      ctx.save();
      for (let i = 0; i < 15; i++) {
        const bx = W * (0.05 + ((Math.sin(i * 127.1) * 43758.5453) % 1 + 1) % 1 * 0.9);
        const by = H * (0.05 + ((Math.sin(i * 311.7) * 43758.5453) % 1 + 1) % 1 * 0.9);
        const br = 8 + Math.sin(bgTime * 1.5 + i) * 5;
        const ba = 0.04 + 0.04 * Math.sin(bgTime * 2 + i * 0.7);
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'rgba(0,170,204,0.5)';
        ctx.globalAlpha = ba * 2;
        ctx.fillStyle = 'rgba(0,170,204,1)';
        ctx.beginPath();
        ctx.arc(bx, by, br, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      ctx.restore();

      // Deep sea waves
      ctx.save();
      ctx.strokeStyle = 'rgba(0,100,150,0.05)';
      ctx.lineWidth = 8;
      for (let i = 0; i < 4; i++) {
        const yCenter = H * (0.2 + i * 0.2);
        const xOff = bgTime * 20 * (i % 2 === 0 ? 1 : -1);
        ctx.beginPath();
        for (let x = 0; x <= W; x += 8) {
          const y = yCenter + Math.sin((x + xOff) / 60 + bgTime + i) * 20;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
      ctx.restore();

      // Ink blots
      ctx.save();
      const inkPos = [[0.3,0.3],[0.6,0.6],[0.75,0.25]];
      for (let i = 0; i < 3; i++) {
        const ir = 30 + 25 * Math.sin(bgTime * 0.8 + i * 2.1);
        const [ixi, iyi] = inkPos[i];
        const ix = W * ixi, iy = H * iyi;
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = 'rgba(0,20,40,1)';
        ctx.beginPath();
        ctx.arc(ix, iy, ir, 0, Math.PI * 2);
        ctx.fill();
        const ig = ctx.createRadialGradient(ix, iy, ir * 0.8, ix, iy, ir * 1.3);
        ig.addColorStop(0, 'rgba(0,0,0,0)');
        ig.addColorStop(1, 'rgba(0,170,204,0.04)');
        ctx.globalAlpha = 1;
        ctx.fillStyle = ig;
        ctx.beginPath();
        ctx.arc(ix, iy, ir * 1.3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      // Neural web
      ctx.save();
      const nodes = [];
      for (let i = 0; i < 20; i++) {
        nodes.push({
          x: W * (0.1 + 0.8 * (Math.sin(bgTime * 0.2 + i * 1.5) * 0.5 + 0.5)),
          y: H * (0.1 + 0.8 * (Math.cos(bgTime * 0.15 + i * 2.3) * 0.5 + 0.5))
        });
      }
      ctx.strokeStyle = 'rgba(0,170,204,0.04)';
      ctx.lineWidth = 1;
      for (let a = 0; a < nodes.length; a++) {
        for (let b = a + 1; b < nodes.length; b++) {
          const d = Math.hypot(nodes[a].x - nodes[b].x, nodes[a].y - nodes[b].y);
          if (d < W * 0.2) {
            ctx.beginPath();
            ctx.moveTo(nodes[a].x, nodes[a].y);
            ctx.lineTo(nodes[b].x, nodes[b].y);
            ctx.stroke();
          }
        }
      }
      ctx.restore();
      break;
    }
  }
  ctx.restore();
}

function renderBackground() {
  const th = theme();

  // Gradiente vertical temático
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   th.bgTop);
  grad.addColorStop(0.5, th.bgMid);
  grad.addColorStop(1,   th.bgBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Brillo en el horizonte — color del tema
  const hgrad = ctx.createLinearGradient(0, H * 0.5, 0, H * 0.8);
  hgrad.addColorStop(0,   'rgba(0,0,0,0)');
  hgrad.addColorStop(0.4, th.horizon);
  hgrad.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = hgrad;
  ctx.fillRect(0, H * 0.5, W, H * 0.3);

  // Niebla temática en la parte inferior
  const fogGrad = ctx.createLinearGradient(0, H * 0.7, 0, H);
  fogGrad.addColorStop(0, 'rgba(0,0,0,0)');
  fogGrad.addColorStop(1, th.fog.replace('0.07','0.18'));
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, H * 0.7, W, H * 0.3);

  // Efectos psicodélicos animados por nivel (detrás de siluetas)
  renderPsychedelicBg();

  // Capas paralaje de siluetas
  const paralaxFactor = [0.05, 0.15, 0.3];
  const alphaByLayer  = [0.35, 0.22, 0.14];

  for (const bgl of BG_SHAPES) {
    const l   = bgl.layer;
    const px  = cam.x * paralaxFactor[l];
    const py  = cam.y * paralaxFactor[l] * 0.3;
    ctx.fillStyle = th.silhouette[l];
    ctx.globalAlpha = alphaByLayer[l];
    for (const shape of bgl.shapes) {
      ctx.beginPath();
      ctx.moveTo(shape[0].x * W - px % W, shape[0].y * H - py);
      for (let i = 1; i < shape.length; i++)
        ctx.lineTo(shape[i].x * W - px % W, shape[i].y * H - py);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(shape[0].x * W - px % W + W, shape[0].y * H - py);
      for (let i = 1; i < shape.length; i++)
        ctx.lineTo(shape[i].x * W - px % W + W, shape[i].y * H - py);
      ctx.closePath();
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Cables de fondo — color del tema
  ctx.strokeStyle = th.fog;
  ctx.lineWidth = 1;
  for (const cable of BG_CABLES) {
    ctx.beginPath();
    const px0 = cam.x * 0.1;
    for (let i = 0; i < cable.length; i++) {
      const sx = cable[i].x * W - px0 % W;
      const sy = cable[i].y * H;
      i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
    }
    ctx.stroke();
  }

  // Partículas de polvo — color del tema
  for (const d of dustP) {
    const pf  = [0.06, 0.15, 0.28][d.layer];
    const sx  = d.wx - cam.x * pf;
    const sy  = d.wy - cam.y * pf;
    const wrapX = ((sx % W) + W) % W;
    ctx.globalAlpha = d.a;
    ctx.fillStyle = th.dust;
    ctx.beginPath();
    ctx.arc(wrapX, sy, d.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === RENDER — MUNDO ===

function worldToScreen(wx, wy) {
  return { x: wx - cam.x + shakeX, y: wy - cam.y + shakeY };
}

function renderPlatform(p) {
  const s  = worldToScreen(p.x, p.y);
  if (s.x + p.w < 0 || s.x > W || s.y + p.h < 0 || s.y > H) return;
  const th = theme();

  // Sombra
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(s.x + 4, s.y + p.h + 2, p.w, 6);

  // Cuerpo temático
  const cgrad = ctx.createLinearGradient(s.x, s.y, s.x, s.y + p.h);
  cgrad.addColorStop(0,   th.platTop);
  cgrad.addColorStop(0.5, th.platMid);
  cgrad.addColorStop(1,   th.platBot);
  ctx.fillStyle = cgrad;
  ctx.fillRect(s.x, s.y, p.w, p.h);

  // Textura de grietas
  ctx.fillStyle = th.platShine;
  for (let i = 0; i < p.w; i += 9) {
    if ((i / 9 + Math.floor(s.x / 9)) % 3 === 0)
      ctx.fillRect(s.x + i, s.y, 3, p.h);
  }

  // Borde
  ctx.strokeStyle = th.platEdge;
  ctx.lineWidth = 1;
  ctx.strokeRect(s.x, s.y, p.w, p.h);

  // Brillo superior
  ctx.fillStyle = th.platShine;
  ctx.fillRect(s.x, s.y, p.w, 2);

  // Rebars (varillas) — color del tema
  ctx.strokeStyle = th.rebar;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(s.x + 6, s.y); ctx.lineTo(s.x + 6, s.y - 8); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(s.x + p.w - 6, s.y); ctx.lineTo(s.x + p.w - 6, s.y - 7); ctx.stroke();
}

function renderSpike(sp) {
  const s = worldToScreen(sp.x, sp.y);
  if (s.x + sp.w < 0 || s.x > W) return;
  const n = Math.max(1, Math.floor(sp.w / 9));
  const tw = sp.w / n;

  ctx.fillStyle = COL.danger;
  for (let i = 0; i < n; i++) {
    const tx = s.x + i * tw;
    ctx.beginPath();
    ctx.moveTo(tx, s.y + sp.h);
    ctx.lineTo(tx + tw * 0.5, s.y);
    ctx.lineTo(tx + tw, s.y + sp.h);
    ctx.closePath();
    ctx.fill();
  }
  // Brillo en pinchos
  ctx.strokeStyle = 'rgba(255,100,90,0.5)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < n; i++) {
    const tx = s.x + i * tw;
    ctx.beginPath();
    ctx.moveTo(tx, s.y + sp.h);
    ctx.lineTo(tx + tw * 0.5, s.y);
    ctx.stroke();
  }
}

function renderAnchor(a, nearKael) {
  const s = worldToScreen(a.x, a.y);
  if (s.x < -50 || s.x > W + 50 || s.y < -50 || s.y > H + 50) return;
  const t = Date.now() * 0.003;
  const pulse = 0.5 + 0.5 * Math.sin(t + a.x * 0.01);

  // Resplandor de alcance cuando Kael está cerca
  if (nearKael) {
    const dx = kael.x - a.x;
    const dy = kael.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < MAX_GRAB) {
      const alpha = (1 - dist / MAX_GRAB) * 0.12 * pulse;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = COL.rust;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, dist > 0 ? Math.min(dist, MAX_GRAB * 0.8) : 80, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // Anillo exterior pulsante
  if (!a.used) {
    const rushBoost = window.rushMode ? 1.8 : 1;
    ctx.globalAlpha = 0.25 * pulse * rushBoost;
    ctx.strokeStyle = window.rushMode ? '#FF6600' : COL.rust;
    ctx.lineWidth   = window.rushMode ? 3 : 2;
    if (window.rushMode) { ctx.shadowColor = '#FF6600'; ctx.shadowBlur = 8; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, 16 + pulse * 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1;
  }

  // Cuerpo del gancho
  const col = a.used ? COL.metalDim : COL.rust;
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(s.x, s.y, 5, 0, Math.PI * 2);
  ctx.fill();

  // Nodo metálico central
  ctx.fillStyle = a.used ? '#444' : '#e8a060';
  ctx.beginPath();
  ctx.arc(s.x, s.y, 3, 0, Math.PI * 2);
  ctx.fill();

  // Gancho dibujado (forma)
  ctx.strokeStyle = col;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(s.x, s.y + 3, 5, Math.PI * 1.1, Math.PI * 2.2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(s.x + 5, s.y + 3);
  ctx.lineTo(s.x + 7, s.y + 1);
  ctx.stroke();
}

function renderRope() {
  if (gameState !== 'SWINGING') return;
  const s0 = worldToScreen(kael.anchorX, kael.anchorY);
  const s1 = worldToScreen(kael.x, kael.y);

  // Curva catenaria suave usando bezier
  const mx = (s0.x + s1.x) * 0.5;
  const my = (s0.y + s1.y) * 0.5 + kael.ropeLen * 0.08;

  // Tension color: orange+glow when rope stretched beyond 105%
  const naturalLen = kael._originalRopeLen || kael.ropeLen;
  const tension    = kael.ropeLen / naturalLen;
  const stretched  = tension > 1.05;
  const ropeColor  = stretched ? '#FF8800' : '#E8E6DC';

  // Sombra gruesa de la cuerda (más visible)
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 5;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(s0.x, s0.y);
  ctx.quadraticCurveTo(mx, my, s1.x, s1.y);
  ctx.stroke();

  // Cuerda principal — tinted by tension
  ctx.globalAlpha = 1;
  if (stretched) {
    ctx.shadowColor = '#FF8800';
    ctx.shadowBlur  = 6;
  }
  ctx.strokeStyle = ropeColor;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(s0.x, s0.y);
  ctx.quadraticCurveTo(mx, my, s1.x, s1.y);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Nodo de conexión en el ancla — círculo grande naranja
  ctx.fillStyle = COL.rust;
  ctx.beginPath();
  ctx.arc(s0.x, s0.y, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Nodo en Kael
  ctx.fillStyle = '#ccc';
  ctx.beginPath();
  ctx.arc(s1.x, s1.y, 4, 0, Math.PI * 2);
  ctx.fill();
}

function renderExtractionZone(lev) {
  const ex = lev.extraction;
  const s  = worldToScreen(ex.x, ex.y);
  if (Math.abs(s.x - W/2) > W || Math.abs(s.y - H/2) > H) return;

  const t  = Date.now() * 0.002;
  const p  = 0.5 + 0.5 * Math.sin(t * 2);

  // Rayos ascendentes
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2 + t;
    const rlen  = 20 + p * 15;
    ctx.globalAlpha = 0.12 + 0.08 * p;
    ctx.strokeStyle = COL.victory;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s.x + Math.cos(angle) * ex.r,
               s.y + Math.sin(angle) * ex.r);
    ctx.lineTo(s.x + Math.cos(angle) * (ex.r + rlen),
               s.y + Math.sin(angle) * (ex.r + rlen));
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Resplandor exterior
  const grd = ctx.createRadialGradient(s.x, s.y, ex.r * 0.5, s.x, s.y, ex.r * 2.5);
  grd.addColorStop(0, 'rgba(29,158,117,0.3)');
  grd.addColorStop(1, 'rgba(29,158,117,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(s.x, s.y, ex.r * 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Círculo principal
  ctx.strokeStyle = COL.victory;
  ctx.lineWidth = 2.5;
  ctx.globalAlpha = 0.7 + 0.3 * p;
  ctx.beginPath();
  ctx.arc(s.x, s.y, ex.r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Símbolo R
  ctx.fillStyle = COL.victory;
  ctx.globalAlpha = 0.85;
  ctx.font = `bold ${Math.floor(ex.r * 0.9)}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('R', s.x, s.y);
  ctx.globalAlpha = 1;
}

function renderParticles() {
  for (const p of particles) {
    if (!p.active) continue;
    const s  = worldToScreen(p.x, p.y);
    const a  = p.life / p.maxLife;
    ctx.globalAlpha = a * 0.9;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, p.r * a + 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === RENDER — KAEL ===

function renderKael() {
  if (gameState === 'DEAD' || gameState === 'RESPAWN') return;

  const s = worldToScreen(kael.x, kael.y);
  const speed = Math.sqrt(kael.vx * kael.vx + kael.vy * kael.vy);

  // Trail cuando hay velocidad alta
  if (speed > 8 && kael.trail.length > 0) {
    for (let i = 0; i < kael.trail.length; i++) {
      const tp = kael.trail[i];
      const ts = worldToScreen(tp.x, tp.y);
      ctx.globalAlpha = tp.a * 0.35 * (i / kael.trail.length);
      ctx.fillStyle = COL.rust;
      const tr = KAEL_R * (i / kael.trail.length) * 0.8;
      ctx.beginPath();
      ctx.arc(ts.x, ts.y, tr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Squash/stretch
  const sq = kael.squash;
  const sx = 1 / sq;

  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.scale(sx, sq);

  // Resplandor naranja exterior
  const grd = ctx.createRadialGradient(0, 0, KAEL_R * 0.5, 0, 0, KAEL_R * 2.2);
  grd.addColorStop(0, 'rgba(216,90,48,0.0)');
  grd.addColorStop(0.4, 'rgba(216,90,48,0.12)');
  grd.addColorStop(1, 'rgba(216,90,48,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(0, 0, KAEL_R * 2.2, 0, Math.PI * 2);
  ctx.fill();

  // Cuerpo metálico principal
  const bodyGrd = ctx.createRadialGradient(-3, -4, 1, 0, 0, KAEL_R);
  bodyGrd.addColorStop(0, '#6a6660');
  bodyGrd.addColorStop(0.6, '#3a3630');
  bodyGrd.addColorStop(1, '#1e1c18');
  ctx.fillStyle = bodyGrd;
  ctx.beginPath();
  ctx.arc(0, 0, KAEL_R, 0, Math.PI * 2);
  ctx.fill();

  // Borde metálico
  ctx.strokeStyle = '#6a6458';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, KAEL_R, 0, Math.PI * 2);
  ctx.stroke();

  // Máscara de gas – ojos
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.ellipse(-4.5, -2, 3.5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(4.5, -2, 3.5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Lente de ojo izquierdo
  ctx.fillStyle = 'rgba(180,120,60,0.4)';
  ctx.beginPath();
  ctx.ellipse(-4.5, -2, 2.5, 1.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(180,120,60,0.2)';
  ctx.beginPath();
  ctx.ellipse(4.5, -2, 2.5, 1.8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Filtro de máscara (abajo centro)
  ctx.fillStyle = '#2a2820';
  ctx.beginPath();
  ctx.ellipse(0, 4, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.ellipse(0, 4, 4, 3, 0, 0, Math.PI * 2);
  ctx.stroke();
  // Rejilla del filtro
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 0.5;
  for (let i = -3; i <= 3; i += 2) {
    ctx.beginPath();
    ctx.moveTo(i, 2); ctx.lineTo(i, 6);
    ctx.stroke();
  }

  // Casco / parte superior
  ctx.strokeStyle = '#7a7870';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, 0, KAEL_R - 2, Math.PI, Math.PI * 2);
  ctx.stroke();

  // Destello en el ojo izquierdo (animado)
  const t = Date.now() * 0.004;
  ctx.fillStyle = `rgba(255,180,80,${0.3 + 0.2 * Math.sin(t)})`;
  ctx.beginPath();
  ctx.arc(-4, -2.5, 1.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// === RENDER — UI Y OVERLAYS ===

function renderHUD(lev) {
  const levelName = lev.name;
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(10, 10, 180, 22);
  ctx.fillStyle = COL.rust;
  ctx.fillText('ZONA: ' + levelName, 16, 16);

  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(W - 120, 10, 110, 22);
  ctx.fillStyle = COL.ui;
  ctx.fillText('CAÍDAS: ' + falls, W - 14, 16);

  // Hint
  if (hintAlpha > 0) {
    ctx.globalAlpha = hintAlpha;
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = COL.ui;
    ctx.fillText(lev.hint, W * 0.5, H - 45);
    ctx.globalAlpha = 1;
  }

  // === MECHANICS HUD (top-right corner) ===
  renderMechanicsHUD();

  // === MECHANIC 3: RUSH ×N animated label (top-center) ===
  if (window.rushMode) {
    const t = Date.now() * 0.008;
    const flash = 0.7 + 0.3 * Math.sin(t * 6);
    ctx.globalAlpha = flash;
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#FF4400';
    ctx.shadowColor = '#FF6600';
    ctx.shadowBlur = 12;
    ctx.fillText(`RUSH ×${window.swingCombo}`, W * 0.5, 38);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // === Floating texts (pump/flip feedback) ===
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const ft of window.floatingTexts) {
    const progress = ft.timer / ft.maxTimer;
    const fy = ft.y - (1 - progress) * 20;
    const fs = worldToScreen(ft.x, fy);
    ctx.globalAlpha = progress;
    ctx.font = 'bold 13px monospace';
    ctx.fillStyle = ft.color;
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 6;
    ctx.fillText(ft.text, fs.x, fs.y);
  }
  ctx.shadowBlur  = 0;
  ctx.globalAlpha = 1;
}

function renderMechanicsHUD() {
  const px = W - 10;   // right-aligned
  let   py = 40;       // below falls counter
  ctx.textBaseline = 'top';

  // ── Combo counter ──────────────────────────────────────────────────────────
  if (window.swingCombo >= 2) {
    const fadeIn = Math.min(1, (window.rushTimer > 0 ? window.rushTimer / 180 : 0.6));
    ctx.globalAlpha = fadeIn;
    ctx.font = `bold ${window.rushMode ? 18 : 14}px monospace`;
    ctx.textAlign = 'right';
    ctx.fillStyle = window.rushMode ? '#FF6600' : COL.rust;
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur  = window.rushMode ? 8 : 0;
    ctx.fillText(`×${window.swingCombo}`, px, py);
    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1;
    py += 22;
  }

  // ── Rush bar ───────────────────────────────────────────────────────────────
  if (window.rushMode || window.rushTimer > 0) {
    const barW    = 80;
    const barH    = 6;
    const barX    = px - barW;
    const fillFrac = Math.max(0, window.rushTimer / 180);
    ctx.globalAlpha = 0.85;
    ctx.fillStyle   = 'rgba(0,0,0,0.5)';
    ctx.fillRect(barX - 2, py - 1, barW + 4, barH + 2);
    // Gradient fill orange→red
    const grad = ctx.createLinearGradient(barX, py, barX + barW, py);
    grad.addColorStop(0, '#FF8800');
    grad.addColorStop(1, '#FF1100');
    ctx.fillStyle = grad;
    ctx.fillRect(barX, py, barW * fillFrac, barH);
    ctx.globalAlpha = 1;
    py += 14;
  }

  // ── Rope tension indicator ─────────────────────────────────────────────────
  if (gameState === 'SWINGING') {
    const naturalLen = kael._originalRopeLen || kael.ropeLen;
    const tension    = kael.ropeLen / naturalLen;
    let tensionColor = '#44FF44'; // green = normal
    if      (tension > 1.2) tensionColor = '#FF3300'; // red = very stretched
    else if (tension > 1.05) tensionColor = '#FFAA00'; // yellow = stretched
    ctx.globalAlpha = 0.9;
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillStyle = tensionColor;
    ctx.shadowColor = tensionColor;
    ctx.shadowBlur  = tension > 1.05 ? 6 : 0;
    ctx.fillText('●', px, py);
    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1;
  }
}

function renderIntroScreen() {
  // Oscurecer
  ctx.fillStyle = 'rgba(10,6,8,0.88)';
  ctx.fillRect(0, 0, W, H);

  const cx = W * 0.5;
  const cy = H * 0.5;

  // Título
  ctx.font = `bold ${Math.min(W * 0.14, 64)}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = COL.rust;
  ctx.shadowColor = COL.rust;
  ctx.shadowBlur = 18;
  ctx.fillText('SWINGRUSH', cx, cy - 80);
  ctx.shadowBlur = 0;

  // Subtítulo
  ctx.font = `${Math.min(W * 0.04, 16)}px monospace`;
  ctx.fillStyle = COL.metal;
  ctx.fillText('CHAINS OF THE WASTELAND', cx, cy - 48);

  // Separador
  ctx.strokeStyle = 'rgba(216,90,48,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - 120, cy - 30); ctx.lineTo(cx + 120, cy - 30);
  ctx.stroke();

  // Typewriter
  ctx.font = `${Math.min(W * 0.032, 13)}px monospace`;
  ctx.fillStyle = COL.dust;
  ctx.fillText(typewriterText + (Date.now() % 700 < 350 ? '|' : ''), cx, cy + 2);

  // Toca para continuar (parpadeante)
  if (typewriterIdx >= typewriterFull.length) {
    ctx.globalAlpha = blinkTimer < 0.5 ? 1 : 0.2;
    ctx.font = `${Math.min(W * 0.038, 15)}px monospace`;
    ctx.fillStyle = COL.ui;
    ctx.fillText('TOCA PARA SOBREVIVIR', cx, cy + 55);
    ctx.globalAlpha = 1;
  }

  // Año / lore pequeño
  ctx.font = '10px monospace';
  ctx.fillStyle = 'rgba(140,100,30,0.5)';
  ctx.fillText('AÑO 2047 — EL COLAPSO GRAVITACIONAL', cx, cy + 95);
}

// Helper: rect redondeado compatible con todos los navegadores
function roundRectPath(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function renderLevelSelectScreen() {
  // levelSelectAnim se actualiza en update(), no aquí
  levelCardRects = [];

  const cx = W * 0.5;
  const t  = levelSelectAnim;

  // Fondo semi-oscuro
  ctx.fillStyle = 'rgba(10,6,8,0.92)';
  ctx.fillRect(0, 0, W, H);

  // Título
  const titleSize = Math.min(W * 0.11, 48);
  ctx.font = `bold ${titleSize}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = COL.rust;
  ctx.shadowColor = COL.rust;
  ctx.shadowBlur = 20 + 8 * Math.sin(t * 2);
  ctx.fillText('SWINGRUSH', cx, H * 0.07);
  ctx.shadowBlur = 0;

  ctx.font = `${Math.min(W * 0.032, 13)}px monospace`;
  ctx.fillStyle = COL.metal;
  ctx.fillText('ELIGE TU DESTINO', cx, H * 0.13);

  // Línea separadora
  ctx.strokeStyle = 'rgba(216,90,48,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - W * 0.35, H * 0.16);
  ctx.lineTo(cx + W * 0.35, H * 0.16);
  ctx.stroke();

  // Datos por nivel
  const bossNames = ['LOBO','ÁGUILA','COCODRILO','SAPO','TIBURÓN','ARAÑA','PULPO'];
  const bossIcons = ['🐺','🦅','🐊','🐸','🦈','🕷','🐙'];
  const themeColors = [
    '#D85A30','#4488CC','#9944EE','#44AA44','#DD2222','#AA6600','#00AACC'
  ];

  // Layout: 2 columnas
  const cols    = 2;
  const padX    = W * 0.04;
  const cardW   = (W - padX * 3) / 2;
  const cardH   = Math.min(H * 0.095, 72);
  const gapY    = cardH * 0.22;
  const startY  = H * 0.19;

  for (let i = 0; i < LEVELS.length; i++) {
    const col   = i % cols;
    const row   = Math.floor(i / cols);
    const lev   = LEVELS[i];
    const color = themeColors[i];

    // Centrar la última fila si es impar
    let cx2;
    const isLastSingle = (LEVELS.length % 2 === 1 && i === LEVELS.length - 1);
    if (isLastSingle) {
      cx2 = cx - cardW * 0.5;
    } else {
      cx2 = padX + col * (cardW + padX);
    }
    const cy2 = startY + row * (cardH + gapY);

    // Animación de entrada por card (stagger)
    const delay = i * 0.08;
    const slideIn = Math.min(1, Math.max(0, (t - delay) * 5));
    const cx2Anim = cx2 - (1 - slideIn) * W * 0.15;
    const cardAlpha = slideIn;

    ctx.globalAlpha = cardAlpha;

    // Sombra/glow de la card
    ctx.shadowColor = color;
    ctx.shadowBlur = 8 + 4 * Math.sin(t * 3 + i);

    // Fondo de la card (rect redondeado compatible con todos los navegadores)
    ctx.fillStyle = 'rgba(15,10,12,0.85)';
    roundRectPath(ctx, cx2Anim, cy2, cardW, cardH, 6);
    ctx.fill();

    // Borde izquierdo coloreado
    ctx.fillStyle = color;
    roundRectPath(ctx, cx2Anim, cy2, 4, cardH, 3);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Número de nivel
    ctx.font = `bold ${Math.min(cardH * 0.55, 32)}px monospace`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = color;
    ctx.fillText(`${i+1}`, cx2Anim + 14, cy2 + cardH * 0.42);

    // Nombre del nivel
    const nameSize = Math.min(cardH * 0.28, 14);
    ctx.font = `bold ${nameSize}px monospace`;
    ctx.fillStyle = COL.ui;
    ctx.fillText(lev.name, cx2Anim + 14 + Math.min(cardH * 0.55, 32) + 10, cy2 + cardH * 0.3);

    // Boss
    ctx.font = `${Math.min(cardH * 0.22, 11)}px monospace`;
    ctx.fillStyle = color + 'cc';
    ctx.fillText(`BOSS: ${bossIcons[i]} ${bossNames[i]}`, cx2Anim + 14 + Math.min(cardH * 0.55, 32) + 10, cy2 + cardH * 0.62);

    // Glow en borde derecho pulsante
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.globalAlpha = cardAlpha * (0.15 + 0.12 * Math.sin(t * 2 + i * 0.9));
    ctx.beginPath();
    roundRectPath(ctx, cx2Anim, cy2, cardW, cardH, 6);
    ctx.stroke();

    ctx.globalAlpha = 1;

    // Guardar rect para detección de tap
    levelCardRects.push({ x: cx2Anim, y: cy2, w: cardW, h: cardH, idx: i });
  }

  // Hint bottom
  ctx.globalAlpha = 0.5 + 0.5 * Math.sin(t * 3);
  ctx.font = `${Math.min(W * 0.03, 12)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = COL.dust;
  ctx.fillText('TOCA UNA ETAPA PARA COMENZAR', cx, H * 0.97);
  ctx.globalAlpha = 1;
}

function renderLevelTransition() {
  ctx.fillStyle = `rgba(0,0,0,${transitionAlpha})`;
  ctx.fillRect(0, 0, W, H);

  if (transitionAlpha < 0.7) return;

  const s = STORY[currentLevel] || STORY[STORY.length - 1];
  const cx = W * 0.5;
  const cy = H * 0.5;

  // Nombre del nivel
  ctx.font = `${Math.min(W * 0.045, 18)}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = COL.rust;
  ctx.shadowColor = COL.rust;
  ctx.shadowBlur = 10;
  ctx.fillText('— ' + s.title + ' —', cx, cy - 40);
  ctx.shadowBlur = 0;

  // Texto narrativo
  ctx.font = `${Math.min(W * 0.038, 15)}px monospace`;
  ctx.fillStyle = COL.ui;
  const lines = s.text.split('\n');
  lines.forEach((line, i) => ctx.fillText(line, cx, cy + i * 26));

  // Continuar
  if (transitionWait) {
    ctx.globalAlpha = blinkTimer < 0.5 ? 0.9 : 0.25;
    ctx.font = '11px monospace';
    ctx.fillStyle = COL.dust;
    ctx.fillText('TOCA PARA CONTINUAR', cx, cy + 80);
    ctx.globalAlpha = 1;
  }
}

function renderDeathOverlay() {
  if (deathFlash > 0) {
    ctx.fillStyle = `rgba(226,75,74,${deathFlash * 0.5})`;
    ctx.fillRect(0, 0, W, H);
  }
  // Viñeta roja
  const vgrad = ctx.createRadialGradient(W/2,H/2,H*0.3, W/2,H/2,H*0.85);
  vgrad.addColorStop(0, 'rgba(0,0,0,0)');
  vgrad.addColorStop(1, `rgba(80,10,10,${Math.max(0,0.5 - deathFlash * 0.3)})`);
  ctx.fillStyle = vgrad;
  ctx.fillRect(0, 0, W, H);
}

function renderWinScreen() {
  if (winTimer <= 0) return;
  const a = Math.min(winTimer / 30, 1);
  ctx.fillStyle = `rgba(0,0,0,${a * 0.7})`;
  ctx.fillRect(0, 0, W, H);

  const cx = W * 0.5, cy = H * 0.5;
  ctx.globalAlpha = a;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (currentLevel >= LEVELS.length - 1) {
    // Victoria final
    ctx.font = `bold ${Math.min(W * 0.09, 40)}px monospace`;
    ctx.fillStyle = COL.victory;
    ctx.shadowColor = COL.victory;
    ctx.shadowBlur = 20;
    ctx.fillText('VORN DERROTADO', cx, cy - 30);
    ctx.shadowBlur = 0;
    ctx.font = `${Math.min(W * 0.04, 16)}px monospace`;
    ctx.fillStyle = COL.ui;
    ctx.fillText('KAEL VENCIÓ AL PULPO. LA RESISTENCIA VIVE.', cx, cy + 20);
    ctx.fillStyle = COL.dust;
    ctx.font = '11px monospace';
    ctx.fillText('TOCA PARA VOLVER A EMPEZAR', cx, cy + 55);
  } else {
    ctx.font = `bold ${Math.min(W * 0.07, 30)}px monospace`;
    ctx.fillStyle = COL.victory;
    ctx.shadowColor = COL.victory;
    ctx.shadowBlur = 12;
    ctx.fillText('BOSS DERROTADO', cx, cy - 20);
    ctx.shadowBlur = 0;
    ctx.font = `${Math.min(W * 0.038, 15)}px monospace`;
    ctx.fillStyle = COL.ui;
    ctx.fillText('¡ADELANTE!', cx, cy + 18);
  }
  ctx.globalAlpha = 1;
}

// === INPUT — TOUCH Y MOUSE ===

let inputDown = false;

function handleInput() {
  if (!audioReady) initAudio();
  dbg('INPUT', `gameState=${gameState} kael=(${kael.x.toFixed(0)},${kael.y.toFixed(0)})`);

  if (gameState === 'INTRO') {
    if (typewriterIdx < typewriterFull.length) {
      typewriterText = typewriterFull;
      typewriterIdx  = typewriterFull.length;
    } else {
      // Ir a pantalla de selección de nivel
      playSound('ui');
      MusicEngine.crossfade(7); // música de menú
      gameState = 'LEVEL_SELECT';
      levelSelectAnim = 0;
    }
    return;
  }

  if (gameState === 'LEVEL_SELECT') {
    // La detección de card se hace en handleInputAt() con coordenadas
    return;
  }

  if (gameState === 'LEVEL_TRANSITION') {
    if (transitionWait) {
      transitionWait = false;
      transitionDir  = -1; // Fade out
    }
    return;
  }

  if (gameState === 'WIN') {
    if (winTimer > 30) {
      playSound('ui');
      if (currentLevel >= LEVELS.length - 1) {
        resetGame();
      } else {
        currentLevel++;
        startLevelTransition(currentLevel);
      }
    }
    return;
  }

  if (gameState === 'DEAD' || gameState === 'RESPAWN') return;

  // === MECHANIC 2 & 4: SWINGING tap — pump at bottom + flip double-tap ===
  if (gameState === 'SWINGING') {
    const now = performance.now();

    // MECHANIC 4: PENDULUM FLIP — double-tap reverses angular velocity
    if (now - kael._lastTapTime < 250 && kael._flipCooldown <= 0) {
      kael.angVel *= -0.85;
      kael._flipCooldown = 45;
      triggerFlipEffect();
      addFloatingText('FLIP!', kael.anchorX, kael.anchorY - 40, '#00FFFF', 24);
      kael._lastTapTime = 0; // consume the tap pair so it doesn't re-trigger
    } else {
      kael._lastTapTime = now;
    }

    // MECHANIC 2: SWING PUMP — tap near bottom of arc boosts momentum
    if (Math.abs(kael.angle) < 0.25 && kael._pumpCooldown <= 0) {
      kael.angVel *= 1.18;
      kael._pumpCooldown = 18;
      kael._pumpCombo++;
      spawnPumpParticles(kael.anchorX, kael.anchorY);
      let pumpText = 'PUMP!';
      if (kael._pumpCombo >= 3) pumpText = 'TRIPLE PUMP! ⚡';
      else if (kael._pumpCombo >= 2) pumpText = 'DOUBLE PUMP!';
      addFloatingText(pumpText, kael.anchorX, kael.anchorY - 55, '#FFA500', 30);
    }
    return;
  }

  // IDLE o FLYING: intenta engancharse
  const lev  = LEVELS[currentLevel];
  const best = findNearestAnchor(lev);
  dbg('ANCHOR_SEARCH', `best=${best ? `(${best.x},${best.y})` : 'NINGUNO'} kael.y=${kael.y.toFixed(0)}`);
  if (best) {
    if (grabAnchor(best.x, best.y)) {
      best.used = true;
      hintTimer = 0;
    }
  } else {
    dbg('ANCHOR_SEARCH', 'No hay anclas disponibles — verifica MAX_GRAB o posición de Kael');
  }
}

canvas.addEventListener('mousedown', (e) => {
  inputDown = true;
  handleInputAt(e.clientX, e.clientY);
  handleInput();
});
canvas.addEventListener('mouseup',   () => {
  inputDown = false;
  if (gameState === 'SWINGING') releaseRope(); // soltar al levantar el click
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  inputDown = true;
  if (e.touches.length > 0) {
    handleInputAt(e.touches[0].clientX, e.touches[0].clientY);
  }
  handleInput();
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  inputDown = false;
  if (gameState === 'SWINGING') releaseRope(); // soltar al levantar el dedo
}, { passive: false });

function handleInputAt(px, py) {
  if (gameState !== 'LEVEL_SELECT') return;
  for (const r of levelCardRects) {
    if (px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h) {
      playSound('ui');
      startLevelTransition(r.idx);
      return;
    }
  }
}

// === CHEAT CODES (debug) ===
window.addEventListener('keydown', (e) => {
  // Teclas 1-5: ir directo al nivel
  if (e.key >= '1' && e.key <= '7') {
    const lvl = parseInt(e.key) - 1;
    if (lvl < LEVELS.length) {
      initAudio();
      currentLevel = lvl;
      falls = 0;
      loadLevel(lvl);
      gameState = 'FLYING';
      dbg('CHEAT', `Nivel ${lvl + 1} cargado directamente`);
    }
  }
  // ESC: volver a selección de nivel
  if (e.key === 'Escape') {
    falls = 0;
    currentLevel = 0;
    typewriterText = '';
    typewriterIdx  = 0;
    typewriterTimer = 0;
    gameState = 'LEVEL_SELECT';
    levelSelectAnim = 0;
    MusicEngine.crossfade(7);
    dbg('CHEAT', 'Volviendo a selección de nivel');
  }
});



function startLevelTransition(idx) {
  currentLevel   = idx;
  gameState      = 'LEVEL_TRANSITION';
  transitionAlpha = 0;
  transitionDir   = 1;
  transitionDone  = false;
  transitionWait  = false;
}

function loadLevel(idx) {
  MusicEngine.crossfade(idx);
  const lev  = LEVELS[idx];
  kael.x     = lev.startX;
  // Kael empieza SOBRE el primer anchor (en el aire, cayendo)
  // para que el primer toque ya tenga momentum real
  kael.y     = lev.anchors.length > 0 ? lev.anchors[0].y + 40 : lev.startY;
  kael.vx    = 0;
  kael.vy    = 1;    // pequeña velocidad inicial de caída
  kael.onGround = false;
  kael.platIdx  = -1;
  kael.squash   = 1;
  kael.squashVel = 0;
  kael.trail    = [];
  for (const a of lev.anchors) a.used = false;
  bossEngaged = false;
  bossHitFlash = 0;
  if (lev.boss) {
    lev.boss.hp = lev.boss.maxHp;
    lev.boss.dead = false;
    lev.boss.deathTimer = 0;
    lev.boss.projectiles = [];
    lev.boss.shootTimer = lev.boss.shootInterval;
    lev.boss.phase = 0;
    lev.boss.hitCooldown = 0;
  }

  cam.x = kael.x - W * 0.5;
  cam.y = kael.y - H * 0.5;
  cam.tx = cam.x; cam.ty = cam.y;

  hintAlpha = 1;
  hintTimer = 0;
  grabCooldown = 0;
  // gameState lo controla la transición (o respawn)
}

function resetGame() {
  currentLevel = 0;
  falls        = 0;
  gameState    = 'LEVEL_SELECT';
  levelSelectAnim = 0;
  MusicEngine.crossfade(7); // música de menú
}

function killKael() {
  falls++;
  deathFlash  = 3;
  gameState   = 'DEAD';
  window.swingCombo = 0;
  window.rushMode   = false;
  kael._pumpCombo   = 0;
  spawnDeathParticles(kael.x, kael.y);
  triggerShake(20, 9);
  playSound('death');
  MusicEngine.deathFilter();
}

// === BOSS SYSTEM ===

function spawnBossProjectiles(boss) {
  if (boss.type === 'WOLF') {
    for (let i = 0; i < 2; i++) {
      boss.projectiles.push({x:boss.x-boss.w/2, y:boss.y+(i-0.5)*20,
        vx:-4, vy:i===0?-2:2, r:6, life:90, color:'#FF3333'});
    }
  } else if (boss.type === 'EAGLE') {
    for (let i = 0; i < 3; i++) {
      boss.projectiles.push({x:boss.x-boss.w/2, y:boss.y,
        vx:-5+i*0.5, vy:(i-1)*2.5, r:5, life:100, color:'#BB8800'});
    }
  } else if (boss.type === 'CROCODILE') {
    boss.projectiles.push({x:boss.x-boss.w/2, y:boss.y,
      vx:-2, vy:0, r:10, life:150, color:'#44DD22'});
  } else if (boss.type === 'TOAD') {
    boss.projectiles.push({x:boss.x-boss.w/2, y:boss.y,
      vx:-8, vy:0, r:7, life:60, color:'#FF6699'});
  } else if (boss.type === 'SHARK') {
    for (let i = 0; i < 3; i++) {
      boss.projectiles.push({x:boss.x-boss.w/2, y:boss.y+(i-1)*20,
        vx:-3, vy:(Math.random()-0.5)*4, r:8, life:120, color:'#88CCFF'});
    }
  } else if (boss.type === 'SPIDER') {
    boss.projectiles.push({x:boss.x-boss.w/2, y:boss.y,
      vx:-3, vy:1, r:12, life:120, color:'#DDDDCC', web:true});
  } else if (boss.type === 'OCTOPUS') {
    for (let i = 0; i < 5; i++) {
      const a = (i/5)*Math.PI*2;
      boss.projectiles.push({x:boss.x, y:boss.y,
        vx:Math.cos(a)*3, vy:Math.sin(a)*3, r:9, life:100, color:'#6633CC'});
    }
  }
}

function updateBoss(lev, dt) {
  const boss = lev.boss;
  if (!boss) return;
  boss.phase += dt;
  boss.wobble = Math.sin(boss.phase * 0.05) * 5;
  if (boss.hitCooldown > 0) boss.hitCooldown -= dt;
  if (bossHitFlash > 0) bossHitFlash -= dt;

  if (!boss.dead) {
    // Shooting
    boss.shootTimer -= dt;
    if (boss.shootTimer <= 0) {
      boss.shootTimer = boss.shootInterval;
      spawnBossProjectiles(boss);
    }

    // Check Kael vs boss hitbox when flying or swinging fast
    if ((gameState === 'FLYING' || gameState === 'SWINGING') && boss.hitCooldown <= 0) {
      const spd = gameState === 'FLYING'
        ? Math.sqrt(kael.vx*kael.vx + kael.vy*kael.vy)
        : Math.abs(kael.angVel) * kael.ropeLen;
      if (spd > 3 && circleAABB(kael.x, kael.y, KAEL_R,
          boss.x - boss.w/2, boss.y - boss.h/2, boss.w, boss.h)) {
        boss.hp--;
        boss.hitCooldown = 60;
        bossHitFlash = 15;
        triggerShake(8, 2);
        playSound('swing');
        for (let i = 0; i < 8; i++) {
          const ang = Math.random()*Math.PI*2;
          const sp2 = 2+Math.random()*5;
          spawnParticle(boss.x, boss.y,
            Math.cos(ang)*sp2, Math.sin(ang)*sp2,
            20+Math.random()*15, 2+Math.random()*3, '#FF4444', 1);
        }
        // Bounce Kael away from boss
        kael.vx = -kael.vx * 0.5;
        kael.vy = -Math.abs(kael.vy)*0.5 - 4;
        if (boss.hp <= 0) {
