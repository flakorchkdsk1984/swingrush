          boss.dead = true;
          boss.deathTimer = 120;
          for (let i = 0; i < 30; i++) {
            const ang = Math.random()*Math.PI*2;
            const sp3 = 3+Math.random()*9;
            spawnParticle(boss.x, boss.y,
              Math.cos(ang)*sp3, Math.sin(ang)*sp3,
              35+Math.random()*30, 3+Math.random()*4,
              i%2===0?'#FF4444':'#FFAA00', 1);
          }
          playSound('win');
          triggerShake(20, 5);
        }
      }
    }
  }

  // Move projectiles and check vs Kael
  for (let i = boss.projectiles.length - 1; i >= 0; i--) {
    const p = boss.projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) { boss.projectiles.splice(i,1); continue; }
    // Check vs Kael
    if (gameState !== 'DEAD' && gameState !== 'DEAD_WAIT' && gameState !== 'RESPAWN' && gameState !== 'WIN') {
      const dx = kael.x - p.x, dy = kael.y - p.y;
      if (dx*dx + dy*dy < (KAEL_R + p.r)*(KAEL_R + p.r)) {
        if (p.web) {
          kael.vx *= 0.4; kael.vy *= 0.4;
          boss.projectiles.splice(i,1);
        } else {
          killKael(); return;
        }
      }
    }
  }

  // Death timer
  if (boss.dead) {
    boss.deathTimer -= dt;
    if (Math.random() < 0.35) {
      spawnParticle(
        boss.x+(Math.random()-0.5)*boss.w,
        boss.y+(Math.random()-0.5)*boss.h,
        (Math.random()-0.5)*3, -1-Math.random()*3,
        20+Math.random()*15, 2+Math.random()*2,
        Math.random()<0.5?'#FF4444':'#FFAA00', 0);
    }
    if (boss.deathTimer <= 0 && gameState !== 'WIN' && gameState !== 'DEAD' && gameState !== 'DEAD_WAIT') {
      gameState = 'WIN';
      winTimer = 0;
    }
  }
}

function renderWolf(t) {
  const breathe = 1 + Math.sin(t * 1.8) * 0.02;
  const jawOpen = Math.max(0, Math.sin(t * 0.7) * 15);
  const frontSwing = Math.sin(t * 3) * 0.3;
  const backSwing = Math.sin(t * 3 + Math.PI) * 0.35;
  // Tail
  ctx.save();
  const tailSwing = Math.sin(t * 2) * 20;
  ctx.strokeStyle = '#3a3a45'; ctx.lineWidth = 8; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-55, 5);
  ctx.bezierCurveTo(-65, -10 + tailSwing * 0.3, -75, -20 + tailSwing * 0.6, -80, -30 + Math.sin(t*2+0.5)*15);
  ctx.stroke();
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#4a4a55';
  ctx.beginPath();
  ctx.moveTo(-55, 5);
  ctx.bezierCurveTo(-65, -10 + tailSwing * 0.3, -75, -20 + tailSwing * 0.6, -80, -30 + Math.sin(t*2+0.5)*15);
  ctx.stroke();
  ctx.restore();
  // Back legs
  ctx.save();
  const blHipX = -35, blHipY = 28;
  ctx.strokeStyle = '#3a3a45'; ctx.lineWidth = 8; ctx.lineCap = 'round';
  for (let s = 0; s < 2; s++) {
    const swing = s === 0 ? backSwing : -backSwing;
    const kx = blHipX + Math.sin(swing) * 38;
    const ky = blHipY + Math.cos(swing) * 38;
    const px = kx + Math.sin(swing - 0.5) * 30;
    const py = ky + Math.abs(Math.cos(swing - 0.5)) * 30;
    ctx.beginPath(); ctx.moveTo(blHipX, blHipY); ctx.lineTo(kx, ky); ctx.lineTo(px, py); ctx.stroke();
    ctx.fillStyle = '#3a3a45';
    ctx.beginPath(); ctx.ellipse(px, py, 10, 5, 0.2, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5;
    for (let c = 0; c < 3; c++) { ctx.beginPath(); ctx.moveTo(px - 6 + c * 5, py + 2); ctx.lineTo(px - 7 + c * 5, py + 8); ctx.stroke(); }
    ctx.strokeStyle = '#3a3a45'; ctx.lineWidth = 8;
  }
  ctx.restore();
  // Torso
  ctx.save();
  ctx.scale(breathe, 1 / breathe);
  ctx.fillStyle = '#4a4a55';
  ctx.beginPath(); ctx.ellipse(-5, 5, 48, 28, 0, 0, Math.PI * 2); ctx.fill();
  // Fur strokes on torso
  ctx.strokeStyle = 'rgba(90,90,100,0.4)'; ctx.lineWidth = 1.2;
  const furPts = [[-20,-8],[-10,-14],[0,-10],[10,-6],[20,-10],[-25,0],[-15,6],[5,8],[18,4],[-5,18],[10,14],[-20,12],[22,-2],[28,8],[-30,8]];
  for (const [fx,fy] of furPts) { ctx.beginPath(); ctx.moveTo(fx,fy); ctx.quadraticCurveTo(fx+3,fy-4,fx+6,fy); ctx.stroke(); }
  ctx.restore();
  // Neck
  ctx.save();
  ctx.rotate(-0.2);
  ctx.fillStyle = '#52525f';
  ctx.beginPath(); ctx.ellipse(28, -15, 18, 22, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // Head
  ctx.fillStyle = '#52525f';
  ctx.beginPath(); ctx.ellipse(46, -22, 28, 24, 0, 0, Math.PI * 2); ctx.fill();
  // Ears
  ctx.fillStyle = '#3a3a45';
  ctx.beginPath(); ctx.moveTo(28,-38); ctx.lineTo(38,-58); ctx.lineTo(50,-35); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(42,-35); ctx.lineTo(54,-55); ctx.lineTo(62,-32); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#cc8899';
  ctx.beginPath(); ctx.moveTo(32,-38); ctx.lineTo(39,-52); ctx.lineTo(47,-37); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(200,100,120,0.5)';
  ctx.beginPath(); ctx.moveTo(46,-35); ctx.lineTo(55,-50); ctx.lineTo(60,-34); ctx.closePath(); ctx.fill();
  // Snout
  ctx.fillStyle = '#5a5a68';
  ctx.beginPath(); ctx.ellipse(68, -18, 18, 12, 0, 0, Math.PI * 2); ctx.fill();
  // Upper jaw line
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(52,-14); ctx.lineTo(82,-14); ctx.stroke();
  // Lower jaw with open
  if (jawOpen > 0) {
    ctx.fillStyle = '#3a2028';
    ctx.beginPath(); ctx.ellipse(68, -14 + jawOpen * 0.5, 16, jawOpen * 0.5 + 2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#cc3344';
    ctx.beginPath(); ctx.ellipse(65, -12 + jawOpen * 0.3, 8, 4, 0, 0, Math.PI * 2); ctx.fill();
  }
  // Fangs
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath(); ctx.moveTo(60,-14); ctx.lineTo(57,-14+8); ctx.lineTo(63,-14); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(70,-14); ctx.lineTo(67,-14+8); ctx.lineTo(73,-14); ctx.closePath(); ctx.fill();
  // Brow ridge
  ctx.strokeStyle = '#2a2a33'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(52, -30, 8, Math.PI * 1.1, Math.PI * 1.9); ctx.stroke();
  // Eye
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.ellipse(52, -24, 7, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#FF3300';
  ctx.beginPath(); ctx.arc(52, -24, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(52, -24, 1.5, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.save();
  ctx.shadowColor = '#FF2200'; ctx.shadowBlur = 12;
  ctx.fillStyle = '#FF3300';
  ctx.beginPath(); ctx.arc(52, -24, 5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(52, -24, 1.5, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Nose
  ctx.fillStyle = '#2a2030';
  ctx.beginPath(); ctx.ellipse(80, -22, 5, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  // Front legs
  ctx.strokeStyle = '#3a3a45'; ctx.lineWidth = 7; ctx.lineCap = 'round';
  for (let s = 0; s < 2; s++) {
    const swing = s === 0 ? frontSwing : -frontSwing;
    const hipX = -10, hipY = 25;
    const kx = hipX + Math.sin(swing) * 36;
    const ky = hipY + Math.cos(swing) * 36;
    const px = kx + Math.sin(swing - 0.4) * 30;
    const py = ky + Math.abs(Math.cos(swing - 0.4)) * 30;
    ctx.beginPath(); ctx.moveTo(hipX, hipY); ctx.lineTo(kx, ky); ctx.lineTo(px, py); ctx.stroke();
    ctx.fillStyle = '#3a3a45';
    ctx.beginPath(); ctx.ellipse(px, py, 10, 5, 0.2, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5;
    for (let c = 0; c < 3; c++) { ctx.beginPath(); ctx.moveTo(px - 6 + c * 5, py + 2); ctx.lineTo(px - 7 + c * 5, py + 8); ctx.stroke(); }
    ctx.strokeStyle = '#3a3a45'; ctx.lineWidth = 7;
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

function renderEagle(t) {
  const wingAngle = Math.sin(t * 2.5) * 0.35;
  const wingFlex = Math.cos(t * 2.5) * 0.2;
  const wingLift = wingAngle * 60;
  const wingLiftR = Math.sin(t * 2.5 + 0.4) * 60;
  // Left wing surface
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.moveTo(-8, -4);
  ctx.bezierCurveTo(-35, -20 + wingAngle * 30, -70, -18 + wingAngle * 50, -95, -10 + wingLift);
  ctx.bezierCurveTo(-70, 2 + wingAngle * 20, -35, 4, -8, 8);
  ctx.closePath(); ctx.fill();
  // Left wing underside lighter sheen
  ctx.fillStyle = 'rgba(160,82,45,0.5)';
  ctx.beginPath();
  ctx.moveTo(-8, 0);
  ctx.bezierCurveTo(-35, -12 + wingAngle * 22, -65, -10 + wingAngle * 38, -88, -4 + wingLift * 0.8);
  ctx.bezierCurveTo(-65, 6, -35, 6, -8, 8);
  ctx.closePath(); ctx.fill();
  // Left primary feather tips (7 points)
  ctx.strokeStyle = '#6B3410'; ctx.lineWidth = 1.8;
  for (let i = 0; i < 7; i++) {
    const prog = i / 6;
    const fx = -78 - prog * 14;
    const fy = -12 + wingLift * 0.9 + prog * 8;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(fx - 8, fy + 12 + prog * 4);
    ctx.stroke();
  }
  // Right wing surface
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.moveTo(8, -4);
  ctx.bezierCurveTo(35, -20 + Math.sin(t*2.5+0.4)*30, 70, -18 + wingLiftR*0.8, 95, -10 + wingLiftR);
  ctx.bezierCurveTo(70, 2 + Math.sin(t*2.5+0.4)*20, 35, 4, 8, 8);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(160,82,45,0.5)';
  ctx.beginPath();
  ctx.moveTo(8, 0);
  ctx.bezierCurveTo(35, -12 + Math.sin(t*2.5+0.4)*22, 65, -10 + wingLiftR*0.6, 88, -4 + wingLiftR*0.8);
  ctx.bezierCurveTo(65, 6, 35, 6, 8, 8);
  ctx.closePath(); ctx.fill();
  // Right primary tips
  for (let i = 0; i < 7; i++) {
    const prog = i / 6;
    const fx = 78 + prog * 14;
    const fy = -12 + wingLiftR * 0.9 + prog * 8;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(fx + 8, fy + 12 + prog * 4);
    ctx.stroke();
  }
  // Feather detail lines on left wing
  ctx.strokeStyle = '#6B3410'; ctx.lineWidth = 1.2;
  for (let i = 0; i < 5; i++) {
    const t2 = (i + 1) / 6;
    ctx.beginPath();
    ctx.moveTo(-8 - t2 * 50, -4 + wingAngle * t2 * 40);
    ctx.quadraticCurveTo(-8 - t2 * 55, 4 + wingAngle * t2 * 30, -8 - t2 * 60, 8 + wingAngle * t2 * 20);
    ctx.stroke();
  }
  // Tail feathers
  ctx.fillStyle = '#8B4513';
  for (let i = 0; i < 5; i++) {
    const ang = -0.25 + i * 0.12;
    const osc = Math.sin(t * 1.5 + i * 0.4) * 2;
    ctx.beginPath();
    ctx.moveTo(18, 12);
    ctx.bezierCurveTo(28 + Math.cos(ang) * 15, 22 + Math.sin(ang) * 10 + osc, 34 + Math.cos(ang) * 22, 28 + Math.sin(ang) * 16 + osc, 36 + Math.cos(ang) * 28, 32 + Math.sin(ang) * 20 + osc);
    ctx.lineWidth = 4 - i * 0.5;
    ctx.strokeStyle = '#7B3A10';
    ctx.stroke();
  }
  // Body torso
  ctx.fillStyle = '#6B3A1F';
  ctx.beginPath(); ctx.ellipse(0, 0, 24, 18, 0, 0, Math.PI * 2); ctx.fill();
  // Neck
  ctx.fillStyle = '#EEEEEE';
  ctx.beginPath(); ctx.ellipse(-12, -18, 12, 14, 0, 0, Math.PI * 2); ctx.fill();
  // Head
  ctx.beginPath(); ctx.ellipse(-20, -28, 18, 16, 0, 0, Math.PI * 2); ctx.fill();
  // Beak upper
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(-34, -28); ctx.bezierCurveTo(-42, -33, -50, -32, -50, -26);
  ctx.lineTo(-50, -26); ctx.bezierCurveTo(-50, -30, -42, -28, -34, -26);
  ctx.closePath(); ctx.fill();
  // Beak lower
  ctx.beginPath();
  ctx.moveTo(-34, -26); ctx.lineTo(-46, -28); ctx.lineTo(-46, -24); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#CC9900'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-34,-28); ctx.bezierCurveTo(-44,-33,-50,-30,-50,-26); ctx.stroke();
  // Eye
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.arc(-24, -30, 5, 0, Math.PI * 2); ctx.fill();
  ctx.save();
  ctx.shadowColor = '#FFAA00'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.arc(-24, -30, 5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-24, -30, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(-26, -32, 1.5, 0, Math.PI * 2); ctx.fill();
  // Eye brow ridge
  ctx.strokeStyle = '#8B6040'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(-24, -34, 6, Math.PI * 1.1, Math.PI * 1.9); ctx.stroke();
  // Talons
  ctx.strokeStyle = '#444'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-2, 18); ctx.bezierCurveTo(-8, 28, -14, 34, -20, 40); ctx.stroke();
  for (let c = 0; c < 3; c++) {
    const cx = -20 + c * 5 - 5, cy = 40;
    ctx.beginPath(); ctx.arc(cx, cy, 5, Math.PI * 0.8 + c * 0.3, Math.PI * 1.6 + c * 0.3); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(-2, 18); ctx.bezierCurveTo(0, 28, 0, 36, 0, 42); ctx.stroke();
  for (let c = 0; c < 3; c++) {
    ctx.beginPath(); ctx.arc(-5 + c * 5, 42, 5, Math.PI * 0.8 + c * 0.3, Math.PI * 1.6 + c * 0.3); ctx.stroke();
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

function renderCrocodile(t) {
  const breathe = 1 + Math.sin(t * 1.2) * 0.015;
  const legCycle = Math.sin(t * 2.5);
  const jawOpen = Math.abs(Math.sin(t * 0.8)) * 18 + 2;
  ctx.save();
  // Tail
  const tailAngle = Math.sin(t * 1.8) * 0.43;
  ctx.save();
  ctx.translate(80, 0);
  ctx.rotate(tailAngle);
  ctx.fillStyle = '#2a5518';
  ctx.beginPath(); ctx.moveTo(0, -10); ctx.bezierCurveTo(20,-8,40,-4,50,0); ctx.bezierCurveTo(40,4,20,8,0,10); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#1e3d0f'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath(); ctx.moveTo(i*12+4,-10+i*2); ctx.lineTo(i*12+9,-16+i*2); ctx.lineTo(i*12+14,-10+i*2); ctx.closePath();
    ctx.fillStyle = '#1e3d0f'; ctx.fill();
  }
  ctx.restore();
  // Body segments
  ctx.scale(breathe, 1);
  const segColors = ['#2a5518','#2d5a1b','#2a5518','#285015','#2a5518'];
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = segColors[i];
    ctx.beginPath(); ctx.ellipse(-70 + i * 35, 0, 24, 16, 0, 0, Math.PI * 2); ctx.fill();
  }
  // Underbelly
  ctx.fillStyle = '#8ab068';
  ctx.beginPath(); ctx.rect(-75, 5, 145, 10); ctx.fill();
  // Dorsal plates
  ctx.fillStyle = '#1e3d0f';
  const plateXs = [-65,-50,-36,-22,-8,6,20,34,48,62,72,78];
  for (const px of plateXs) {
    ctx.beginPath();
    ctx.moveTo(px, -14); ctx.lineTo(px + 5, -26 + Math.sin(px)*3); ctx.lineTo(px + 10, -14);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#234810';
    ctx.beginPath(); ctx.moveTo(px+2,-14); ctx.lineTo(px+5,-22+Math.sin(px)*2); ctx.lineTo(px+8,-14); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#1e3d0f';
  }
  // Scale suggestion
  ctx.strokeStyle = 'rgba(40,80,20,0.45)'; ctx.lineWidth = 1;
  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 9; col++) {
      const sx = -68 + col * 16 + (row % 2) * 8, sy = -8 + row * 6;
      ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx+6,sy+3); ctx.lineTo(sx+12,sy); ctx.lineTo(sx+6,sy-3); ctx.closePath(); ctx.stroke();
    }
  }
  // Legs
  ctx.strokeStyle = '#1e3d0f'; ctx.lineWidth = 7; ctx.lineCap = 'round';
  const legData = [[-52,14],[-28,14],[14,14],[38,14]];
  for (let i = 0; i < 4; i++) {
    const [lx,ly] = legData[i];
    const sw = (i % 2 === 0 ? legCycle : -legCycle) * 0.25;
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx+Math.sin(sw)*18, ly+16); ctx.lineTo(lx+Math.sin(sw)*12+8, ly+28); ctx.stroke();
    ctx.fillStyle = '#1e3d0f';
    ctx.beginPath();
    for (let c = 0; c < 4; c++) { ctx.moveTo(lx+Math.sin(sw)*12+2+c*5, ly+30); ctx.lineTo(lx+Math.sin(sw)*12-2+c*5, ly+38); }
    ctx.stroke();
  }
  ctx.restore();
  // Head
  ctx.fillStyle = '#2a5518';
  ctx.beginPath(); ctx.ellipse(88, -2, 44, 20, 0, 0, Math.PI * 2); ctx.fill();
  // Upper jaw
  ctx.fillStyle = '#2d5a1b';
  ctx.beginPath(); ctx.rect(50, -22, 80, 20); ctx.fill();
  // Lower jaw
  ctx.fillStyle = '#265215';
  ctx.beginPath(); ctx.rect(50, 2, 80, 18 + jawOpen * 0.5); ctx.fill();
  // Tongue
  ctx.fillStyle = '#cc4444';
  ctx.beginPath(); ctx.ellipse(90, jawOpen * 0.4, 18, 6, 0, 0, Math.PI * 2); ctx.fill();
  // Teeth upper (6)
  ctx.fillStyle = '#f0f0f0';
  for (let i = 0; i < 6; i++) {
    ctx.beginPath(); ctx.moveTo(56+i*11,-2); ctx.lineTo(60+i*11,-12); ctx.lineTo(64+i*11,-2); ctx.closePath(); ctx.fill();
  }
  // Teeth lower (5)
  ctx.fillStyle = '#e8e8e8';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath(); ctx.moveTo(60+i*11, 2+jawOpen*0.15); ctx.lineTo(64+i*11, 12+jawOpen*0.15); ctx.lineTo(68+i*11, 2+jawOpen*0.15); ctx.closePath(); ctx.fill();
  }
  // Eye
  ctx.fillStyle = '#FFee00';
  ctx.beginPath(); ctx.ellipse(62, -16, 8, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(62, -16, 2, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#1a3a0a'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(62, -22, 8, Math.PI * 1.1, Math.PI * 1.9); ctx.stroke();
  // Nostril slits
  ctx.fillStyle = '#1a3a0a';
  ctx.beginPath(); ctx.ellipse(122, -8, 3, 2, 0.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(128, -7, 3, 2, 0.4, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

function renderToad(t) {
  const breathe = 1 + Math.sin(t * 2.2) * 0.04;
  const gulpPulse = Math.max(0, Math.sin(t * 1.5) * 0.5 + 0.3);
  const eyePulse = 1 + Math.sin(t * 3) * 0.05;
  const armBob = Math.sin(t * 2.5 + Math.PI / 2) * 4;
  const tongueOut = Math.max(0, Math.sin(t * 0.9 - 1) * 2);
  // Back legs
  ctx.strokeStyle = '#3a6020'; ctx.lineWidth = 14; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-38,30); ctx.lineTo(-55,55); ctx.lineTo(-45,75); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(38,30); ctx.lineTo(55,55); ctx.lineTo(45,75); ctx.stroke();
  ctx.lineWidth = 10;
  // Webbed toes left
  ctx.strokeStyle = '#4a7a28'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(-45,75); ctx.lineTo(-70,80); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-45,75); ctx.lineTo(-55,86); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-45,75); ctx.lineTo(-40,86); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-45,75); ctx.lineTo(-28,80); ctx.stroke();
  // Webbed toes right
  ctx.beginPath(); ctx.moveTo(45,75); ctx.lineTo(70,80); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(45,75); ctx.lineTo(55,86); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(45,75); ctx.lineTo(40,86); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(45,75); ctx.lineTo(28,80); ctx.stroke();
  // Throat vocal sac
  if (gulpPulse > 0) {
    ctx.fillStyle = `rgba(120,200,60,${0.5 + gulpPulse * 0.3})`;
    ctx.beginPath(); ctx.ellipse(0, 36, 32 * gulpPulse + 10, 22 * gulpPulse + 8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(80,160,40,0.4)'; ctx.lineWidth = 1.5;
    for (let v = 0; v < 5; v++) {
      const vang = v / 5 * Math.PI * 2;
      ctx.beginPath(); ctx.moveTo(0, 36); ctx.quadraticCurveTo(Math.cos(vang) * 16, 36 + Math.sin(vang) * 12, Math.cos(vang) * 30, 36 + Math.sin(vang) * 20); ctx.stroke();
    }
  }
  // Main body
  ctx.save();
  ctx.scale(breathe, 1 / breathe);
  const grad = ctx.createRadialGradient(0, 0, 10, 0, 0, 55);
  grad.addColorStop(0, '#5a8a35');
  grad.addColorStop(1, '#2d5018');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(0, 5, 52, 42, 0, 0, Math.PI * 2); ctx.fill();
  // Spots
  ctx.fillStyle = '#3a6020';
  const spotPts = [[-22,-5],[18,-8],[-10,10],[20,5],[-5,-18],[12,-16],[-30,5],[28,2]];
  for (const [sx,sy] of spotPts) { ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI * 2); ctx.fill(); }
  // Warts
  ctx.fillStyle = '#4a7a28';
  const warts = [[-35,0],[-28,12],[-18,20],[0,22],[18,18],[30,8],[25,-5],[-8,-16],[14,-10],[-25,-12],[35,0],[-38,6]];
  for (const [wx,wy] of warts) { ctx.beginPath(); ctx.arc(wx, wy, 4 + Math.sin(wx) * 1.5, 0, Math.PI * 2); ctx.fill(); }
  ctx.restore();
  // Front arms
  ctx.strokeStyle = '#3a6020'; ctx.lineWidth = 9;
  ctx.beginPath(); ctx.moveTo(-25, 15); ctx.lineTo(-32, 28 + armBob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(25, 15); ctx.lineTo(32, 28 + armBob); ctx.stroke();
  ctx.lineWidth = 3;
  for (let c = 0; c < 4; c++) { ctx.beginPath(); ctx.moveTo(-32 + c * 3, 28 + armBob); ctx.lineTo(-34 + c * 3, 36 + armBob); ctx.stroke(); }
  for (let c = 0; c < 4; c++) { ctx.beginPath(); ctx.moveTo(32 - c * 3, 28 + armBob); ctx.lineTo(34 - c * 3, 36 + armBob); ctx.stroke(); }
  // Eyes
  ctx.save();
  ctx.shadowColor = '#AAEE44'; ctx.shadowBlur = 10;
  // Left eye
  ctx.fillStyle = '#2d5018';
  ctx.beginPath(); ctx.ellipse(-26, -32, 18, 16, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#AAEE44';
  ctx.beginPath(); ctx.ellipse(-26, -32, 15 * eyePulse, 13 * eyePulse, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#DDCC00';
  ctx.beginPath(); ctx.arc(-26, -32, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#AAEE44';
  ctx.beginPath(); ctx.arc(-26, -32, 7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(-26, -32, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.arc(-30, -36, 2, 0, Math.PI * 2); ctx.fill();
  // Right eye
  ctx.fillStyle = '#2d5018';
  ctx.beginPath(); ctx.ellipse(26, -32, 18, 16, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#AAEE44';
  ctx.beginPath(); ctx.ellipse(26, -32, 15 * eyePulse, 13 * eyePulse, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#DDCC00';
  ctx.beginPath(); ctx.arc(26, -32, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#AAEE44';
  ctx.beginPath(); ctx.arc(26, -32, 7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(26, -32, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.arc(22, -36, 2, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // Mouth
  ctx.strokeStyle = '#2d5018'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(-40, 10); ctx.quadraticCurveTo(0, 22, 40, 10); ctx.stroke();
  // Tongue
  if (tongueOut > 0.1) {
    ctx.fillStyle = '#ee3344';
    ctx.beginPath();
    ctx.moveTo(-8, 12);
    ctx.bezierCurveTo(-5, 12 + tongueOut * 20, 5, 12 + tongueOut * 30, 8, 12 + tongueOut * 25);
    ctx.bezierCurveTo(10, 12 + tongueOut * 35, -12, 12 + tongueOut * 35, -8, 12 + tongueOut * 25);
    ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

function renderShark(t) {
  const swimOsc = Math.sin(t * 2.5) * 6;
  const tailWag = Math.sin(t * 2.5 + 0.5) * 20;
  const mouthOpen = 8 + Math.sin(t * 0.6) * 6;
  ctx.save();
  ctx.translate(swimOsc, 0);
  // Skin gradient body
  const skinGrad = ctx.createLinearGradient(0, -26, 0, 20);
  skinGrad.addColorStop(0, '#4a6070');
  skinGrad.addColorStop(0.5, '#708090');
  skinGrad.addColorStop(1, '#e0e0e0');
  ctx.fillStyle = skinGrad;
  ctx.beginPath(); ctx.ellipse(0, 0, 65, 26, 0, 0, Math.PI * 2); ctx.fill();
  // Belly
  ctx.fillStyle = '#d8d8d8';
  ctx.beginPath(); ctx.ellipse(-5, 10, 55, 18, 0, 0, Math.PI * 2); ctx.fill();
  // Lateral line
  ctx.strokeStyle = 'rgba(60,70,80,0.35)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-55, -4); ctx.bezierCurveTo(-20,-8, 20,-8, 55,-4); ctx.stroke();
  // Dermal denticle suggestion
  ctx.strokeStyle = 'rgba(60,70,80,0.12)'; ctx.lineWidth = 0.8;
  for (let dx = -50; dx < 55; dx += 10) {
    for (let dy = -18; dy < 0; dy += 8) {
      ctx.beginPath(); ctx.moveTo(dx, dy); ctx.lineTo(dx+5, dy+5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(dx+5, dy); ctx.lineTo(dx, dy+5); ctx.stroke();
    }
  }
  // Caudal fin (tail)
  ctx.fillStyle = '#607080';
  ctx.beginPath(); ctx.moveTo(-55,0); ctx.bezierCurveTo(-65,-8,-80,-14,-82,-22+tailWag); ctx.bezierCurveTo(-72,-12,-62,-4,-55,0); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-55,0); ctx.bezierCurveTo(-65,8,-76,14,-78,18+tailWag); ctx.bezierCurveTo(-68,12,-60,4,-55,0); ctx.closePath(); ctx.fill();
  // Dorsal fin
  const finFlutter = Math.sin(t * 3) * 2;
  ctx.fillStyle = '#607080';
  ctx.beginPath(); ctx.moveTo(5,-26); ctx.bezierCurveTo(12,-42,18,-58+finFlutter,20,-58+finFlutter); ctx.bezierCurveTo(24,-52+finFlutter,30,-38,35,-26); ctx.closePath(); ctx.fill();
  // Pectoral fins
  ctx.beginPath(); ctx.moveTo(10,-4); ctx.lineTo(22,-20); ctx.lineTo(40,-14); ctx.lineTo(10,4); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(10,8); ctx.lineTo(22,22); ctx.lineTo(38,18); ctx.lineTo(10,14); ctx.closePath(); ctx.fill();
  // Pelvic fins
  ctx.beginPath(); ctx.moveTo(-25,12); ctx.lineTo(-18,26); ctx.lineTo(-10,14); ctx.closePath(); ctx.fill();
  // Gill slits (5)
  ctx.strokeStyle = 'rgba(60,70,80,0.6)'; ctx.lineWidth = 2;
  for (let g = 0; g < 5; g++) {
    const gx = 15 - g * 8;
    ctx.beginPath(); ctx.moveTo(gx, -18); ctx.quadraticCurveTo(gx - 3, 0, gx, 15); ctx.stroke();
  }
  // Mouth gum
  ctx.fillStyle = '#cc4444';
  ctx.beginPath(); ctx.ellipse(55, 2, 14, mouthOpen * 0.6 + 4, 0, 0, Math.PI * 2); ctx.fill();
  // Teeth row 3 (back)
  ctx.fillStyle = '#cccccc';
  for (let i = 0; i < 4; i++) { ctx.beginPath(); ctx.moveTo(47+i*5,-2+mouthOpen*0.1); ctx.lineTo(49+i*5,-8+mouthOpen*0.1); ctx.lineTo(51+i*5,-2+mouthOpen*0.1); ctx.closePath(); ctx.fill(); }
  // Teeth row 2
  ctx.fillStyle = '#e0e0e0';
  for (let i = 0; i < 5; i++) { ctx.beginPath(); ctx.moveTo(46+i*5,-3+mouthOpen*0.08); ctx.lineTo(48+i*5,-11+mouthOpen*0.08); ctx.lineTo(50+i*5,-3+mouthOpen*0.08); ctx.closePath(); ctx.fill(); }
  // Teeth row 1 (front)
  ctx.fillStyle = '#f8f8f8';
  for (let i = 0; i < 6; i++) { ctx.beginPath(); ctx.moveTo(45+i*5,-4); ctx.lineTo(47+i*5,-16); ctx.lineTo(49+i*5,-4); ctx.closePath(); ctx.fill(); }
  // Lower jaw teeth
  ctx.fillStyle = '#f0f0f0';
  for (let i = 0; i < 5; i++) { ctx.beginPath(); ctx.moveTo(46+i*5, 4+mouthOpen*0.15); ctx.lineTo(48+i*5, 14+mouthOpen*0.15); ctx.lineTo(50+i*5, 4+mouthOpen*0.15); ctx.closePath(); ctx.fill(); }
  // Upper jaw shape
  ctx.fillStyle = '#607080';
  ctx.beginPath(); ctx.moveTo(52,-4); ctx.bezierCurveTo(60,-8,70,-10,72,-8); ctx.bezierCurveTo(68,-4,58,0,52,-4); ctx.closePath(); ctx.fill();
  // Lower jaw
  ctx.fillStyle = '#506070';
  ctx.beginPath(); ctx.moveTo(52, 4+mouthOpen); ctx.bezierCurveTo(60,8+mouthOpen,70,10+mouthOpen,72,8+mouthOpen); ctx.bezierCurveTo(68,4+mouthOpen,58,0+mouthOpen,52,4+mouthOpen); ctx.closePath(); ctx.fill();
  // Eye sclera
  ctx.fillStyle = '#111111';
  ctx.beginPath(); ctx.arc(32, -6, 8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(32 + Math.sin(t * 0.4), -6 + Math.cos(t * 0.3), 4, 0, Math.PI * 2); ctx.fill();
  // Nictitating membrane
  const openMem = Math.sin(t * 0.3 + 1) > 0.8 ? 1 : 0;
  if (openMem) {
    ctx.fillStyle = 'rgba(220,220,220,0.7)';
    ctx.beginPath(); ctx.arc(32, -6, 8, -0.4, 0.4); ctx.fill();
  }
  ctx.restore();
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

function renderSpider(t) {
  const pulsate = 1 + Math.sin(t * 2) * 0.04;
  const fangDrip = Math.sin(t * 1.5) * 3;
  const phases = [0, 0.5, 0.8, 0.3, 0.7, 0.2, 0.9, 0.4];
  // Web thread
  ctx.strokeStyle = 'rgba(220,220,240,0.3)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-20, 47); ctx.bezierCurveTo(-20, 60, -15, 72, -18, 80); ctx.stroke();
  // Legs (8 legs as bezier curves)
  const legDefs = [
    [8,-10,-25,-45,-65,-35], [8,-4,-28,-28,-72,-8],
    [8,4,-26,-8,-70,20],    [8,12,-20,20,-58,50],
    [24,-10,55,-45,90,-35], [24,-4,58,-28,96,-8],
    [24,4,56,-8,92,20],     [24,12,52,20,82,50],
  ];
  ctx.lineCap = 'round';
  for (let i = 0; i < 8; i++) {
    const [ax,ay,kx,ky,fx,fy] = legDefs[i];
    const tw = Math.sin(t * 6 + phases[i] * Math.PI * 2) * 3;
    ctx.strokeStyle = '#222230'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.quadraticCurveTo(kx+tw,ky, fx+tw*0.5,fy); ctx.stroke();
    ctx.strokeStyle = '#151520'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.quadraticCurveTo(kx+tw,ky, fx+tw*0.5,fy); ctx.stroke();
    // Leg hair
    ctx.strokeStyle = 'rgba(100,100,120,0.35)'; ctx.lineWidth = 1;
    for (let h = 0; h < 4; h++) {
      const ht = (h + 1) / 5;
      const hx = ax + (fx + tw * 0.5 - ax) * ht, hy = ay + (fy - ay) * ht;
      ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(hx + (i<4?-4:4), hy - 5); ctx.stroke();
    }
    // Tarsus claw
    ctx.strokeStyle = '#303040'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(fx+tw*0.5,fy); ctx.lineTo(fx+tw*0.5+(i<4?-5:5),fy-4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx+tw*0.5,fy); ctx.lineTo(fx+tw*0.5+(i<4?-5:5),fy+2); ctx.stroke();
  }
  // Abdomen
  ctx.fillStyle = '#111118';
  ctx.beginPath(); ctx.ellipse(-20, 15, 38 * pulsate, 32 * pulsate, 0, 0, Math.PI * 2); ctx.fill();
  // Hourglass mark on abdomen
  ctx.fillStyle = 'rgba(204,0,0,0.9)';
  ctx.beginPath(); ctx.moveTo(-20,5); ctx.lineTo(-10,13); ctx.lineTo(-20,21); ctx.lineTo(-30,13); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.arc(-20,5,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-20,21,4,0,Math.PI*2); ctx.fill();
  // Abdomen stripes
  ctx.strokeStyle = 'rgba(50,50,80,0.4)'; ctx.lineWidth = 2;
  for (let s = 0; s < 3; s++) {
    const sy = 8 + s * 7;
    ctx.beginPath(); ctx.ellipse(-20, sy, 30 - s * 3, 3, 0, 0, Math.PI * 2); ctx.stroke();
  }
  // Spinneret
  ctx.fillStyle = '#0d0d14';
  ctx.beginPath(); ctx.ellipse(-20, 47, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Cephalothorax
  ctx.fillStyle = '#1a1a22';
  ctx.beginPath(); ctx.ellipse(16, -5, 24, 20, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222230';
  ctx.beginPath(); ctx.ellipse(16, -5, 16, 14, 0, 0, Math.PI * 2); ctx.fill();
  // Chelicerae / fangs
  ctx.strokeStyle = '#333340'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(10,8); ctx.bezierCurveTo(6,18, 5,24, 5,28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(22,8); ctx.bezierCurveTo(26,18, 27,24, 27,28); ctx.stroke();
  // Venom droplets
  ctx.fillStyle = 'rgba(100,255,50,0.85)';
  ctx.beginPath(); ctx.arc(5, 28 + fangDrip, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(27, 28 + fangDrip, 3, 0, Math.PI * 2); ctx.fill();
  // Eyes (8)
  ctx.save();
  ctx.shadowColor = '#FF0000'; ctx.shadowBlur = 10;
  // Principal eyes (2 large)
  ctx.fillStyle = '#FF0000';
  ctx.beginPath(); ctx.arc(10,-15,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(22,-15,5,0,Math.PI*2); ctx.fill();
  // Secondary row (4 medium)
  ctx.fillStyle = '#CC0000';
  ctx.beginPath(); ctx.arc(5,-12,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(14,-20,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(18,-20,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(27,-12,3,0,Math.PI*2); ctx.fill();
  // Tertiary (2 small, outer)
  ctx.fillStyle = '#990000';
  ctx.beginPath(); ctx.arc(2,-8,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(30,-8,2,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

function renderOctopus(t) {
  const chromo = Math.sin(t * 1.5) * 0.5 + 0.5;
  const r = Math.floor(100 + chromo * 80);
  const b = Math.floor(180 + chromo * 60);
  const mantleBob = Math.sin(t * 1.8) * 4;
  ctx.save();
  ctx.translate(0, mantleBob);
  // Tentacles (8)
  const tentPhases = [0, 0.785, 1.57, 2.356, 3.14, 3.927, 4.712, 5.498];
  for (let i = 0; i < 8; i++) {
    const ph = tentPhases[i];
    const bx = -40 + i * 11;
    const by = 28;
    const w1 = Math.sin(t * 1.8 + ph) * 25;
    const w2 = Math.sin(t * 2.2 + ph + 1) * 15;
    const mx = bx + w1;
    const my = by + 45;
    const ex = bx + w1 * 0.5 + w2;
    const ey = by + 90;
    // Multi-stroke taper effect
    const tc = `rgb(${r-20},35,${b-20})`;
    for (let lw = 4; lw >= 1; lw--) {
      ctx.strokeStyle = lw > 2 ? tc : `rgba(${r-40},25,${b-40},0.7)`;
      ctx.lineWidth = lw * 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.bezierCurveTo(bx + w1 * 0.5, by + 22, mx, my - 8, mx, my);
      ctx.bezierCurveTo(mx, my + 15, ex + w2 * 0.3, ey - 15, ex, ey);
      ctx.stroke();
    }
    // Suckers (5 per tentacle)
    ctx.fillStyle = 'rgba(200,180,255,0.6)';
    ctx.strokeStyle = 'rgba(100,80,200,0.8)'; ctx.lineWidth = 1;
    for (let s = 0; s < 5; s++) {
      const st = (s + 1) / 6;
      const sx = bx + (mx - bx) * st + (ex - bx) * st * 0.2;
      const sy = by + (ey - by) * st;
      ctx.beginPath(); ctx.arc(sx + Math.sin(t*2+ph+s)*2, sy, 2.5, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    }
  }
  // Mantle body
  const mantleGrad = ctx.createRadialGradient(0, -30, 5, 0, -15, 55);
  mantleGrad.addColorStop(0, `rgba(${r+60},80,${b+20},0.9)`);
  mantleGrad.addColorStop(0.6, `rgb(${r},40,${b})`);
  mantleGrad.addColorStop(1, `rgb(${r-30},20,${b-30})`);
  ctx.fillStyle = mantleGrad;
  ctx.beginPath(); ctx.ellipse(0, -15, 42, 52, 0, 0, Math.PI * 2); ctx.fill();
  // Mantle highlight sheen
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.beginPath(); ctx.ellipse(-8, -28, 14, 12, -0.5, 0, Math.PI * 2); ctx.fill();
  // Bioluminescent spots
  ctx.save();
  ctx.shadowColor = '#64E6FF'; ctx.shadowBlur = 8;
  const spotPositions = [[-18,-32],[-5,-38],[10,-30],[20,-22],[-22,-18],[-12,-10],[15,-12],[25,-5],[-28,-5],[0,-20],[22,-30],[-8,-42]];
  for (let i = 0; i < 12; i++) {
    const [sx,sy] = spotPositions[i];
    const sp = Math.sin(t * 3 + i * 0.8) * 0.5 + 0.5;
    ctx.fillStyle = `rgba(100,230,255,${0.3 + sp * 0.4})`;
    ctx.beginPath(); ctx.arc(sx, sy, 3 + sp * 2, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
  // Eyes
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(-18, -8, 16, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = 'rgba(200,180,240,0.85)';
  ctx.beginPath(); ctx.arc(-18, -8, 14, 0, Math.PI * 2); ctx.fill();
  // W-pupil left
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(-26,-8); ctx.lineTo(-24,-4); ctx.lineTo(-21,-10); ctx.lineTo(-18,-6); ctx.lineTo(-15,-10); ctx.lineTo(-12,-4); ctx.lineTo(-10,-8);
  ctx.lineTo(-10,-12); ctx.lineTo(-18,-14); ctx.lineTo(-26,-12); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.arc(-22, -12, 3, 0, Math.PI * 2); ctx.fill();
  // Right eye
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(18, -8, 16, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = 'rgba(200,180,240,0.85)';
  ctx.beginPath(); ctx.arc(18, -8, 14, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(10,-8); ctx.lineTo(12,-4); ctx.lineTo(15,-10); ctx.lineTo(18,-6); ctx.lineTo(21,-10); ctx.lineTo(24,-4); ctx.lineTo(26,-8);
  ctx.lineTo(26,-12); ctx.lineTo(18,-14); ctx.lineTo(10,-12); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.arc(14, -12, 3, 0, Math.PI * 2); ctx.fill();
  // Funnel/siphon
  ctx.fillStyle = `rgb(${r-30},20,${b-30})`;
  ctx.beginPath(); ctx.ellipse(12, 34, 5, 8, 0, 0, Math.PI * 2); ctx.fill();
  // Ink cloud effect (every ~4s)
  const inkActive = Math.sin(t * Math.PI / 2) > 0.95 ? 1 : 0;
  if (inkActive) {
    ctx.fillStyle = 'rgba(10,5,20,0.5)';
    ctx.beginPath(); ctx.arc(0, 50, 30, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

function renderBoss(lev) {
  const boss = lev.boss;
  if (!boss) return;
  const s = worldToScreen(boss.x, boss.y);
  if (s.x < -200 || s.x > W+200 || s.y < -200 || s.y > H+200) return;

  for (const p of boss.projectiles) {
    const ps = worldToScreen(p.x, p.y);
    const alpha = Math.min(1, p.life/30);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(ps.x, ps.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  ctx.save();
  ctx.translate(s.x, s.y + boss.wobble);

  if (boss.hitCooldown > 0 && Math.floor(boss.hitCooldown/6)%2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  const t = boss.phase * 0.016;

  if (!boss.dead) {
    if (boss.type === 'WOLF')           renderWolf(t);
    else if (boss.type === 'EAGLE')     renderEagle(t);
    else if (boss.type === 'CROCODILE') renderCrocodile(t);
    else if (boss.type === 'TOAD')      renderToad(t);
    else if (boss.type === 'SHARK')     renderShark(t);
    else if (boss.type === 'SPIDER')    renderSpider(t);
    else if (boss.type === 'OCTOPUS')   renderOctopus(t);
  } else {
    const progress = 1 - Math.max(0, boss.deathTimer / 120);
    const alpha = Math.max(0, 1 - progress * 2.5);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#FF4400';
    ctx.shadowColor = '#FF8800'; ctx.shadowBlur = 30;
    ctx.beginPath(); ctx.arc(0, 0, 50 * (1 + progress * 1.5), 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.globalAlpha = 1;
  ctx.restore();

  if (!boss.dead) {
    ctx.globalAlpha = 0.08 + 0.05*Math.sin(boss.phase*0.1);
    ctx.fillStyle = '#FF2222';
    ctx.beginPath(); ctx.arc(s.x, s.y, 80, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function renderBossHP(lev) {
  const boss = lev.boss;
  if (!boss || boss.dead) return;

  const cx = W/2;
  const barW = 140, barH = 10;
  const x = cx - barW/2, y = 42;

  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(x-6, y-18, barW+12, barH+26);

  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#FF4444';
  ctx.fillText('BOSS: ' + boss.type, cx, y-14);

  ctx.fillStyle = '#330000';
  ctx.fillRect(x, y, barW, barH);

  const ratio = boss.hp / boss.maxHp;
  const barColor = ratio > 0.6 ? '#FF4444' : ratio > 0.3 ? '#FF8800' : '#FFDD00';
  ctx.fillStyle = barColor;
  ctx.fillRect(x, y, barW * ratio, barH);

  ctx.strokeStyle = '#FF2222';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, barW, barH);

  if (bossHitFlash > 0) {
    ctx.globalAlpha = bossHitFlash / 15 * 0.6;
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(x, y, barW * ratio, barH);
    ctx.globalAlpha = 1;
  }
}

function update(dt) {
  const lev = LEVELS[currentLevel];

  // Blink timer
  blinkTimer = (blinkTimer + dt * 0.04) % 1;

  // Shake
  updateShake(dt);

  // Zoom de agarre con resorte
  if (Math.abs(grabZoom - 1) > 0.001 || Math.abs(grabZoomVel) > 0.0001) {
    const spring = (1 - grabZoom) * 0.3;
    grabZoomVel  = (grabZoomVel + spring) * 0.7;
    grabZoom    += grabZoomVel;
  } else {
    grabZoom = 1; grabZoomVel = 0;
  }

  // Flash de muerte
  if (deathFlash > 0) deathFlash = Math.max(0, deathFlash - dt * 0.12);

  // Hint
  hintTimer += dt;
  if (hintTimer < 80) {
    hintAlpha = Math.min(1, hintTimer / 20);
  } else {
    hintAlpha = Math.max(0, 1 - (hintTimer - 80) / 30);
  }

  // Typewriter para intro
  if (gameState === 'INTRO') {
    typewriterTimer += dt;
    if (typewriterTimer > 1.4 && typewriterIdx < typewriterFull.length) {
      typewriterTimer = 0;
      typewriterText += typewriterFull[typewriterIdx++];
    }
    updateParticles(dt);
    return;
  }

  // Level select — solo anima partículas de fondo
  if (gameState === 'LEVEL_SELECT') {
    levelSelectAnim += dt * 0.016;
    updateParticles(dt);
    return;
  }

  // Transición de nivel
  if (gameState === 'LEVEL_TRANSITION') {
    transitionAlpha += transitionDir * dt * 0.06;
    if (transitionDir === 1 && transitionAlpha >= 1) {
      transitionAlpha = 1;
      if (!transitionDone) {
        transitionDone = true;
        loadLevel(currentLevel);       // carga nivel pero NO cambia gameState
        setTimeout(() => { transitionWait = true; }, 400); // espera antes de mostrar "toca"
      }
    }
    if (transitionDir === -1 && transitionAlpha <= 0) {
      transitionAlpha = 0;
      gameState = 'FLYING';   // sale de transición cayendo
    }
    updateParticles(dt);
    return;
  }

  // Muerte – pausa y respawn
  if (gameState === 'DEAD') {
    updateParticles(dt);
    updateCamera(lev);
    // Auto-respawn tras delay
    if (deathFlash < 0.2 && shakeDur <= 0) {
      gameState = 'RESPAWN';
    }
    return;
  }

  if (gameState === 'RESPAWN') {
    updateParticles(dt);
    gameState = 'DEAD_WAIT';
    setTimeout(() => {
      loadLevel(currentLevel);
      gameState = 'FLYING';  // respawn cae libremente
    }, 700);
    return;
  }

  if (gameState === 'DEAD_WAIT') {
    updateParticles(dt);
    return;
  }

  // Win
  if (gameState === 'WIN') {
    winTimer += dt;
    if (winTimer > 3 * 60) winTimer = 3 * 60; // cap
    // Auto-avanza al siguiente nivel después de 2.5 segundos
    if (winTimer > 150) {
      if (currentLevel >= LEVELS.length - 1) {
        resetGame();
      } else {
        currentLevel++;
        startLevelTransition(currentLevel);
      }
      return;
    }
    if (winTimer % 4 < dt * 2) {
      spawnExtractionParticles(kael.x, kael.y);
    }
    updateParticles(dt);
    updateCamera(lev);
    return;
  }

  // ── Lógica principal ──────────────────────────────────────────────────────

  // === MECHANIC 3: COMBO TIMER & RUSH MODE ===
  window.comboTimer += dt;
  if (window.rushMode) {
    window.rushTimer -= dt;
    if (window.rushTimer <= 0) window.rushMode = false;
  }

  // Cooldowns
  if (kael._pumpCooldown > 0) kael._pumpCooldown -= dt;
  if (kael._flipCooldown  > 0) kael._flipCooldown  -= dt;

  // Floating texts fade
  for (let i = window.floatingTexts.length - 1; i >= 0; i--) {
    window.floatingTexts[i].timer -= dt;
    if (window.floatingTexts[i].timer <= 0) window.floatingTexts.splice(i, 1);
  }

  // Rush trail positions (all active states)
  if (window.rushMode) {
    window.trailPositions.unshift({ x: kael.x, y: kael.y });
    if (window.trailPositions.length > 8) window.trailPositions.pop();
    // Subtle constant shake during rush
    triggerShake(2, 1);
  } else {
    if (window.trailPositions.length > 0) window.trailPositions.pop();
  }

  if (gameState === 'SWINGING') {
    if (grabCooldown > 0) grabCooldown -= dt;
    updateSwinging(dt);
    // Aterrizar solo si ya pasó el cooldown de agarre
    if (grabCooldown <= 0 && kael.angVel !== 0) checkPlatformCollision(lev);
    // Cuerda muy corta
    const dx = kael.x - kael.anchorX;
    const dy = kael.y - kael.anchorY;
    if (Math.sqrt(dx*dx+dy*dy) < MIN_ROPE * 0.8) releaseRope();
  }

  // IDLE: Kael aterrizó, espera input (puede pasar si cae sobre plataforma)
  if (gameState === 'IDLE') {
    if (kael.platIdx >= 0 && kael.platIdx < lev.platforms.length) {
      const p = lev.platforms[kael.platIdx];
      kael.y = p.y - KAEL_R;
    }
    kael.vx *= 0.85; // fricción horizontal suave
    kael.vy = 0;
    kael.onGround = true;
    // Reanudar caída si se desliza fuera de la plataforma
    if (kael.platIdx >= 0) {
      const p = lev.platforms[kael.platIdx];
      if (kael.x < p.x - KAEL_R || kael.x > p.x + p.w + KAEL_R) {
        gameState = 'FLYING';
      }
    }
  }

  if (gameState === 'FLYING') {
    const prevY = kael.y;

    // Gravedad variable: bajando = plena, subiendo = 88% (arco más natural)
    const gScale = kael.vy >= 0 ? 1.0 : 0.88;
    kael.vy += GRAVITY * gScale * dt;

    // Cap de velocidad terminal para evitar caídas absurdas
    const TERMINAL_VY = 28;
    if (kael.vy > TERMINAL_VY) kael.vy = TERMINAL_VY;

    // Micro drag aéreo horizontal (da sensación de peso en el arco)
    kael.vx *= Math.pow(0.998, dt);

    kael.x  += kael.vx * dt;
    kael.y  += kael.vy * dt;

    // RUSH: slight extra downward pull (visual urgency, not gameplay-breaking)
    if (window.rushMode) kael.vy += 0.18;
    if (kael.vy > 0) checkPlatformCollision(lev, prevY);
  }

  // Squash recovery (spring)
  {
    const target = 1.0;
    const spring = (target - kael.squash) * 0.25;
    kael.squashVel = (kael.squashVel + spring) * 0.65;
    kael.squash   += kael.squashVel;
    kael.squash    = Math.max(0.45, Math.min(1.55, kael.squash));
  }

  // Trail
  kael.lastSpeed = Math.sqrt(kael.vx*kael.vx + kael.vy*kael.vy);
  if (kael.lastSpeed > 7) {
    kael.trail.unshift({x: kael.x, y: kael.y, a: 1});
    if (kael.trail.length > 7) kael.trail.pop();
  } else {
    if (kael.trail.length > 0) kael.trail.pop();
  }
  for (const t of kael.trail) t.a *= 0.85;

  // Boss continua
  if (gameState === 'WIN') return;
  if (gameState === 'FLYING' || gameState === 'IDLE' || gameState === 'SWINGING') {
    if (lev.boss && !lev.boss.dead && !bossEngaged && checkBossProximity(lev)) {
      bossEngaged = true;
      triggerShake(6, 2);
    }
    updateBoss(lev, dt);
  }

  // Spikes – comprobación en todos los estados activos
  if (gameState !== 'WIN' && gameState !== 'DEAD' &&
      gameState !== 'DEAD_WAIT' && gameState !== 'RESPAWN') {
    if (checkSpikeCollision(lev)) { killKael(); return; }
  }

  // Caída al vacío
  if (kael.y > lev.deathY) { killKael(); return; }

  // Fuera de bounds horizontal
  if (kael.x < -150 || kael.x > lev.worldW + 150) { killKael(); return; }

  // Partículas del boss (cuando está vivo y cerca)
  if (lev.boss && !lev.boss.dead && bossEngaged) {
    if (Math.floor(Date.now() / 300) !== Math.floor((Date.now() - dt * 16) / 300)) {
      spawnExtractionParticles(lev.boss.x, lev.boss.y);
    }
  }

  updateParticles(dt);
  updateCamera(lev);
}

function render() {
  ctx.clearRect(0, 0, W, H);

  renderBackground();

  const lev = LEVELS[currentLevel];

  if (gameState === 'INTRO') {
    renderIntroScreen();
    return;
  }

  if (gameState === 'LEVEL_SELECT') {
    renderLevelSelectScreen();
    return;
  }

  if (gameState === 'LEVEL_TRANSITION') {
    renderLevelTransition();
    return;
  }

  // ── Mundo ─────────────────────────────────────────────────────────────────
  // Zoom de agarre (centrado en Kael)
  const zs  = worldToScreen(kael.x, kael.y);
  ctx.save();
  ctx.translate(zs.x, zs.y);
  ctx.scale(grabZoom, grabZoom);
  ctx.translate(-zs.x, -zs.y);

  // Plataformas
  for (const p of lev.platforms) renderPlatform(p);

  // Pinchos
  for (const s of lev.spikes) renderSpike(s);

  // Boss
  renderBoss(lev);

  // Anclas
  const nearKael = (gameState === 'IDLE' || gameState === 'FLYING');
  for (const a of lev.anchors) renderAnchor(a, nearKael);

  // Cuerda
  renderRope();

  // Partículas
  renderParticles();

  // MECHANIC 3: Rush trail — fading circles at previous positions
  if (window.trailPositions.length > 0) {
    for (let i = 0; i < window.trailPositions.length; i++) {
      const tp = window.trailPositions[i];
      const ts = worldToScreen(tp.x, tp.y);
      const alpha = (1 - i / window.trailPositions.length) * 0.45;
      const rad   = KAEL_R * (1 - i / window.trailPositions.length * 0.5);
      ctx.globalAlpha = alpha;
      ctx.fillStyle   = i < 3 ? '#FF6600' : '#FF3300';
      ctx.beginPath();
      ctx.arc(ts.x, ts.y, rad, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Kael
  renderKael();

  ctx.restore();

  // MECHANIC 3: Faint orange rush overlay
  if (window.rushMode) {
    ctx.fillStyle = 'rgba(255,80,0,0.04)';
    ctx.fillRect(0, 0, W, H);
  }

  // Viñeta temática de los bordes de pantalla
  const th = theme();
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.9);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, th.fog.replace(/[\d.]+\)$/, '0.55)'));
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  // Overlays que no se ven afectados por el zoom
  renderDeathOverlay();

  if (gameState !== 'DEAD' && gameState !== 'DEAD_WAIT' && gameState !== 'RESPAWN') {
    renderHUD(lev);
    renderBossHP(lev);
  }

  if (gameState === 'WIN') renderWinScreen();
}

function gameLoop(timestamp) {
  const delta = Math.min(timestamp - (lastTime || timestamp), 50);
  lastTime = timestamp;
  const dt = delta / FRAME_MS;

  bgTime += delta * 0.001;
  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

// === INICIO ===

function init() {
  resizeCanvas();
  gameState = 'INTRO';
  currentLevel = 0;
  falls = 0;

  // Iniciar con primer nivel en memoria (para fondo)
  loadLevel(0);
  gameState = 'INTRO'; // volver a intro después de cargar

  // Registrar Service Worker para PWA offline
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('[SW] Registrado — juego disponible offline'))
      .catch(e => console.warn('[SW] Error:', e));
  }

  requestAnimationFrame(gameLoop);
}

init();
  </script>
