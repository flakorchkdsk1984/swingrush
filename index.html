function resizeCanvas() {

  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

// === FÍSICA DEL PÉNDULO ===

let _swingLogTimer = 0;
function updateSwinging(dt) {
  const angAcc = (-GRAVITY / kael.ropeLen) * Math.sin(kael.angle);
  kael.angVel += angAcc * dt;

  // PUMP: mantener click/touch presionado acelera el swing
  // Cuando el péndulo pasa por el punto más bajo (cerca de vertical),
  // se aplica un impulso en la dirección actual del movimiento
  if (inputDown) {
    const PUMP_FORCE = 0.003; // fuerza de bombeo por frame
    const MAX_ANGVEL = 0.22;  // límite de velocidad máxima
    if (Math.abs(kael.angVel) < MAX_ANGVEL) {
      kael.angVel += Math.sign(kael.angVel || 1) * PUMP_FORCE * dt;
    }
  }

  kael.angle  += kael.angVel  * dt;
  kael.x = kael.anchorX + kael.ropeLen * Math.sin(kael.angle);
  kael.y = kael.anchorY + kael.ropeLen * Math.cos(kael.angle);
  // Log cada ~60 frames
  _swingLogTimer += dt;
  if (_swingLogTimer > 60) {
    _swingLogTimer = 0;
    dbg('PHYSICS', `angle=${kael.angle.toFixed(3)} angVel=${kael.angVel.toFixed(3)} pos=(${kael.x.toFixed(0)},${kael.y.toFixed(0)})`);
  }
}

function releaseRope() {
  // Velocidad tangencial al soltar
  kael.vx =  kael.ropeLen * Math.cos(kael.angle) * kael.angVel;
  kael.vy = -kael.ropeLen * Math.sin(kael.angle) * kael.angVel;
  dbg('RELEASE', `vx=${kael.vx.toFixed(2)} vy=${kael.vy.toFixed(2)} angle=${kael.angle.toFixed(3)}`);
  playSound('release');
  gameState = 'FLYING';
}

function grabAnchor(ax, ay) {
  const dx   = kael.x - ax;
  const dy   = kael.y - ay;
  const dist = Math.sqrt(dx * dx + dy * dy);
  dbg('GRAB_TRY', `kael=(${kael.x.toFixed(0)},${kael.y.toFixed(0)}) anchor=(${ax},${ay}) dist=${dist.toFixed(0)} MIN=${MIN_ROPE}`);
  if (dist < MIN_ROPE) { dbg('GRAB_FAIL', 'demasiado cerca'); return false; }

  kael.anchorX = ax;
  kael.anchorY = ay;
  kael.ropeLen = dist;
  // Ángulo desde vertical
  kael.angle  = Math.atan2(dx, dy);
  // Velocidad angular inicial desde velocidad volando
  if (gameState === 'FLYING') {
    const tanX =  Math.cos(kael.angle);
    const tanY = -Math.sin(kael.angle);
    const vtan = kael.vx * tanX + kael.vy * tanY;
    kael.angVel = vtan / kael.ropeLen;
  } else {
    kael.angVel = 0;
  }

  // Garantizar velocidad angular mínima para un swing satisfactorio
  // Si el ángulo es negativo (Kael a la izquierda del anchor) → swing hacia la derecha
  // Si es positivo → swing hacia la izquierda
  const MIN_ANG_VEL = 0.06;
  if (Math.abs(kael.angVel) < MIN_ANG_VEL) {
    // Kick en la dirección del swing natural (hacia la derecha cuando está a la izquierda)
    kael.angVel = kael.angle < 0 ? MIN_ANG_VEL : -MIN_ANG_VEL;
  }

  dbg('GRAB_OK', `anchor=(${ax},${ay}) ropeLen=${dist.toFixed(0)} angle=${kael.angle.toFixed(3)} angVel=${kael.angVel.toFixed(3)}`);

  // Zoom de agarre
  grabZoom = 0.93;
  grabZoomVel = 0;
  grabCooldown = 20; // ignorar colisión de plataforma por 20 frames

  playSound('swing');
  gameState = 'SWINGING';
  return true;
}

// === DETECCIÓN DE COLISIONES ===

function circleAABB(cx, cy, cr, rx, ry, rw, rh) {
  const clX = Math.max(rx, Math.min(cx, rx + rw));
  const clY = Math.max(ry, Math.min(cy, ry + rh));
  const dx  = cx - clX;
  const dy  = cy - clY;
  return dx * dx + dy * dy < cr * cr;
}

function checkPlatformCollision(lev, prevY) {
  const bottom     = kael.y + KAEL_R;
  const prevBottom = (prevY !== undefined ? prevY : kael.y - kael.vy) + KAEL_R;
  for (let i = 0; i < lev.platforms.length; i++) {
    const p = lev.platforms[i];
    if (prevBottom <= p.y + 3 &&
        bottom >= p.y &&
        kael.x > p.x - KAEL_R * 0.6 &&
        kael.x < p.x + p.w + KAEL_R * 0.6) {
      kael.y        = p.y - KAEL_R;
      kael.vy       = 0;
      kael.vx      *= 0.72;
      kael.onGround = true;
      kael.platIdx  = i;
      kael.squash    = 0.55;
      kael.squashVel = 0;
      spawnLandingParticles(kael.x, kael.y + KAEL_R);
      playSound('land');
      gameState = 'IDLE';
      return true;
    }
  }
  return false;
}

function checkSpikeCollision(lev) {
  for (const s of lev.spikes) {
    if (circleAABB(kael.x, kael.y, KAEL_R, s.x, s.y, s.w, s.h)) {
      return true;
    }
  }
  return false;
}

function checkBossProximity(lev) {
  if (!lev.boss || lev.boss.dead) return false;
  const dx = kael.x - lev.boss.x;
  const dy = kael.y - lev.boss.y;
  return Math.sqrt(dx * dx + dy * dy) < 200;
}

function findNearestAnchor(lev) {
  let best = null, bestDist = MAX_GRAB * MAX_GRAB;
  for (const a of lev.anchors) {
    // Permitir anclas hasta 80px por debajo de Kael (para agarrar mientras sube)
    if (a.y > kael.y + 80) continue;
    const dx = kael.x - a.x;
    const dy = kael.y - a.y;
    const d2 = dx * dx + dy * dy;
    if (d2 < bestDist) { bestDist = d2; best = a; }
  }
  return best;
}

// === CÁMARA ===

function updateCamera(lev) {
  // Look-ahead basado en velocidad
  let speed = 0;
  if (gameState === 'FLYING') {
    speed = Math.sqrt(kael.vx * kael.vx + kael.vy * kael.vy);
  }
  const lookX = (gameState === 'FLYING') ? kael.vx * 4.0 : 0;
  const lookY = (gameState === 'FLYING') ? kael.vy * 2.0 : 0;

  cam.tx = kael.x - W * 0.5 + lookX;
  cam.ty = kael.y - H * 0.5 + lookY;

  // Clamp a bounds del mundo
  cam.tx = Math.max(0, Math.min(cam.tx, lev.worldW - W));
  cam.ty = Math.max(0, Math.min(cam.ty, lev.worldH - H));

  cam.x += (cam.tx - cam.x) * LERP_CAM * 3;
  cam.y += (cam.ty - cam.y) * LERP_CAM * 3;
}

function triggerShake(dur, amp) {
  shakeDur = dur;
  shakeAmp = amp;
}

function updateShake(dt) {
  if (shakeDur > 0) {
    shakeDur -= dt;
    const s = shakeAmp * (shakeDur / (8 / FRAME_MS));
    shakeX = (Math.random() * 2 - 1) * s;
    shakeY = (Math.random() * 2 - 1) * s;
  } else {
    shakeX = 0; shakeY = 0;
  }
}

// === SISTEMA DE PARTÍCULAS ===

const POOL_SIZE = 300;
const particles = new Array(POOL_SIZE).fill(null).map(() => ({
  active: false,
  x: 0, y: 0, vx: 0, vy: 0,
  life: 0, maxLife: 0,
  r: 0, color: '#fff', type: 0,
}));

// Partículas de polvo ambientales (paralaje independiente)
const dustP = new Array(80).fill(null).map(() => ({
  wx: Math.random() * 3000,
  wy: Math.random() * 700,
  r:  0.5 + Math.random() * 2,
  a:  0.05 + Math.random() * 0.3,
  vx: (Math.random() - 0.5) * 0.2,
  vy: -0.05 - Math.random() * 0.25,
  layer: Math.floor(Math.random() * 3),
}));

function spawnParticle(x, y, vx, vy, life, r, color, type) {
  for (let i = 0; i < POOL_SIZE; i++) {
    if (!particles[i].active) {
      const p = particles[i];
      p.active = true;
      p.x = x; p.y = y;
      p.vx = vx; p.vy = vy;
      p.life = life; p.maxLife = life;
      p.r = r; p.color = color; p.type = type;
      return;
    }
  }
}

function spawnLandingParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    const angle = Math.PI + (Math.random() - 0.5) * Math.PI;
    const speed = 1.5 + Math.random() * 3;
    spawnParticle(x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed - 1,
      18 + Math.random() * 12,
      1 + Math.random() * 2,
      COL.rust, 0);
  }
}

function spawnDeathParticles(x, y) {
  for (let i = 0; i < 22; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    spawnParticle(x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      25 + Math.random() * 20,
      2 + Math.random() * 3,
      i % 3 === 0 ? COL.danger : COL.rust, 1);
  }
}

function spawnExtractionParticles(x, y) {
  const angle = Math.random() * Math.PI * 2;
  const dist  = 5 + Math.random() * 30;
  spawnParticle(
    x + Math.cos(angle) * dist,
    y + Math.sin(angle) * dist,
    Math.cos(angle + Math.PI / 2) * 0.8,
    -0.5 - Math.random() * 0.8,
    40 + Math.random() * 20,
    1 + Math.random(),
    COL.victory, 2);
}

function updateParticles(dt) {
  for (const p of particles) {
    if (!p.active) continue;
    p.life -= dt;
    if (p.life <= 0) { p.active = false; continue; }
    p.x  += p.vx * dt;
    p.y  += p.vy * dt;
    p.vy += GRAVITY * 0.3 * dt;
    if (p.type === 2) { p.vy = -0.5; p.vx *= 0.98; } // extracción flota
  }
  // Partículas de polvo
  const lev = LEVELS[currentLevel];
  for (const d of dustP) {
    d.wx += d.vx;
    d.wy += d.vy;
    if (d.wy < -10) {
      d.wy = lev.worldH + 10;
      d.wx = Math.random() * lev.worldW;
    }
  }
}

// === AUDIO PROCEDURAL ===

let audioCtx = null;
let ambGain  = null;

let pendingMusicLevel = -1; // nivel en espera si audio no está listo

function initAudio() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(() => {
        // Reanudar música pendiente tras desbloqueo
        if (pendingMusicLevel >= 0) {
          MusicEngine.crossfade(pendingMusicLevel);
          pendingMusicLevel = -1;
        }
      });
    }
    return;
  }
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioReady = true;
    audioCtx.resume().then(() => {
      startAmbient();
      // Arrancar música del nivel actual tras desbloqueo
      if (pendingMusicLevel >= 0) {
        MusicEngine.crossfade(pendingMusicLevel);
        pendingMusicLevel = -1;
      }
    });
  } catch(e) { console.warn('Audio no disponible:', e); }
}

function makeNoise(sec) {
  const sr     = audioCtx.sampleRate;
  const frames = Math.ceil(sr * sec);
  const buf    = audioCtx.createBuffer(1, frames, sr);
  const data   = buf.getChannelData(0);
  for (let i = 0; i < frames; i++) data[i] = Math.random() * 2 - 1;
  return buf;
}

function playSound(name) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  let osc, gain, filter, buf, src;

  if (name === 'swing') {
    // Silbido metálico – barrido de ruido filtrado
    buf    = makeNoise(0.35);
    src    = audioCtx.createBufferSource();
    src.buffer = buf;
    filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(800, now);
    filter.frequency.linearRampToValueAtTime(3200, now + 0.3);
    filter.Q.value = 4;
    gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.18, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.35);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    src.start(now);

  } else if (name === 'release') {
    // Clic de impacto corto
    osc  = audioCtx.createOscillator();
    gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(220, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.1);

  } else if (name === 'land') {
    // Golpe sordo + repique metálico
    osc  = audioCtx.createOscillator();
    gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(120, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
    gain.gain.setValueAtTime(0.4, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.22);
    // Repique
    const osc2  = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(900, now);
    osc2.frequency.exponentialRampToValueAtTime(400, now + 0.12);
    gain2.gain.setValueAtTime(0.1, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.start(now); osc2.stop(now + 0.15);

  } else if (name === 'death') {
    // Glitch distorsionado
    buf    = makeNoise(0.6);
    src    = audioCtx.createBufferSource();
    src.buffer = buf;
    filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(400, now);
    filter.frequency.linearRampToValueAtTime(80, now + 0.5);
    gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.6, now);
    gain.gain.linearRampToValueAtTime(0, now + 0.6);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    src.start(now);

  } else if (name === 'ui') {
    osc  = audioCtx.createOscillator();
    gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(660, now);
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.12);

  } else if (name === 'win') {
    // Arpegio ascendente en menor
    const notes = [220, 261.6, 311.1, 369.9, 440, 523.2];
    notes.forEach((freq, i) => {
      const t   = now + i * 0.11;
      const oW  = audioCtx.createOscillator();
      const gW  = audioCtx.createGain();
      oW.type = 'triangle';
      oW.frequency.setValueAtTime(freq, t);
      gW.gain.setValueAtTime(0.0, t);
      gW.gain.linearRampToValueAtTime(0.18, t + 0.04);
      gW.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      oW.connect(gW); gW.connect(audioCtx.destination);
      oW.start(t); oW.stop(t + 0.28);
    });
  }
}

function startAmbient() {
  const osc = audioCtx.createOscillator();
  ambGain   = audioCtx.createGain();
  const flt = audioCtx.createBiquadFilter();
  osc.type = 'sawtooth';
  osc.frequency.value = 55;
  flt.type = 'lowpass';
  flt.frequency.value = 140;
  ambGain.gain.value = 0.035;
  osc.connect(flt);
  flt.connect(ambGain);
  ambGain.connect(audioCtx.destination);
  osc.start();
}

      else if (beat % 4 === 2) { tablaHit(time, 'dayan', 0.75); }
    } else if (s === 'fast') {
      tablaHit(time, beat % 2 === 0 ? 'bayan' : 'dayan', beat % 4 === 0 ? 1.0 : 0.65);
      tablaHit(time + bd * 0.5, 'dayan', 0.45);
    } else if (s === 'soft') {
      if (beat % 4 === 0) tablaHit(time, 'bayan', 0.7);
      if (beat % 2 === 0) tablaHit(time + bd * 0.75, 'dayan', 0.4);
    } else if (s === 'hard') {
      tablaHit(time, beat % 4 === 0 ? 'bayan' : 'dayan', beat % 2 === 0 ? 1.0 : 0.5);
      if (beat % 3 !== 1) tablaHit(time + bd * 0.33, 'dayan', 0.55);
    } else { // full
      tablaHit(time, beat % 4 === 0 ? 'bayan' : 'dayan', 1.0);
      tablaHit(time + bd * 0.25, 'dayan', 0.5);
      tablaHit(time + bd * 0.5,  beat % 4 === 2 ? 'bayan' : 'dayan', 0.75);
      tablaHit(time + bd * 0.75, 'dayan', 0.45);
    }
  }

  function runScheduler() {
    if (!seqState || seqState.stopped || !audioCtx) return;
    const track = TRACKS[seqState.level];
    const beatDur = 60 / track.bpm;
    const until = audioCtx.currentTime + 0.15;
    while (seqState.nextNoteTime < until) {
      const t = seqState.nextNoteTime;
      const pat = seqState.noteIdx % track.melody.length;
      const deg = track.melody[pat];
      if (deg >= 0) {
        const freq = scaleFreq(track, deg);
        if (freq) {
          if (track.instr === 'bansuri') playBansuri(freq, t, beatDur * 0.85);
          else if (track.instr === 'oud')   playOud(freq, t, beatDur * 0.8);
          else if (track.instr === 'sitar2') { playSitar(freq, t, beatDur * 0.9, true); playSitar(freq * 1.5, t + beatDur * 0.12, beatDur * 0.6, false); }
          else playSitar(freq, t, beatDur * 0.85, false);
        }
      }
      scheduleTabla(track, t, seqState.noteIdx);
      seqState.noteIdx++;
      seqState.nextNoteTime += beatDur;
    }
    seqState.timerId = setTimeout(runScheduler, 25);
  }

  function stopAll() {
    if (seqState) {
      seqState.stopped = true;
      clearTimeout(seqState.timerId);
      seqState = null;
    }
    droneNodes.forEach(function(n) { try { if (n.stop) n.stop(); else n.disconnect(); } catch(e) {} });
    droneNodes = [];
  }

  api = {
    start: function(levelIndex) {
      if (!audioCtx) { pendingMusicLevel = levelIndex; return; }
      if (audioCtx.state === 'suspended') {
        pendingMusicLevel = levelIndex;
        audioCtx.resume(); // el .then() en initAudio lo arrancará
        return;
      }
      stopAll();
      if (!masterGain) {
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0;
        masterGain.connect(audioCtx.destination);
      }
      masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
      masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
      masterGain.gain.linearRampToValueAtTime(0.35, audioCtx.currentTime + 1.2);
      const track = TRACKS[levelIndex];
      if (!track) return;
      droneNodes = createDrone(track.droneFreq, track.droneGain);
      seqState = { level: levelIndex, noteIdx: 0, nextNoteTime: audioCtx.currentTime + 0.1, stopped: false, timerId: null };
      runScheduler();
      activeLevel = levelIndex;
    },
    stop: function() {
      if (!audioCtx) return;
      stopAll();
      if (masterGain) {
        masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
        masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
        masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      }
      activeLevel = -1;
    },
    crossfade: function(newLevel) {
      // Si audioCtx no existe o está suspendido, encolar y esperar
      if (!audioCtx || audioCtx.state === 'suspended') {
        pendingMusicLevel = newLevel;
        return;
      }
      if (newLevel === activeLevel) return; // mismo nivel, seguir tocando
      if (activeLevel === -1 || !masterGain) { api.start(newLevel); return; }
      const now = audioCtx.currentTime;
      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.linearRampToValueAtTime(0, now + 1.0);
      setTimeout(function() { stopAll(); masterGain = null; api.start(newLevel); }, 1100);
    },
    deathFilter: function() {
      // Brief gain duck on death
      if (!masterGain || !audioCtx) return;
      const now = audioCtx.currentTime;
      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.linearRampToValueAtTime(0.04, now + 0.4);
      masterGain.gain.linearRampToValueAtTime(0.35, now + 1.8);
    }
  };
  return api;
})();

function renderBackground() {
  const th = theme();

  // Gradiente vertical temático
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   th.bgTop);
  grad.addColorStop(0.5, th.bgMid);
  grad.addColorStop(1,   th.bgBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Brillo en el horizonte — color del tema
  const hgrad = ctx.createLinearGradient(0, H * 0.5, 0, H * 0.8);
  hgrad.addColorStop(0,   'rgba(0,0,0,0)');
  hgrad.addColorStop(0.4, th.horizon);
  hgrad.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = hgrad;
  ctx.fillRect(0, H * 0.5, W, H * 0.3);

  // Niebla temática en la parte inferior
  const fogGrad = ctx.createLinearGradient(0, H * 0.7, 0, H);
  fogGrad.addColorStop(0, 'rgba(0,0,0,0)');
  fogGrad.addColorStop(1, th.fog.replace('0.07','0.18'));
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, H * 0.7, W, H * 0.3);

  // Capas paralaje de siluetas
  const paralaxFactor = [0.05, 0.15, 0.3];
  const alphaByLayer  = [0.35, 0.22, 0.14];

  for (const bgl of BG_SHAPES) {
    const l   = bgl.layer;
    const px  = cam.x * paralaxFactor[l];
    const py  = cam.y * paralaxFactor[l] * 0.3;
    ctx.fillStyle = th.silhouette[l];
    ctx.globalAlpha = alphaByLayer[l];
    for (const shape of bgl.shapes) {
      ctx.beginPath();
      ctx.moveTo(shape[0].x * W - px % W, shape[0].y * H - py);
      for (let i = 1; i < shape.length; i++)
        ctx.lineTo(shape[i].x * W - px % W, shape[i].y * H - py);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(shape[0].x * W - px % W + W, shape[0].y * H - py);
      for (let i = 1; i < shape.length; i++)
        ctx.lineTo(shape[i].x * W - px % W + W, shape[i].y * H - py);
      ctx.closePath();
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Cables de fondo — color del tema
  ctx.strokeStyle = th.fog;
  ctx.lineWidth = 1;
  for (const cable of BG_CABLES) {
    ctx.beginPath();
    const px0 = cam.x * 0.1;
    for (let i = 0; i < cable.length; i++) {
      const sx = cable[i].x * W - px0 % W;
      const sy = cable[i].y * H;
      i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
    }
    ctx.stroke();
  }

  // Partículas de polvo — color del tema
  for (const d of dustP) {
    const pf  = [0.06, 0.15, 0.28][d.layer];
    const sx  = d.wx - cam.x * pf;
    const sy  = d.wy - cam.y * pf;
    const wrapX = ((sx % W) + W) % W;
    ctx.globalAlpha = d.a;
    ctx.fillStyle = th.dust;
    ctx.beginPath();
    ctx.arc(wrapX, sy, d.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === RENDER — MUNDO ===

function worldToScreen(wx, wy) {
  return { x: wx - cam.x + shakeX, y: wy - cam.y + shakeY };
}

function renderPlatform(p) {
  const s  = worldToScreen(p.x, p.y);
  if (s.x + p.w < 0 || s.x > W || s.y + p.h < 0 || s.y > H) return;
  const th = theme();

  // Sombra
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(s.x + 4, s.y + p.h + 2, p.w, 6);

  // Cuerpo temático
  const cgrad = ctx.createLinearGradient(s.x, s.y, s.x, s.y + p.h);
  cgrad.addColorStop(0,   th.platTop);
  cgrad.addColorStop(0.5, th.platMid);
  cgrad.addColorStop(1,   th.platBot);
  ctx.fillStyle = cgrad;
  ctx.fillRect(s.x, s.y, p.w, p.h);

  // Textura de grietas
  ctx.fillStyle = th.platShine;
  for (let i = 0; i < p.w; i += 9) {
    if ((i / 9 + Math.floor(s.x / 9)) % 3 === 0)
      ctx.fillRect(s.x + i, s.y, 3, p.h);
  }

  // Borde
  ctx.strokeStyle = th.platEdge;
  ctx.lineWidth = 1;
  ctx.strokeRect(s.x, s.y, p.w, p.h);

  // Brillo superior
  ctx.fillStyle = th.platShine;
  ctx.fillRect(s.x, s.y, p.w, 2);

  // Rebars (varillas) — color del tema
  ctx.strokeStyle = th.rebar;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(s.x + 6, s.y); ctx.lineTo(s.x + 6, s.y - 8); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(s.x + p.w - 6, s.y); ctx.lineTo(s.x + p.w - 6, s.y - 7); ctx.stroke();
}

function renderSpike(sp) {
  const s = worldToScreen(sp.x, sp.y);
  if (s.x + sp.w < 0 || s.x > W) return;
  const n = Math.max(1, Math.floor(sp.w / 9));
  const tw = sp.w / n;

  ctx.fillStyle = COL.danger;
  for (let i = 0; i < n; i++) {
    const tx = s.x + i * tw;
    ctx.beginPath();
    ctx.moveTo(tx, s.y + sp.h);
    ctx.lineTo(tx + tw * 0.5, s.y);
    ctx.lineTo(tx + tw, s.y + sp.h);
    ctx.closePath();
    ctx.fill();
  }
  // Brillo en pinchos
  ctx.strokeStyle = 'rgba(255,100,90,0.5)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < n; i++) {
    const tx = s.x + i * tw;
    ctx.beginPath();
    ctx.moveTo(tx, s.y + sp.h);
    ctx.lineTo(tx + tw * 0.5, s.y);
    ctx.stroke();
  }
}

function renderAnchor(a, nearKael) {
  const s = worldToScreen(a.x, a.y);
  if (s.x < -50 || s.x > W + 50 || s.y < -50 || s.y > H + 50) return;
  const t = Date.now() * 0.003;
  const pulse = 0.5 + 0.5 * Math.sin(t + a.x * 0.01);

  // Resplandor de alcance cuando Kael está cerca
  if (nearKael) {
    const dx = kael.x - a.x;
    const dy = kael.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < MAX_GRAB) {
      const alpha = (1 - dist / MAX_GRAB) * 0.12 * pulse;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = COL.rust;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, dist > 0 ? Math.min(dist, MAX_GRAB * 0.8) : 80, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // Anillo exterior pulsante
  if (!a.used) {
    ctx.globalAlpha = 0.25 * pulse;
    ctx.strokeStyle = COL.rust;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(s.x, s.y, 16 + pulse * 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Cuerpo del gancho
  const col = a.used ? COL.metalDim : COL.rust;
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(s.x, s.y, 5, 0, Math.PI * 2);
  ctx.fill();

  // Nodo metálico central
  ctx.fillStyle = a.used ? '#444' : '#e8a060';
  ctx.beginPath();
  ctx.arc(s.x, s.y, 3, 0, Math.PI * 2);
  ctx.fill();

  // Gancho dibujado (forma)
  ctx.strokeStyle = col;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(s.x, s.y + 3, 5, Math.PI * 1.1, Math.PI * 2.2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(s.x + 5, s.y + 3);
  ctx.lineTo(s.x + 7, s.y + 1);
  ctx.stroke();
}

function renderRope() {
  if (gameState !== 'SWINGING') return;
  const s0 = worldToScreen(kael.anchorX, kael.anchorY);
  const s1 = worldToScreen(kael.x, kael.y);

  // Curva catenaria suave usando bezier
  const mx = (s0.x + s1.x) * 0.5;
  const my = (s0.y + s1.y) * 0.5 + kael.ropeLen * 0.08;

  // Sombra gruesa de la cuerda (más visible)
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 5;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(s0.x, s0.y);
  ctx.quadraticCurveTo(mx, my, s1.x, s1.y);
  ctx.stroke();

  // Cuerda principal — blanco brillante, bien visible
  ctx.globalAlpha = 1;
  ctx.strokeStyle = '#E8E6DC';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(s0.x, s0.y);
  ctx.quadraticCurveTo(mx, my, s1.x, s1.y);
  ctx.stroke();

  // Nodo de conexión en el ancla — círculo grande naranja
  ctx.fillStyle = COL.rust;
  ctx.beginPath();
  ctx.arc(s0.x, s0.y, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Nodo en Kael
  ctx.fillStyle = '#ccc';
  ctx.beginPath();
  ctx.arc(s1.x, s1.y, 4, 0, Math.PI * 2);
  ctx.fill();
}

function renderExtractionZone(lev) {
  const ex = lev.extraction;
  const s  = worldToScreen(ex.x, ex.y);
  if (Math.abs(s.x - W/2) > W || Math.abs(s.y - H/2) > H) return;

  const t  = Date.now() * 0.002;
  const p  = 0.5 + 0.5 * Math.sin(t * 2);

  // Rayos ascendentes
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2 + t;
    const rlen  = 20 + p * 15;
    ctx.globalAlpha = 0.12 + 0.08 * p;
    ctx.strokeStyle = COL.victory;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s.x + Math.cos(angle) * ex.r,
               s.y + Math.sin(angle) * ex.r);
    ctx.lineTo(s.x + Math.cos(angle) * (ex.r + rlen),
               s.y + Math.sin(angle) * (ex.r + rlen));
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Resplandor exterior
  const grd = ctx.createRadialGradient(s.x, s.y, ex.r * 0.5, s.x, s.y, ex.r * 2.5);
  grd.addColorStop(0, 'rgba(29,158,117,0.3)');
  grd.addColorStop(1, 'rgba(29,158,117,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(s.x, s.y, ex.r * 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Círculo principal
  ctx.strokeStyle = COL.victory;
  ctx.lineWidth = 2.5;
  ctx.globalAlpha = 0.7 + 0.3 * p;
  ctx.beginPath();
  ctx.arc(s.x, s.y, ex.r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Símbolo R
  ctx.fillStyle = COL.victory;
  ctx.globalAlpha = 0.85;
  ctx.font = `bold ${Math.floor(ex.r * 0.9)}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('R', s.x, s.y);
  ctx.globalAlpha = 1;
}

function renderParticles() {
  for (const p of particles) {
    if (!p.active) continue;
    const s  = worldToScreen(p.x, p.y);
    const a  = p.life / p.maxLife;
    ctx.globalAlpha = a * 0.9;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, p.r * a + 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === RENDER — KAEL ===

function renderKael() {
  if (gameState === 'DEAD' || gameState === 'RESPAWN') return;

  const s = worldToScreen(kael.x, kael.y);
  const speed = Math.sqrt(kael.vx * kael.vx + kael.vy * kael.vy);

  // Trail cuando hay velocidad alta
  if (speed > 8 && kael.trail.length > 0) {
    for (let i = 0; i < kael.trail.length; i++) {
      const tp = kael.trail[i];
      const ts = worldToScreen(tp.x, tp.y);
      ctx.globalAlpha = tp.a * 0.35 * (i / kael.trail.length);
      ctx.fillStyle = COL.rust;
      const tr = KAEL_R * (i / kael.trail.length) * 0.8;
      ctx.beginPath();
      ctx.arc(ts.x, ts.y, tr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Squash/stretch
  const sq = kael.squash;
  const sx = 1 / sq;

  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.scale(sx, sq);

  // Resplandor naranja exterior
  const grd = ctx.createRadialGradient(0, 0, KAEL_R * 0.5, 0, 0, KAEL_R * 2.2);
  grd.addColorStop(0, 'rgba(216,90,48,0.0)');
  grd.addColorStop(0.4, 'rgba(216,90,48,0.12)');
  grd.addColorStop(1, 'rgba(216,90,48,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(0, 0, KAEL_R * 2.2, 0, Math.PI * 2);
  ctx.fill();

  // Cuerpo metálico principal
  const bodyGrd = ctx.createRadialGradient(-3, -4, 1, 0, 0, KAEL_R);
  bodyGrd.addColorStop(0, '#6a6660');
  bodyGrd.addColorStop(0.6, '#3a3630');
  bodyGrd.addColorStop(1, '#1e1c18');
  ctx.fillStyle = bodyGrd;
  ctx.beginPath();
  ctx.arc(0, 0, KAEL_R, 0, Math.PI * 2);
  ctx.fill();

  // Borde metálico
  ctx.strokeStyle = '#6a6458';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, KAEL_R, 0, Math.PI * 2);
  ctx.stroke();

  // Máscara de gas – ojos
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.ellipse(-4.5, -2, 3.5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(4.5, -2, 3.5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Lente de ojo izquierdo
  ctx.fillStyle = 'rgba(180,120,60,0.4)';
  ctx.beginPath();
  ctx.ellipse(-4.5, -2, 2.5, 1.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(180,120,60,0.2)';
  ctx.beginPath();
  ctx.ellipse(4.5, -2, 2.5, 1.8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Filtro de máscara (abajo centro)
  ctx.fillStyle = '#2a2820';
  ctx.beginPath();
  ctx.ellipse(0, 4, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.ellipse(0, 4, 4, 3, 0, 0, Math.PI * 2);
  ctx.stroke();
  // Rejilla del filtro
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 0.5;
  for (let i = -3; i <= 3; i += 2) {
    ctx.beginPath();
    ctx.moveTo(i, 2); ctx.lineTo(i, 6);
    ctx.stroke();
  }

  // Casco / parte superior
  ctx.strokeStyle = '#7a7870';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, 0, KAEL_R - 2, Math.PI, Math.PI * 2);
  ctx.stroke();

  // Destello en el ojo izquierdo (animado)
  const t = Date.now() * 0.004;
  ctx.fillStyle = `rgba(255,180,80,${0.3 + 0.2 * Math.sin(t)})`;
  ctx.beginPath();
  ctx.arc(-4, -2.5, 1.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// === INPUT — TOUCH Y MOUSE ===

let inputDown = false;

function handleInput() {
  if (!audioReady) initAudio();
  dbg('INPUT', `gameState=${gameState} kael=(${kael.x.toFixed(0)},${kael.y.toFixed(0)})`);

  if (gameState === 'INTRO') {
    if (typewriterIdx < typewriterFull.length) {
      // Primer toque: completar typewriter instantáneamente
      typewriterText = typewriterFull;
      typewriterIdx  = typewriterFull.length;
    } else {
      // Segundo toque (o primero si ya terminó): avanzar al juego
      playSound('ui');
      startLevelTransition(0);
    }
    return;
  }

  if (gameState === 'LEVEL_TRANSITION') {
    if (transitionWait) {
      transitionWait = false;
      transitionDir  = -1; // Fade out
    }
    return;
  }

  if (gameState === 'WIN') {
    if (winTimer > 30) {
      playSound('ui');
      if (currentLevel >= LEVELS.length - 1) {
        resetGame();
      } else {
        currentLevel++;
        startLevelTransition(currentLevel);
      }
    }
    return;
  }

  if (gameState === 'DEAD' || gameState === 'RESPAWN') return;

  // Si ya está swinging, el release lo maneja mouseup/touchend — no hacer nada aquí
  if (gameState === 'SWINGING') return;

  // IDLE o FLYING: intenta engancharse
  const lev  = LEVELS[currentLevel];
  const best = findNearestAnchor(lev);
  dbg('ANCHOR_SEARCH', `best=${best ? `(${best.x},${best.y})` : 'NINGUNO'} kael.y=${kael.y.toFixed(0)}`);
  if (best) {
    if (grabAnchor(best.x, best.y)) {
      best.used = true;
      hintTimer = 0;
    }
  } else {
    dbg('ANCHOR_SEARCH', 'No hay anclas disponibles — verifica MAX_GRAB o posición de Kael');
  }
}

canvas.addEventListener('mousedown', () => { inputDown = true; handleInput(); });
canvas.addEventListener('mouseup',   () => {
  inputDown = false;
  if (gameState === 'SWINGING') releaseRope(); // soltar al levantar el click
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  inputDown = true;
  handleInput();
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  inputDown = false;
  if (gameState === 'SWINGING') releaseRope(); // soltar al levantar el dedo
}, { passive: false });

// === CHEAT CODES (debug) ===
window.addEventListener('keydown', (e) => {
  // Teclas 1-5: ir directo al nivel
  if (e.key >= '1' && e.key <= '7') {
    const lvl = parseInt(e.key) - 1;
    if (lvl < LEVELS.length) {
      initAudio();
      currentLevel = lvl;
      falls = 0;
      loadLevel(lvl);
      gameState = 'FLYING';
      dbg('CHEAT', `Nivel ${lvl + 1} cargado directamente`);
    }
  }
  // ESC: reiniciar juego completo
  if (e.key === 'Escape') {
    falls = 0;
    currentLevel = 0;
    typewriterText = '';
    typewriterIdx  = 0;
    typewriterTimer = 0;
    loadLevel(0);
    gameState = 'INTRO';
    dbg('CHEAT', 'Juego reiniciado');
  }
});



function startLevelTransition(idx) {
  currentLevel   = idx;
  gameState      = 'LEVEL_TRANSITION';
  transitionAlpha = 0;
  transitionDir   = 1;
  transitionDone  = false;
  transitionWait  = false;
}

function loadLevel(idx) {
  MusicEngine.crossfade(idx);
  const lev  = LEVELS[idx];
  kael.x     = lev.startX;
  // Kael empieza SOBRE el primer anchor (en el aire, cayendo)
  // para que el primer toque ya tenga momentum real
  kael.y     = lev.anchors.length > 0 ? lev.anchors[0].y + 40 : lev.startY;
  kael.vx    = 0;
  kael.vy    = 1;    // pequeña velocidad inicial de caída
  kael.onGround = false;
  kael.platIdx  = -1;
  kael.squash   = 1;
  kael.squashVel = 0;
  kael.trail    = [];
  for (const a of lev.anchors) a.used = false;
  bossEngaged = false;
  bossHitFlash = 0;
  if (lev.boss) {
    lev.boss.hp = lev.boss.maxHp;
    lev.boss.dead = false;
    lev.boss.deathTimer = 0;
    lev.boss.projectiles = [];
    lev.boss.shootTimer = lev.boss.shootInterval;
    lev.boss.phase = 0;
    lev.boss.hitCooldown = 0;
  }

  cam.x = kael.x - W * 0.5;
  cam.y = kael.y - H * 0.5;
  cam.tx = cam.x; cam.ty = cam.y;

  hintAlpha = 1;
  hintTimer = 0;
  grabCooldown = 0;
  // gameState lo controla la transición (o respawn)
}

function resetGame() {
  MusicEngine.stop();
  currentLevel = 0;
  falls        = 0;
  gameState    = 'INTRO';
  typewriterText  = '';
  typewriterIdx   = 0;
  typewriterTimer = 0;
}

function killKael() {
  falls++;
  deathFlash  = 3;
  gameState   = 'DEAD';
  spawnDeathParticles(kael.x, kael.y);
  triggerShake(20, 9);
  playSound('death');
  MusicEngine.deathFilter();
}

// === BOSS SYSTEM ===

function spawnBossProjectiles(boss) {
  if (boss.type === 'WOLF') {
    for (let i = 0; i < 2; i++) {
      boss.projectiles.push({x:boss.x-boss.w/2, y:boss.y+(i-0.5)*20,
        vx:-4, vy:i===0?-2:2, r:6, life:90, color:'#FF3333'});
    }
  } else if (boss.type === 'EAGLE') {
    for (let i = 0; i < 3; i++) {
      boss.projectiles.push({x:boss.x-boss.w/2, y:boss.y,
        vx:-5+i*0.5, vy:(i-1)*2.5, r:5, life:100, color:'#BB8800'});
    }
  } else if (boss.type === 'CROCODILE') {
    boss.projectiles.push({x:boss.x-boss.w/2, y:boss.y,
      vx:-2, vy:0, r:10, life:150, color:'#44DD22'});
  } else if (boss.type === 'TOAD') {
    boss.projectiles.push({x:boss.x-boss.w/2, y:boss.y,
      vx:-8, vy:0, r:7, life:60, color:'#FF6699'});
  } else if (boss.type === 'SHARK') {
    for (let i = 0; i < 3; i++) {
      boss.projectiles.push({x:boss.x-boss.w/2, y:boss.y+(i-1)*20,
        vx:-3, vy:(Math.random()-0.5)*4, r:8, life:120, color:'#88CCFF'});
    }
  } else if (boss.type === 'SPIDER') {
    boss.projectiles.push({x:boss.x-boss.w/2, y:boss.y,
      vx:-3, vy:1, r:12, life:120, color:'#DDDDCC', web:true});
  } else if (boss.type === 'OCTOPUS') {
    for (let i = 0; i < 5; i++) {
      const a = (i/5)*Math.PI*2;
      boss.projectiles.push({x:boss.x, y:boss.y,
        vx:Math.cos(a)*3, vy:Math.sin(a)*3, r:9, life:100, color:'#6633CC'});
    }
  }
}

function updateBoss(lev, dt) {
  const boss = lev.boss;
  if (!boss) return;
  boss.phase += dt;
  boss.wobble = Math.sin(boss.phase * 0.05) * 5;
  if (boss.hitCooldown > 0) boss.hitCooldown -= dt;
  if (bossHitFlash > 0) bossHitFlash -= dt;

  if (!boss.dead) {
    // Shooting
    boss.shootTimer -= dt;
    if (boss.shootTimer <= 0) {
      boss.shootTimer = boss.shootInterval;
      spawnBossProjectiles(boss);
    }

    // Check Kael vs boss hitbox when flying fast
    if ((gameState === 'FLYING') && boss.hitCooldown <= 0) {
      const spd = Math.sqrt(kael.vx*kael.vx + kael.vy*kael.vy);
      if (spd > 4 && circleAABB(kael.x, kael.y, KAEL_R,
          boss.x - boss.w/2, boss.y - boss.h/2, boss.w, boss.h)) {
        boss.hp--;
        boss.hitCooldown = 60;
        bossHitFlash = 15;
        triggerShake(8, 2);
        playSound('swing');
        for (let i = 0; i < 8; i++) {
          const ang = Math.random()*Math.PI*2;
          const sp2 = 2+Math.random()*5;
          spawnParticle(boss.x, boss.y,
            Math.cos(ang)*sp2, Math.sin(ang)*sp2,
            20+Math.random()*15, 2+Math.random()*3, '#FF4444', 1);
        }
        // Bounce Kael away from boss
        kael.vx = -kael.vx * 0.5;
        kael.vy = -Math.abs(kael.vy)*0.5 - 4;
        if (boss.hp <= 0) {
          boss.dead = true;
          boss.deathTimer = 120;
          for (let i = 0; i < 30; i++) {
            const ang = Math.random()*Math.PI*2;
            const sp3 = 3+Math.random()*9;
            spawnParticle(boss.x, boss.y,
              Math.cos(ang)*sp3, Math.sin(ang)*sp3,
              35+Math.random()*30, 3+Math.random()*4,
              i%2===0?'#FF4444':'#FFAA00', 1);
          }
          playSound('win');
          triggerShake(20, 5);
        }
      }
    }
  }

  // Move projectiles and check vs Kael
  for (let i = boss.projectiles.length - 1; i >= 0; i--) {
    const p = boss.projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) { boss.projectiles.splice(i,1); continue; }
    // Check vs Kael
    if (gameState !== 'DEAD' && gameState !== 'DEAD_WAIT' && gameState !== 'RESPAWN' && gameState !== 'WIN') {
      const dx = kael.x - p.x, dy = kael.y - p.y;
      if (dx*dx + dy*dy < (KAEL_R + p.r)*(KAEL_R + p.r)) {
        if (p.web) {
          kael.vx *= 0.4; kael.vy *= 0.4;
          boss.projectiles.splice(i,1);
        } else {
          killKael(); return;
        }
      }
    }
  }

  // Death timer
  if (boss.dead) {
    boss.deathTimer -= dt;
    if (Math.random() < 0.35) {
      spawnParticle(
        boss.x+(Math.random()-0.5)*boss.w,
        boss.y+(Math.random()-0.5)*boss.h,
        (Math.random()-0.5)*3, -1-Math.random()*3,
        20+Math.random()*15, 2+Math.random()*2,
        Math.random()<0.5?'#FF4444':'#FFAA00', 0);
    }
    if (boss.deathTimer <= 0 && gameState !== 'WIN' && gameState !== 'DEAD' && gameState !== 'DEAD_WAIT') {
      gameState = 'WIN';
      winTimer = 0;
    }
  }
}

function renderEagle(t) {
  const wingSpread = Math.sin(t * 3) * 12;
  ctx.fillStyle = '#8B4513';
  ctx.beginPath(); ctx.ellipse(0, 0, 22, 16, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#A0522D';
  ctx.beginPath();
  ctx.moveTo(-8, -8); ctx.quadraticCurveTo(-50, -30+wingSpread, -70, -10+wingSpread);
  ctx.quadraticCurveTo(-50, 0, -8, 8); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(8, -8); ctx.quadraticCurveTo(50, -30+wingSpread, 70, -10+wingSpread);
  ctx.quadraticCurveTo(50, 0, 8, 8); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#6B3410'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 8; i++) {
    const fx = -20 - i*6, fy = -15 + wingSpread*(i/8);
    ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx-8, fy+8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-fx, fy); ctx.lineTo(-fx+8, fy+8); ctx.stroke();
  }
  ctx.fillStyle = '#EEEEEE';
  ctx.beginPath(); ctx.arc(-18, -8, 14, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-22, -10, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(-22,-10,1.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.moveTo(-30,-8); ctx.lineTo(-44,-12); ctx.lineTo(-44,-6); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-10,16); ctx.lineTo(-14,28); ctx.lineTo(-18,34); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,16); ctx.lineTo(14,28); ctx.lineTo(18,34); ctx.stroke();
}

function renderCrocodile(t) {
  const jawOpen = Math.abs(Math.sin(t * 1.5)) * 10;
  ctx.fillStyle = '#2d5a1b';
  ctx.fillRect(-50, -18, 100, 36);
  ctx.fillStyle = '#2d5a1b';
  ctx.beginPath(); ctx.moveTo(-50,-18); ctx.lineTo(-50,18); ctx.lineTo(-85,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#244810';
  ctx.fillRect(-40,18,15,16); ctx.fillRect(-15,18,15,16);
  ctx.fillRect(15,18,15,16);  ctx.fillRect(35,18,15,16);
  ctx.fillStyle = '#234510';
  for (let i = -40; i < 50; i += 14) {
    ctx.beginPath(); ctx.moveTo(i,-18); ctx.lineTo(i+7,-28); ctx.lineTo(i+14,-18); ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle = '#2d5a1b';
  ctx.fillRect(42,-20,50,40);
  ctx.fillStyle = '#3a7022';
  ctx.fillRect(55,-20,38,20-jawOpen);
  ctx.fillRect(55,jawOpen,38,20-jawOpen);
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath(); ctx.moveTo(57+i*7,-jawOpen); ctx.lineTo(60+i*7,-jawOpen-8); ctx.lineTo(63+i*7,-jawOpen); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(57+i*7,jawOpen); ctx.lineTo(60+i*7,jawOpen+8); ctx.lineTo(63+i*7,jawOpen); ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle = '#FFEE00';
  ctx.beginPath(); ctx.ellipse(50,-14, 6, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(50,-14, 2, 3, 0, 0, Math.PI*2); ctx.fill();
}

function renderToad(t) {
  const breathe = 1 + Math.sin(t * 2) * 0.03;
  ctx.save(); ctx.scale(breathe, breathe);
  ctx.fillStyle = '#5a8a2a';
  ctx.beginPath(); ctx.ellipse(0, 5, 38, 32, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FF8800';
  ctx.beginPath(); ctx.ellipse(0, 14, 26, 18, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3a6a15';
  const spots = [[-22,-5],[18,-8],[-10,10],[20,5],[-5,-18],[12,-16]];
  for (const [sx,sy] of spots) {
    ctx.beginPath(); ctx.arc(sx,sy,6,0,Math.PI*2); ctx.fill();
  }
  ctx.strokeStyle = '#4a7a1a'; ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(-30,10); ctx.lineTo(-48,0); ctx.lineTo(-56,14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(30,10); ctx.lineTo(48,0); ctx.lineTo(56,14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-28,20); ctx.lineTo(-44,30); ctx.lineTo(-50,45); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(28,20); ctx.lineTo(44,30); ctx.lineTo(50,45); ctx.stroke();
  ctx.fillStyle = '#aad040';
  ctx.beginPath(); ctx.arc(-18,-28, 14, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(18,-28, 14, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-18,-28, 6, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(18,-28, 6, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#3a6a15'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-22, 8); ctx.quadraticCurveTo(0, 20, 22, 8); ctx.stroke();
  ctx.restore();
}

function renderShark(t) {
  const swimX = Math.sin(t * 2) * 8;
  ctx.save(); ctx.translate(swimX, 0);
  ctx.fillStyle = '#888';
  ctx.beginPath(); ctx.ellipse(0, 0, 45, 20, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ddd';
  ctx.beginPath(); ctx.ellipse(0, 8, 35, 12, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#777';
  ctx.beginPath(); ctx.moveTo(-40,0); ctx.lineTo(-60,-18); ctx.lineTo(-60,18); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#666';
  ctx.beginPath(); ctx.moveTo(-5,-20); ctx.lineTo(10,-48); ctx.lineTo(22,-20); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-10,5); ctx.lineTo(-30,22); ctx.lineTo(-5,12); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(10,5); ctx.lineTo(30,22); ctx.lineTo(8,12); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(28,-4,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(28,-4,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ccc';
  ctx.beginPath(); ctx.moveTo(35,4); ctx.lineTo(55,-6); ctx.lineTo(55,12); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath(); ctx.moveTo(38+i*4,4); ctx.lineTo(40+i*4,-4); ctx.lineTo(42+i*4,4); ctx.closePath(); ctx.fill();
  }
  ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath(); ctx.moveTo(14-i*8,-12); ctx.lineTo(12-i*8,12); ctx.stroke();
  }
  ctx.restore();
}

function renderSpider(t) {
  const twitch = Math.sin(t * 8) * 2;
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-15, 10, 32, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#CC0000';
  ctx.beginPath(); ctx.moveTo(-15,2); ctx.lineTo(-25,15); ctx.lineTo(-15,28); ctx.lineTo(-5,15); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(18, -8, 20, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 4;
  const legPositions = [
    [10,-8,-20,-35,-45,-20], [8,-4,-18,-28,-48,-5],
    [8,2,-16,-20,-50,10],   [8,8,-14,-8,-46,25],
    [28,-8,50,-35,78,-20],  [26,-4,52,-28,80,-5],
    [26,2,54,-20,82,10],    [26,8,56,-8,78,25],
  ];
  for (let i = 0; i < legPositions.length; i++) {
    const [ax,ay,kx,ky,fx,fy] = legPositions[i];
    const tw = i < 4 ? -twitch : twitch;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(kx+tw, ky);
    ctx.lineTo(fx+tw*0.5, fy);
    ctx.stroke();
  }
  ctx.shadowColor = '#FF0000'; ctx.shadowBlur = 6;
  ctx.fillStyle = '#FF1111';
  const eyePos = [[10,-18],[18,-20],[26,-18],[10,-12],[18,-10],[26,-12]];
  for (const [ex,ey] of eyePos) {
    ctx.beginPath(); ctx.arc(ex,ey,3,0,Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.moveTo(15,2); ctx.lineTo(10,14); ctx.lineTo(18,14); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(22,2); ctx.lineTo(28,14); ctx.lineTo(20,14); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(200,200,200,0.4)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-15,42); ctx.lineTo(-15,65); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-15,42); ctx.lineTo(-28,58); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-15,42); ctx.lineTo(-2,58); ctx.stroke();
}

function renderOctopus(t) {
  const pulse = 0.5 + 0.5*Math.sin(t*2);
  const r = Math.floor(80 + pulse*30), b = Math.floor(160 + pulse*40);
  ctx.fillStyle = `rgb(${r},40,${b})`;
  ctx.beginPath(); ctx.ellipse(0,-10, 38, 42, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath(); ctx.ellipse(-14,-8, 12, 10, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(14,-8, 12, 10, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(-14,-8, 6, 7, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(14,-8, 6, 7, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.ellipse(-8,-20,12,10,-0.5,0,Math.PI*2); ctx.fill();
  const tentacleColor = `rgb(${r-20},35,${b-20})`;
  ctx.strokeStyle = tentacleColor; ctx.lineWidth = 8;
  for (let i = 0; i < 8; i++) {
    const baseAngle = (i/8)*Math.PI + Math.PI*0.1;
    const bx = Math.cos(baseAngle)*28, by = 28 + Math.sin(baseAngle)*10;
    const wiggle = Math.sin(t*2 + i*0.8)*12;
    const cx1 = bx + Math.cos(baseAngle)*20 + wiggle;
    const cy1 = by + 30;
    const cx2 = bx + Math.cos(baseAngle)*10 + wiggle*1.5;
    const cy2 = by + 65;
    const ex = bx + Math.cos(baseAngle)*5 + wiggle*2;
    const ey = by + 90;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.bezierCurveTo(cx1,cy1,cx2,cy2,ex,ey);
    ctx.stroke();
    ctx.fillStyle = 'rgba(200,180,255,0.5)'; ctx.lineWidth = 1;
    const steps = 3;
    for (let s = 0; s < steps; s++) {
      const st = (s+1)/(steps+1);
      const sx = bx + (cx1-bx)*st*0.5, sy = by + (cy1-by)*st*0.5;
      ctx.beginPath(); ctx.arc(sx,sy,3,0,Math.PI*2); ctx.fill();
    }
    ctx.lineWidth = 8;
  }
}

function renderBoss(lev) {
  const boss = lev.boss;
  if (!boss) return;
  const s = worldToScreen(boss.x, boss.y);
  if (s.x < -200 || s.x > W+200 || s.y < -200 || s.y > H+200) return;

  for (const p of boss.projectiles) {
    const ps = worldToScreen(p.x, p.y);
    const alpha = Math.min(1, p.life/30);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(ps.x, ps.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  ctx.save();
  ctx.translate(s.x, s.y + boss.wobble);

  if (boss.hitCooldown > 0 && Math.floor(boss.hitCooldown/6)%2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  const t = boss.phase * 0.016;

  if (!boss.dead) {
    if (boss.type === 'WOLF')           renderWolf(t);
    else if (boss.type === 'EAGLE')     renderEagle(t);
    else if (boss.type === 'CROCODILE') renderCrocodile(t);
    else if (boss.type === 'TOAD')      renderToad(t);
    else if (boss.type === 'SHARK')     renderShark(t);
    else if (boss.type === 'SPIDER')    renderSpider(t);
    else if (boss.type === 'OCTOPUS')   renderOctopus(t);
  } else {
    const progress = 1 - Math.max(0, boss.deathTimer / 120);
    const alpha = Math.max(0, 1 - progress * 2.5);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#FF4400';
    ctx.shadowColor = '#FF8800'; ctx.shadowBlur = 30;
    ctx.beginPath(); ctx.arc(0, 0, 50 * (1 + progress * 1.5), 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.globalAlpha = 1;
  ctx.restore();

  if (!boss.dead) {
    ctx.globalAlpha = 0.08 + 0.05*Math.sin(boss.phase*0.1);
    ctx.fillStyle = '#FF2222';
    ctx.beginPath(); ctx.arc(s.x, s.y, 80, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function renderBossHP(lev) {
  const boss = lev.boss;
  if (!boss || boss.dead) return;

  const cx = W/2;
  const barW = 140, barH = 10;
  const x = cx - barW/2, y = 42;

  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(x-6, y-18, barW+12, barH+26);

  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#FF4444';
  ctx.fillText('BOSS: ' + boss.type, cx, y-14);

  ctx.fillStyle = '#330000';
  ctx.fillRect(x, y, barW, barH);

  const ratio = boss.hp / boss.maxHp;
  const barColor = ratio > 0.6 ? '#FF4444' : ratio > 0.3 ? '#FF8800' : '#FFDD00';
  ctx.fillStyle = barColor;
  ctx.fillRect(x, y, barW * ratio, barH);

  ctx.strokeStyle = '#FF2222';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, barW, barH);

  if (bossHitFlash > 0) {
    ctx.globalAlpha = bossHitFlash / 15 * 0.6;
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(x, y, barW * ratio, barH);
    ctx.globalAlpha = 1;
  }
}

function update(dt) {
  const lev = LEVELS[currentLevel];

  // Blink timer
  blinkTimer = (blinkTimer + dt * 0.04) % 1;

  // Shake
  updateShake(dt);

  // Zoom de agarre con resorte
  if (Math.abs(grabZoom - 1) > 0.001 || Math.abs(grabZoomVel) > 0.0001) {
    const spring = (1 - grabZoom) * 0.3;
    grabZoomVel  = (grabZoomVel + spring) * 0.7;
    grabZoom    += grabZoomVel;
  } else {
    grabZoom = 1; grabZoomVel = 0;
  }

  // Flash de muerte
  if (deathFlash > 0) deathFlash = Math.max(0, deathFlash - dt * 0.12);

  // Hint
  hintTimer += dt;
  if (hintTimer < 80) {
    hintAlpha = Math.min(1, hintTimer / 20);
  } else {
    hintAlpha = Math.max(0, 1 - (hintTimer - 80) / 30);
  }

  // Typewriter para intro
  if (gameState === 'INTRO') {
    typewriterTimer += dt;
    if (typewriterTimer > 1.4 && typewriterIdx < typewriterFull.length) {
      typewriterTimer = 0;
      typewriterText += typewriterFull[typewriterIdx++];
    }
    updateParticles(dt);
    return;
  }

  // Transición de nivel
  if (gameState === 'LEVEL_TRANSITION') {
    transitionAlpha += transitionDir * dt * 0.06;
    if (transitionDir === 1 && transitionAlpha >= 1) {
      transitionAlpha = 1;
      if (!transitionDone) {
        transitionDone = true;
        loadLevel(currentLevel);       // carga nivel pero NO cambia gameState
        setTimeout(() => { transitionWait = true; }, 400); // espera antes de mostrar "toca"
      }
    }
    if (transitionDir === -1 && transitionAlpha <= 0) {
      transitionAlpha = 0;
      gameState = 'FLYING';   // sale de transición cayendo
    }
    updateParticles(dt);
    return;
  }

  // Muerte – pausa y respawn
  if (gameState === 'DEAD') {
    updateParticles(dt);
    updateCamera(lev);
    // Auto-respawn tras delay
    if (deathFlash < 0.2 && shakeDur <= 0) {
      gameState = 'RESPAWN';
    }
    return;
  }

  if (gameState === 'RESPAWN') {
    updateParticles(dt);
    gameState = 'DEAD_WAIT';
    setTimeout(() => {
      loadLevel(currentLevel);
      gameState = 'FLYING';  // respawn cae libremente
    }, 700);
    return;
  }

  if (gameState === 'DEAD_WAIT') {
    updateParticles(dt);
    return;
  }

  // Win
  if (gameState === 'WIN') {
    winTimer += dt;
    if (winTimer > 3 * 60) winTimer = 3 * 60; // cap
    // Partículas de extracción
    if (winTimer % 4 < dt * 2) {
      spawnExtractionParticles(kael.x, kael.y);
    }
    updateParticles(dt);
    updateCamera(lev);
    return;
  }

  // ── Lógica principal ──────────────────────────────────────────────────────

  if (gameState === 'SWINGING') {
    if (grabCooldown > 0) grabCooldown -= dt;
    updateSwinging(dt);
    // Aterrizar solo si ya pasó el cooldown de agarre
    if (grabCooldown <= 0 && kael.angVel !== 0) checkPlatformCollision(lev);
    // Cuerda muy corta
    const dx = kael.x - kael.anchorX;
    const dy = kael.y - kael.anchorY;
    if (Math.sqrt(dx*dx+dy*dy) < MIN_ROPE * 0.8) releaseRope();
  }

  // IDLE: Kael aterrizó, espera input (puede pasar si cae sobre plataforma)
  if (gameState === 'IDLE') {
    if (kael.platIdx >= 0 && kael.platIdx < lev.platforms.length) {
      const p = lev.platforms[kael.platIdx];
      kael.y = p.y - KAEL_R;
    }
    kael.vx *= 0.85; // fricción horizontal suave
    kael.vy = 0;
    kael.onGround = true;
    // Reanudar caída si se desliza fuera de la plataforma
    if (kael.platIdx >= 0) {
      const p = lev.platforms[kael.platIdx];
      if (kael.x < p.x - KAEL_R || kael.x > p.x + p.w + KAEL_R) {
        gameState = 'FLYING';
      }
    }
  }

  if (gameState === 'FLYING') {
    const prevY = kael.y;
    kael.vy += GRAVITY * dt;
    kael.x  += kael.vx * dt;
    kael.y  += kael.vy * dt;
    if (kael.vy > 0) checkPlatformCollision(lev, prevY);
  }

  // Squash recovery (spring)
  {
    const target = 1.0;
    const spring = (target - kael.squash) * 0.25;
    kael.squashVel = (kael.squashVel + spring) * 0.65;
    kael.squash   += kael.squashVel;
    kael.squash    = Math.max(0.45, Math.min(1.55, kael.squash));
  }

  // Trail
  kael.lastSpeed = Math.sqrt(kael.vx*kael.vx + kael.vy*kael.vy);
  if (kael.lastSpeed > 7) {
    kael.trail.unshift({x: kael.x, y: kael.y, a: 1});
    if (kael.trail.length > 7) kael.trail.pop();
  } else {
    if (kael.trail.length > 0) kael.trail.pop();
  }
  for (const t of kael.trail) t.a *= 0.85;

  // Boss continua
  if (gameState === 'WIN') return;
  if (gameState === 'FLYING' || gameState === 'IDLE' || gameState === 'SWINGING') {
    if (lev.boss && !lev.boss.dead && !bossEngaged && checkBossProximity(lev)) {
      bossEngaged = true;
      triggerShake(6, 2);
    }
    updateBoss(lev, dt);
  }

  // Spikes – comprobación en todos los estados activos
  if (gameState !== 'WIN' && gameState !== 'DEAD' &&
      gameState !== 'DEAD_WAIT' && gameState !== 'RESPAWN') {
    if (checkSpikeCollision(lev)) { killKael(); return; }
  }

  // Caída al vacío
  if (kael.y > lev.deathY) { killKael(); return; }

  // Fuera de bounds horizontal
  if (kael.x < -150 || kael.x > lev.worldW + 150) { killKael(); return; }

  // Partículas del boss (cuando está vivo y cerca)
  if (lev.boss && !lev.boss.dead && bossEngaged) {
    if (Math.floor(Date.now() / 300) !== Math.floor((Date.now() - dt * 16) / 300)) {
      spawnExtractionParticles(lev.boss.x, lev.boss.y);
    }
  }

  updateParticles(dt);
  updateCamera(lev);
}

function render() {
  ctx.clearRect(0, 0, W, H);

  renderBackground();

  const lev = LEVELS[currentLevel];

  if (gameState === 'INTRO') {
    renderIntroScreen();
    return;
  }

  if (gameState === 'LEVEL_TRANSITION') {
    renderLevelTransition();
    return;
  }

  // ── Mundo ─────────────────────────────────────────────────────────────────
  // Zoom de agarre (centrado en Kael)
  const zs  = worldToScreen(kael.x, kael.y);
  ctx.save();
  ctx.translate(zs.x, zs.y);
  ctx.scale(grabZoom, grabZoom);
  ctx.translate(-zs.x, -zs.y);

  // Plataformas
  for (const p of lev.platforms) renderPlatform(p);

  // Pinchos
  for (const s of lev.spikes) renderSpike(s);

  // Boss
  renderBoss(lev);

  // Anclas
  const nearKael = (gameState === 'IDLE' || gameState === 'FLYING');
  for (const a of lev.anchors) renderAnchor(a, nearKael);

  // Cuerda
  renderRope();

  // Partículas
  renderParticles();

  // Kael
  renderKael();

  ctx.restore();

  // Viñeta temática de los bordes de pantalla
  const th = theme();
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.9);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, th.fog.replace(/[\d.]+\)$/, '0.55)'));
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  // Overlays que no se ven afectados por el zoom
  renderDeathOverlay();

  if (gameState !== 'DEAD' && gameState !== 'DEAD_WAIT' && gameState !== 'RESPAWN') {
    renderHUD(lev);
    renderBossHP(lev);
  }

  if (gameState === 'WIN') renderWinScreen();
}

function gameLoop(timestamp) {
  const delta = Math.min(timestamp - (lastTime || timestamp), 50);
  lastTime = timestamp;
  const dt = delta / FRAME_MS;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

// === INICIO ===

function init() {
  resizeCanvas();
  gameState = 'INTRO';
  currentLevel = 0;
  falls = 0;

  // Iniciar con primer nivel en memoria (para fondo)
  loadLevel(0);
  gameState = 'INTRO'; // volver a intro después de cargar

  // Registrar Service Worker para PWA offline
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('[SW] Registrado — juego disponible offline'))
      .catch(e => console.warn('[SW] Error:', e));
  }

  requestAnimationFrame(gameLoop);
}

init();
  </script>
